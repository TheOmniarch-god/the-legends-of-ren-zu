 grabbed the Heart of Loneliness in Ren Zu's hand\nand stuffed it into the Predicament's stomach through its exposed neck.\n\u201cAt this point, Ren Zu lost all his hearts.\u201d\nHe fell onto the ground, losing all signs of life; he could not stand up anymore.\nRen Zu died.\n\u201cOh human, you died; we have regained freedom.\u201d Rules and Regulation Gu\nflew away.\n\u201cThere is no helping it; the human met with the greatest predicament in his\n\nlife.\u201d Courage Gu and Edge Gu flew away as well.\nRegarding Edge Gu, it was recorded in The Legends of Ren Zu. Ren Zu was\nwalking in Ordinary Abyss where some places were swampy, it was easy to get\nstuck in the mud, and the stench was foul. Some places were full of thorns, sharp\npointy tips were everywhere, Ren Zu suffered a lot of injuries. In some parts of the\nground, there were also edge Gu. When Ren Zu stepped on the ground, his soles\nwere injured by the sharp edges, his injuries became larger as blood flowed, when\nhe walked, the pain could be felt striking deep within himself.\nEdge Gu is the origin of both blade path and sword path.\nMany wild edge Gu were produced in nature, Autumn Blade Plain in Northern\nPlains is one of the few edge Gu production areas in the five regions.\nOn Ren Zu's corpse, only Self Gu remained; it flew around him. Attitude Gu\nwanted to leave too, but Self Gu grabbed onto it, forcing it to stay.\nStrong Gu laughed happily, \u201cHahaha, oh human, you were nothing impressive\nafter all. Hmm? Predicament, what's wrong?\u201d\nThe Predicament that Strong Gu was attached to grabbed onto its bulging stomach as it rolled on the ground in pain.\nLoneliness was extremely hard to digest; the stronger the Predicament, the lonelier one would feel.\n\u201cBoom.\u201d\nSuddenly, the Predicament's belly burst open.\nRen Zu's Heart of Loneliness, his skin and flesh fused to create a boy.\n\u201cWho are you?\u201d Strong Gu was flabbergasted.\nThe boy said, \u201cI am Ren Zu's son \u2014 Great Strength True Martial.\u201d\nBefore finishing his words, he jumped up and grabbed Strong Gu.\nStrong Gu tried to struggle while Self Gu used the opportunity to approach\nand take a bite of it.\nStrong Gu was injured; it got weakened.\n\u201cWhere are you trying to go?\u201d Great Strength True Martial shouted; he grabbed\nStrong Gu and stuffed it into his chest.\nStrong Gu went into his chest and got imprisoned in his heart, unable to escape.\n\u201cDon't waste your effort; this is my Heart of Ambition. You cannot escape.\u201d\nGreat Strength True Martial laughed.\nNext, he found Ren Zu's other hearts from the corpse of the Predicament and\n\nplaced them back into his chest.\nRen Zu was revived once again." },
  { num: "40", title: "Effort begets results", body: "Ren Zu and Great Strength True Martial started to travel together.\nGreat Strength True Martial asked, \u201cFather, where are we going now?\u201d\nRen Zu replied: \u201cMy son, you still do not know the situation. I will explain it\nto you. I originally wanted to save your brothers and sisters, but Fate Gu arranged\neverything, not allowing us to have a reunion. Right now, we need to break free\nfrom fate's control in order to be with our family again.\u201d\nAfter hearing the story, Great Strength True Martial could not help but shout\nin anger, \u201cThis Fate Gu is too wicked!\u201d\nAt the same time, Strong Gu also shouted in his heart, \u201cExperts hate restraints,\nespecially fate.\u201d\nRen Zu patted Great Strength True Martial's head and consoled, \u201cDon't worry, I\nhave already thought of a way. I will use Self Gu to gain strength and wisdom, after\nwhich, I will obtain Freedom Gu and break free from Fate Gu's control. Now, let us\ngo to a place called Qian Kun Crystal Wall; we will search for Wisdom Gu there.\u201d\nGreat Strength True Martial nodded, \u201cLet us go there then.\u201d\nRen Zu and Great Strength True Martial walked and walked; the road was\nuneven, with many upslope and downslope roads.\nStrong Gu encouraged Great Strength True Martial, \u201cOh human, walk on the\nUpslope Road. Even though it is a harder journey, there are often good things\nthere.\u201d Great Strength True Martial nodded, \u201cExperts like to walk on the Upslope Road.\u201d\nGreat Strength True Martial took great effort to walk up the Upslope Road. He\nlooked around and called out, \u201cThere's nothing here at all.\u201d\n\u201cNo, it is right by your feet; pick it up now,\u201d Strong Gu instructed.\nGreat Strength True Martial squatted down, searching the ground with his\n\nhands. As expected, he found something hard; it was an invisible Gu.\n\u201cI found something good,\u201d Great Strength True Martial laughed. \u201cSo it is Effort\nGu.\u201d\nRen Zu found it strange, \u201cMy son, how did you find out its name? We can't see\nwhat it looks like.\u201d\nGreat Strength True Martial scratched his head, \u201cThe moment I obtained it, I\nsaw Effort Gu's appearance. As for why I know this is Effort Gu, well, every expert\nshould know what effort is. This is natural; there is nothing strange about it. After\nall, you cannot see the effort of other people.\u201d\nThe pair of father and son set off again.\n\u201cThis is great; now that I have Effort Gu, it will help me greatly,\u201d Great Strength\nTrue Martial walked as he looked at Effort Gu, feeling very happy.\nHe continued to choose the Upslope Road.\nRen Zu asked curiously, \u201cIs Effort Gu really that amazing? Can it allow you to\nachieve success?\u201d\nGreat Strength True Martial shook his head, \u201cEffort might not necessarily lead\nto success, but effort will give you a result. Regardless of the result, whether you\nput in effort or not will show a difference.\u201d\nRen Zu was very worried, \u201cOh son, you have just been born. Don't be deceived\nby the Gu. I had once been deceived by Wisdom Gu. I see that you are covered\nin sweat and pant heavily each time you walk on the Upslope Road. I do not see\nEffort Gu helping you at all. I've heard of such rumours too; Effort Gu can sometimes lie to you.\u201d\nGreat Strength True Martial shook his head as he wiped the sweat off his forehead, \u201cFather, because you cannot see the effort I put in, you misunderstood things.\nYou cannot understand the amount of effort I put in to walk this Upslope Road.\nActually, the result of my effort is below my feet; every step, I move higher and further. There are many good things on the Upslope Road; humans cannot obtain\nthem without effort.\u201d\n\u201cIs that really the case?\u201d Ren Zu was half convinced and suspicious.\nRen Zu and Great Strength True Martial continued on their journey.\nGreat Strength True Martial kept walking on the Upslope Road; he continued to move up higher. He obtained Authority Gu and Fortitude Gu. In the later\npart of the road, he found Humility Gu and Forgiveness Gu as well. These two Gu\nworms took the initiative to follow Great Strength True Martial.\nGreat Strength True Martial asked for the reason while they replied matter-of-factly, \u201cBecause humility (forgiveness) is the authority of an expert to begin\n\nwith.\u201d\nBecause Great Strength True Martial walked on the Upslope Road, an ability\nGu suddenly appeared within him.\nGreat Strength True Martial held Ability Gu as he said to Ren Zu, \u201cLook father,\nthis is the result of Effort Gu. It awakened my potential; I have my own ability\nnow.\u201d\nRen Zu asked, \u201cThen what is the use of this Ability Gu?\u201d\nGreat Strength True Martial shook his head, \u201cI am not sure. People will only\nknow their abilities and their strength after they use them. But it is definitely\nuseful; it can last my entire lifetime.\u201d\nRen Zu shook his head; he still felt that his son was deceived by the Gu.\nRen Zu and Great Strength True Martial continued walking, and the situation\non the road was getting worse. The Downslope Road was easier to walk on, but it\nwas getting rarer, and there were more and more segments of the Upslope Road.\n\u201cIsn't there an easier road to walk on?\u201d Ren Zu was helpless.\nCognition Gu flew towards Ren Zu, \u201cOh human, there is no other way. The\nmore valuable thing you try to pursue, the more segments of the Upslope Road you\nneed to walk on, and the more Predicaments you need to overcome.\u201d\nRen Zu and Great Strength True Martial had to continue on their way.\nIndeed, as Cognition Gu had said, they encountered more and more Predicaments, and their road was completely blocked.\nRen Zu said, \u201cDon't be afraid of the Predicaments; we still have our hope.\u201d\n\u201cBut hope alone cannot defeat the Predicament; at this time, you will need me,\u201d\nGreat Strength True Martial's Ability Gu spoke.\nGreat Strength True Martial used his ability, defeating many Predicaments.\nRen Zu sighed at long last, \u201cMy son, your Ability Gu is too amazing; it can actually do this. It seems I have underestimated your effort and ability.\u201d\nGreat Strength True Martial smiled, \u201cOften, we humans do not lack abilities;\nwe lack the opportunities to display them.\u201d\nStrong Gu shouted in his heart with great ambition, \u201cKill them all; let's eat them\nall! That way, we can become even stronger.\u201d\nGreat Strength True Martial killed many Predicaments, and he started to eat\nthe Predicaments' heads.\n\u201cSo this is a bitter head? It is really bitter. But I can feel myself getting stronger.\u201d\nHe started to eat the Predicament's loss.\nGreat Strength True Martial immediately spat it out, \u201cExperts do not like to\nswallow losses.\u201d\n\nHe also ate the Predicament's flesh.\nStrong Gu got bigger, and Great Strength True Martial also became more muscular than before.\nStrong Gu was very satisfied with this change, \u201cIn this world, only by becoming\nstronger can one avoid getting bullied.\u201d\nGreat Strength True Martial gave some of the meat to Ren Zu, \u201cOh father, eat\nsomething; you are too skinny.\u201d\nRen Zu was so thin he looked like a rack of bones.\nEventually, Great Strength True Martial tossed Ability Gu into the tribulation.\nAbility Gu went through great hurdles and difficulties, but it got larger and\nstronger as well.\nAll sorts of tribulations and difficulties were prime opportunities to train one's\nability, to develop one's ability, and to increase one's ability." },
  { num: "41", title: "Thirst for knowledge", body: "Ren Zu and Great Strength True Martial went through great hurdles and finally arrived before Qian Kun Crystal Wall.\nQian Kun Crystal Wall was straight and stood upright in the void; it was like a\nhuge mirror that reflected everything that happened in the world.\nRen Zu and Great Strength True Martial went inside Qian Kun Crystal Wall.\nNumerous flowers, birds, fish, and insects converged into a colorful dazzling\nshadow that filled Great Strength True Martial's vision. The sound of waves, thunder, and birds\u2019 singing rippled together in his ears; there was a fresh, sweet, exciting,\nspicy taste dancing on his tongue. At times, he felt like he was walking on a steep\nmountain path; at other times, he felt like he was swimming in the waves, and at\nother times, he felt as if he was falling from a great height.\n\u201cFather, father! Where are you?\u201d Great Strength True Martial shouted, but Ren\nZu could not hear him, could not see him. The color of white filled his vision; it\nwas boundless and vast.\n\u201cOh son, where are you?\u201d Ren Zu sprinted, wanting to find Great Strength\n\nTrue Martial.\nRen Zu ran and ran and ran. After a long time, he saw a black dot at the furthest point within his vision.\nInitially, he felt happy and thought it was Great Strength True Martial. But\nwhen he approached the black dot, he found that it was actually a huge mountain.\nThis mountain was very special; the mountain rocks and vegetation were made\nof white paper, the streams and waterfalls were made of black ink.\nThis was Book Mountain.\nAt the foot of Book Mountain, there was a village with many Inkmen living in it.\nRen Zu went into the village, causing a huge commotion to arise.\n\u201cThis is really a rare sight,\u201d the Inkman spoke. \u201cWhen ordinary lifeforms enter\nQian Kun Crystal Wall, they would get lost after a few steps. They cannot resist\nthe allure of the material world or the countless temptations within it. They can\nnever reach here. You are the first person to arrive here.\u201d\nRen Zu was confused, \u201cWhy so?\u201d\nThe Inkman elder replied, \u201cOh human, you are only left with a skeleton. You\ncannot see, hear, taste, smell, or touch. It allowed you to roam Qian Kun Crystal\nWall freely without losing your life.\u201d\nQian Kun Crystal Wall existed when the world was first created; it reflected\neveryone and everything, containing all the secrets of the world's past and present.\nOnce a person enters it, they would face the barrage of endless information, and\nafter some time, they would die from information overload.\nAfter Ren Zu heard this, he felt very worried about Great Strength True Martial. He asked the Inkman elder about the way to survive, and the elder brought\nRen Zu to ascend the mountain.\nOn Book Mountain, there was the largest ink waterfall, and below it was a deep\npool.\nThe Inkmen called this pool Literature Spring.\nThe ink waterfall continued to flow, landing on the Literature Spring, water\nsplashed about. These black color splashes flew in the air as the water droplets\nformed into ink texts.\n\u201cIf a person wants to continue living in Qian Kun Crystal Wall, the ink text will\nbe your best helper. The reason why we Inkmen can live here is also because of the\nink text,\u201d the Inkman elder told Ren Zu about this big secret.\nRen Zu received the Inkman's advice; he collected a lot of ink texts and left the\nmountain. Every time he walked for some distance, he would leave behind some ink\ntexts as reference points. In this vast world of whiteness, the pitch-black ink text\n\nbecame very conspicuous. Even though ink texts faded over time, using them, Ren\nZu no longer walked on unnecessary trails. He eventually found Great Strength\nTrue Martial.\nGreat Strength True Martial received Ren Zu's ink texts. Every step he walked,\nhe would leave behind some ink texts. The ink texts recorded the information that\nbarraged Great Strength True Martial, turning them all into pieces of literary work.\nThese literary pieces turned into pieces of tiles that were layered below Great\nStrength True Martial's feet.\nGreat Strength True Martial was finally free; his eyes were not blurry, his ears\nwere not buzzing, he could no longer smell the mix of countless fragrances as well.\nStepping on these tiles, he followed Ren Zu back to the Inkman village.\nRen Zu asked the Inkman elder again, \u201cOh elder, how can I find Wisdom Gu\ninside Qian Kun Crystal Wall?\u201d\nThe Inkman elder told Ren Zu, \u201cEven though Wisdom Gu often stays within\nQian Kun Crystal Wall, it is hidden very deeply. To find it, you will need to venture deep into the crystal wall. It will not be possible with just ink texts and the\ntiles that are formed below your feet. These tiles only record all sorts of information on the superficial level, with the endless barrage of other information the limited ink texts within the tiles will change in content. They will disappear quickly\nand cannot last for long.\u201d\nThe Inkman elder said again, \u201cOh human, you need to turn all the information\ninto knowledge. Only with knowledge can you explain information clearly; you\nwill be able to write them down in words, allowing you to create a real path instead\nof just tiles made of texts.\u201d\nRen Zu was troubled, \u201cHow can I turn them into knowledge?\u201d\nThe Inkman elder laughed, \u201cThere are many bookworms on Book Mountain;\nthey record the knowledge that our Inkman seniors have left behind. Oh human,\nyou can go look at them.\u201d\n\u201cIt is not difficult to gather the knowledge yourself either. Firstly, you need\nMemory Gu to store all of this information inside your mind.\u201d\nBefore the Inkman finished his words, Cognition Gu appeared, saying to Ren\nZu, \u201cAfter that, I can help you to refine knowledge.\u201d\nThe Inkman elder nodded with a smile, \u201cIndeed, cognition can produce knowledge.\u201d\nRen Zu said, \u201cThen I will thank you all in advance.\u201d\nThe Inkman elder shook his head, \u201cNo need to stand on ceremony.\u201d\nCognition Gu said, \u201cDon't say that, human. We have always been good friends,\n\nand this situation benefits myself as well.\u201d\nIf cognition did not take in new information, it would quickly get outdated.\nOnly by receiving new information and thinking about it could cognition create\nuseful new thoughts that were healthy and vibrant, innovative, and lively.\nRen Zu gathered many bookworms on Book Mountain; he obtained a lot of new\ninformation. Next, with Cognition Gu's help, he created much new knowledge\nfrom the vast amount of information. He used ink texts to write down his knowledge, scattering them on the ground and creating a black path made of ink texts.\nRen Zu and Great Strength True Martial walked on this path; they walked for\na long time, far longer than any of their previous trips.\n\u201cOh no, I don't have enough knowledge left.\u201d Ren Zu walked to the end of the\npath, feeling very dejected and upset. He had gathered many ink texts, but the\nknowledge in his mind was insufficient already.\nRen Zu and Great Strength True Martial's first attempt failed; they had to\nreturn to Book Mountain.\nGreat Strength True Martial continued to collect ink texts while Ren Zu gathered all the bookworms. With Cognition Gu's help, he refined even more knowledge from them.\nWith more and more knowledge, Ren Zu found that his mind was getting filled\nup.\n\u201cI have too much knowledge now.\u201d Ren Zu was very satisfied; he said confidently, \u201cLet's go. I am sure we can reach the deepest part of Qian Kun Crystal Wall\nthis time.\u201d\nHowever, they still failed in their second attempt.\n\u201cWhy did this happen? My mind was already filled with knowledge.\u201d Ren Zu\nsaid dejected, \u201cThis is all the knowledge I can hold.\u201d\n\u201cNo, oh human, look closely again.\u201d Self Gu suddenly spoke to remind him.\nRen Zu inspected his mind, he found a Gu hiding inside it.\nRen Zu realized at once, \u201cSo you are occupying my mind, preventing me from\ngetting more knowledge. What Gu are you?\u201d\nThe Gu answered, \u201cI am Pride Gu.\u201d\nRen Zu said anxiously, \u201cCan you hurry and get out, you are occupying such a\nhuge area. I want to fill the place with knowledge instead.\u201d\nBut no matter how anxious Ren Zu was, or how he urged, Pride Gu refused to\nleave.\nWhen Ren Zu was out of ideas, Great Strength True Martial spoke, \u201cOh father,\ndon't be anxious. Don't forget that I still have Humility Gu. I will give it to you.\u201d\n\nGreat Strength True Martial took out Humility Gu and gave it to Ren Zu. Pride\nGu was chased away by Humility Gu; it had to fly out of Ren Zu's mind and land\non Great Strength True Martial instead.\nStrong Gu was very happy, \u201cThe strong have their own pride.\u201d\nAfter Ren Zu chased Pride Gu away from his mind, he returned to Book Mountain to continue gaining knowledge.\nAfter Ren Zu gained Humility Gu, he realized that the more knowledge he had,\nthe more he found that he was lacking knowledge, and the more he wanted to fill\nhis mind with even more knowledge.\nRen Zu's mind was quickly filled.\nSelf Gu urged him, \u201cOh human, stop now, your mind is already full of knowledge.\u201d\nBut Ren Zu replied, \u201cBut I think that it is insufficient, I am certain that I still\ndo not know a lot of things. I need to continue gaining knowledge.\u201d\nRen Zu continued to refine his knowledge; his mind was getting bloated, it was\nhurting and could not hold any more information, but Humility Gu made him\nfeel like he was still lacking in knowledge.\nSuddenly, there was a loud boom.\nEventually, Ren Zu's mind could not take it anymore; it exploded from an overload of knowledge.\nThe knowledge scattered on the ground as a little girl stood up from within.\n\u201cFather, father.\u201d The little girl hugged Ren Zu's leg happily. \u201cMy name is Carefree Wisdom Heart; I am your daughter.\u201d\nRen Zu\u2019s eighth child (daughter), Carefree Wisdom Heart.\nGrey-White Stone Slabs they are from the Immemorial Era.\nThe Legends of Ren Zu states that in order to save Wisdom Gu, Carefree\nWisdom Heart came to the Qian Kun Crystal Wall.\nQian Kun Crystal Wall was straight from top to bottom; it floated in mid-air\nlike a giant mirror.\nIn the mirror, there was a Book Mountain.\nOn the Book Mountain, there was an Ink Waterfall, landing on the mountain\nrocks to form a Literature Spring.\nThe Ink Waterfall continued to flow, as it landed on the Literature Spring, water\nsplashed about. These black color splashes flew in the air as the water droplets\nformed into words.\nThis was the origin of the hundred clan writing system in the Gu Master world.\n\nAfter Qian Kun Crystal Wall was broken, it turned into numerous Grey-White\nStone Slabs.\nLegends say that if one gathered all of the stone slabs, they could piece back Qian\nKun Crystal Wall and the Gu Master would be able to enter Book Mountain again.\nInkman was also recorded in The Legends of Ren Zu. Their homeland was the\nBook Mountain.\nThe Book Mountain had an Ink Waterfall which would crash down on the Literature Spring, and the raging ink would fall on the rocks, forming Inkmen." },
  { num: "42", title: "Finding Wisdom", body: "Carefree Wisdom Heart was born, and she was intelligent and witty. Ren Zu\nliked his eighth child a lot.\nBut at the same time, Ren Zu was vexed: \u201cMy mind shattered, what do I do? I\ncannot store more knowledge anymore. Sigh, it seems that only the two of you can\nhelp me now.\u201d\nThus, Carefree Wisdom Heart and Great Strength True Martial used their own\nminds to store up more knowledge. They filled their minds with knowledge before\nmoving along with Ren Zu. Ren Zu and his children started their third attempt.\nBefore they took a step, they would scatter ink text and knowledge; the text\nwould describe their knowledge and form a small black path. Ren Zu and his children walked on this small path.\nBut when they finished using their knowledge and reached the end of the ink\ntext path, they did not see any signs of Wisdom Gu. Ren Zu's third attempt failed\nagain.\nGreat Strength True Martial shrugged in disappointment: \u201cWhat do we do\nnow? We have already done our best, but our knowledge is still insufficient. We\ncannot hold any more knowledge in our minds.\u201d\nRen Zu sighed; he was also quite helpless.\nAt this time, Hope Gu flew out: \u201cOh human, don't be disappointed; I am here.\u201d\nRen Zu was surprised: \u201cHow can you help me?\u201d\n\nHope Gu answered: \u201cOh human, I can awaken your aperture.\u201d\nHope allowed people to gain enlightenment (awaken their aperture). Thus,\nhope Gu exerted effort to create an aperture for Ren Zu.\nHumility Gu laughed: \u201cThen let me help you as well, human. When you have\nhumility, your capacity will be larger; you will be able to hold more things.\u201d\nThus, the aperture expanded in size.\nRen Zu obtained the aperture and felt very happy: \u201cThis place is really huge; I\ncan store so much knowledge! This is wonderful.\u201d\nRen Zu and his children went to Book Mountain again; they refined their\nknowledge and searched for ink text. Ren Zu stored a lot of knowledge into his\naperture; even he did not know the quantity he took. Ren Zu and his children set\noff on their fourth journey; they stepped on the ink text path and entered deep\ninto Qian Kun Crystal Wall.\nThey went very deeply and searched many places; they changed directions\ncountless times but still could not find Wisdom Gu. They had no choice but to\nreturn to Book Mountain.\nThis time, because the exploration took too long, the ink text path that they created when they set off was unable to endure the endless barrage of information; a\nlarge portion of it faded away.\nRen Zu found the Inkman elder and asked: \u201cWhy can't we find Wisdom Gu?\u201d\nThe Inkman elder replied: \u201cSometimes, when we Inkmen explore the place, we\nwould encounter Wisdom Gu. But you three have searched the entire Qian Kun\nCrystal Wall but did not find Wisdom Gu; it means that it is intentionally hiding\nfrom you, it does not want to meet you.\u201d\nCarefree Wisdom Heart quickly asked: \u201cThen where is Wisdom Gu hiding at?\u201d\nThe Inkman elder pondered and said: \u201cOh humans, you have searched the entire\nQian Kun Crystal Wall. If Wisdom Gu is still inside here, it can only hide in one\nplace. That place is called Primordial Domain; it is the most mysterious part of\nQian Kun Crystal Wall.\u201d\nQian Kun Crystal Wall has a record of everything that happens in the world;\nit contains infinite information. Primordial Domain contains the information of\nthe world since creation; it also has the information of the ends of all living beings.\nIt is both the starting point and the ending point. It has nothing, yet it comprises everything.\nGreat Strength True Martial was overjoyed: \u201cWe have not gone to Primordial\nDomain yet. Oh Inkman elder, tell us how to get into the Primordial Domain.\u201d\nThe Inkman elder shook his head: \u201cIt is not that I do not want to help you,\n\nbut we Inkmen have also only heard of the location; we have never entered it. Oh\nhumans, we Inkmen admire you a lot. You possess knowledge that far surpasses\nus, thus, if you want to enter Primordial Domain, you need to rely on yourselves.\u201d\nRen Zu and his children had to make their research.\nCarefree Wisdom Heart had a find; she shouted joyfully: \u201cI found it, I found it!\u201d\n\u201cOh daughter, what did you find, why are you so excited?\u201d Ren Zu asked in\ncuriosity.\nCarefree Wisdom Heart opened both her palms: \u201cOn my right palm, I found\nRight Gu. On my left palm, I found Wrong Gu. These two Gu are born in your\nbody; they are ordinary-looking and are much less presentable than my Authority Gu.\u201d\n\u201cWhat help can they give us?\u201d Great Strength True Martial was very prideful;\nhe spoke nonchalantly.\nCarefree Wisdom Heart answered: \u201cThese two Gu allow us to differentiate and\nclassify our knowledge. Look at our knowledge again; the truth is, much of it is\nright at this moment, but after some time, those pieces of information will be\nwrong. There is also much of it that is right when placed here, but wrong when\nplaced there. I think that if we use the knowledge that is always right at all times\nand use it to make our text path, we will be able to reach Primordial Domain.\u201d\nRen Zu nodded: \u201cYour words are quite logical. Let us try it.\u201d\nBut no matter how they looked, they could not find such knowledge.\nGreat Strength True Martial's Strong Gu said proudly: \u201cOh humans, you are\nwasting your effort. Because in this world, there has only been strong and weak;\nthere has never been right or wrong. Thus, your actions are in vain; you cannot\nclassify right and wrong.\u201d\nQian Kun Crystal Wall contains everything that happens in the world; all of the\ninformation comprises genuine events with no lies. Using right and wrong will\nnot be able to differentiate them at all because since they exist, or rather, since they\nexisted, they are all logical information.\nCarefree Wisdom Heart was criticized, but her eyes shined with bright light: \u201cI\nget it; the existence of everyone in the world, regardless of right or wrong, is logical\nbecause this is the true meaning of their existence. This is what True Meaning is.\u201d\n\u201cLet us search for it.\u201d\nThe three of them started to dig up True Meaning from the vast sea of knowledge.\nGreat Strength True Martial was the first to get impatient; Ren Zu also lost his\nperseverance soon, but only Carefree Wisdom Heart remained calm and composed;\n\nher expression was serious and solemn.\nAfter a long time, Great Strength True Martial pointed at Carefree Wisdom\nHeart; he gasped in shock: \u201cLook, another Gu grew on your body.\u201d\nThe newly born Gu was called Serious Gu.\nAfter Carefree Wisdom Heart obtained it, she became very happy: \u201cWith this\nGu, I will be able to recognize true meaning more easily.\u201d\nAfter a long time, Ren Zu pointed at Carefree Wisdom Heart as well: \u201cLook,\nanother Gu appeared on your body.\u201d\nThe second Gu was called Learning Gu.\nCarefree Wisdom Heart started to learn knowledge; she converted knowledge\ninto things that she truly understood; she was no longer just storing them using\nMemory Gu. She started to understand more and more knowledge; soon, a third\nGu appeared on her body.\nThe third Gu was called Talent Gu.\n\u201cI found it, I found it!\u201d One day, Carefree Wisdom Heart shouted with joy;\nwith the help of Serious Gu, Learning Gu, and Talent Gu, she finally found the\ntrue meaning of knowledge.\n\u201cQuickly tell us, what does true meaning look like?\u201d Great Strength True Martial was very happy as he asked.\nBut Carefree Wisdom Heart shook her head: \u201cThe True Meaning contained\nwithin will be lost if I try to convey it in words.\u201d\n\u201cThen write it out using ink text.\u201d Great Strength True Martial thought about\nit and suggested.\nBut Carefree Wisdom Heart shook her head again: \u201cThe meaning can only be\nunderstood; it cannot be passed down in text.\u201d\nRen Zu waved his hand: \u201cForget it; since you possess True Meaning now, let's\nhead out immediately.\u201d\nCarefree Wisdom Heart was filled with true meaning; they set off from Book\nMountain as she scattered ink text on the ground; the path was much wider than\nbefore; it was also sturdier.\nRen Zu and his children walked on the great path and arrived in Primordial\nDomain.\nWithin Primordial Domain, they met Wisdom Gu.\nWisdom Gu was quite helpless; it had already hidden itself so deeply, but Ren\nZu still found it; Self Gu managed to take a bite out of it in the end." },
  { num: "43", title: "Betraying one\u2019s self", body: "Wisdom Gu was bitten by Self Gu, and it felt very angry and decided to take\nrevenge.\nWisdom Gu found Lie Gu: \u201cNo matter what I say, my words are filled with\nwisdom; they will advise and help others. This won't do, so I came to you for help.\u201d\nLie Gu asked, \u201cHow do you want me to help you?\u201d\nWisdom Gu said, \u201cThis is easy and simple. Ren Zu and his children are in Primordial Domain now. In front of Primordial Domain is Xi Land, while behind it\nis Hu Land. Go to Primordial Domain and deceive Ren Zu; tell him Hu Land is in\nfront while Xi Land is behind.\u201d\nLie Gu was puzzled, \u201cThat can help you take revenge?\u201d\nWisdom Gu laughed loudly, \u201cHumans need to breathe in first before they can\nbreathe out. Meanwhile, Xi Land and Hu Land are the breathing of heaven and\nearth. Just follow my instructions.\u201d\nLie Gu followed Wisdom Gu's arrangements and went to Primordial Domain.\nIt told Ren Zu, \u201cHuman, you need to be careful. You are in a mystical place; you\nwill reach Hu Land if you go forward and Xi Land if you move back.\u201d\nRen Zu had been thinking of leaving Primordial Domain; he thought, \u201cThe\nBeastmen once advised me not to go to Hu Land. In that case, I shall head towards\nthe back and go to Xi Land.\u201d\nRen Zu moved towards the back of Primordial Domain with his children Great\nStrength True Martial and Carefree Wisdom Heart.\nThus, they arrived at Hu Land.\n\u201cThis is not Xi Land!\u201d Carefree Wisdom Heart knew they had been deceived.\nRen Zu patted his chest, \u201cFortunately, I died once, and Betrayal Gu has already\nleft me. Otherwise, if I care, Betrayal Gu will harm me.\u201d\nBut Great Strength True Martial suddenly realized something and shouted,\n\u201cThis is bad!\u201d\n\u201cWhat's wrong?\u201d Ren Zu was about to ask when Self Gu flew out of his body.\nSelf Gu left Ren Zu, leaving behind a sentence, \u201cOh human, after you put Attitude Gu on me, you deceived even yourself, so don't blame me for leaving you.\u201d\nBack then, Ren Zu protected Weak Gu. Weak Gu urged Ren Zu to put Attitude\nGu on Self Gu to deceive himself, creating the perfect deception that managed to\n\neven deceive the Predicament.\nIf humans deceived themselves, their sense of self would leave, and the person\nwould lose themselves.\nRen Zu was angry and anxious, \u201cWhat to do, Self Gu left me. How can I obtain\nfreedom without it? How can I break free of the restraints of fate?\u201d\n\u201cSelf Gu once took a bite of Betrayal Gu, so it gained the inclination to betray. I\nwas already dissatisfied with it.\u201d Great Strength True Martial's Ability Gu shouted.\nThe skilled were naturally dissatisfied with themselves.\n\u201cSelf Gu will be out of our sight soon; we need to give chase!\u201d Carefree Wisdom\nHeart reminded. The three immediately chased after Self Gu.\nSelf Gu left very fast and dove into a river.\nThe river's surface was calm with ice of all sizes floating on it.\n\u201cThis is the River of Time, the ice floating on the river is called Truthful Floating Ice.\u201d\nRen Zu's group recognized it immediately; they had gained this knowledge in\nthe Qian Kun Crystal Wall.\nRen Zu looked afar and said, \u201cI think Self Gu is hiding in the center of the floating ice; let's quickly go and catch it!\u201d\nRen Zu's group sized up the situation by the riverside.\nEvery piece of floating ice in the River of Time was a piece of truth.\nRen Zu observed for a long while before pointing towards a floating ice: \u201cThis\nfloating ice is neither big nor small and has a smooth surface; let\u2019s step on this.\u201d\nBut Great Strength True Martial said, \u201cThis floating ice is clearly too small; it\nis not enough for us three.\u201d\nCarefree Wisdom Heart shook her head, \u201cThis floating ice is quite big, but there\nare many spikes on it; they will pierce our feet.\u201d\nEven when looking at the same truth, from the perspectives of different people,\nthey could be big or small, minor, or severe, difficult, or easy. Some could accept\nit, but some could not.\nRen Zu's group discussed for a long while before they chose a floating ice and\nstepped on it.\nWhen Ren Zu stepped on this ice, he immediately cried and snivelled. Great\nStrength True Martial shouted in anger, while Carefree Wisdom Heart laughedhappily.\nWhen looking at the same truth, different people would have different feelings\nand emotions regarding it.\nRen Zu and his children could only endure this.\n\n\u201cEvery piece of floating ice in the River of Time is a cold and silent truth.But\nwe humans have hearts; we feel emotions when we come across truths, and when\ntruths and emotions mix, they create different situations for everyone.\u201d Carefree\nWisdom Heart recalled the knowledge in her mind.\nThe floating ice carried the group and drifted for a while before it started shrinking and submerging.\n\u201cLet's jump to that floating ice.\u201d Ren Zu pointed towards the left, at his front.\nBefore the floating ice under them submerged, the three jumped to the second\nfloating ice.\nThis piece of truth created different emotions in Ren Zu's group. The longer\nthey stood on the floating ice, the more these emotions accumulated.\nAs the floating ice continued to sink, the emotions they felt also changed. Some\nwent from angry to happy, while others went from happy to depressed.\n\u201cI can't endure this anymore; I feel horrible.\u201d After persisting for a while, Ren\nZu said while grasping his heart, \u201cLet's jump to that floating ice.\u201d\nThe three jumped over, but shortly afterward, Carefree Wisdom Heart said, \u201cI\ncannot stand this situation; I am also feeling extremely down. I even want to die.\u201d\nRen Zu's group of three quickly changed to another floating ice.\nNo matter what truth they came upon, in reality, they could be endured by gritting one's teeth. The most dreadful thing was the suffering of the heart.\nIf the heart could not endure it, the person would be unable to continue moving\nforward.\nAfter changing several pieces of floating ice, Great Strength True Martial felt\nthe least amount of discomfort: \u201cI am still fine.\u201d\nStrong Gu shouted proudly in his heart: \u201cThere are too many situations in the\nworld, but it has always been the weak who suffer more than the strong.\u201d\nFortitude Gu called out: \u201cThe credit here goes to me because I have been helping you since the start.\u201d\nFortitude Gu could suppress emotions.\nSuddenly, two Gu worms grew on Carefree Wisdom Heart's palms.\nThe Gu on the left palm was called Good. The Gu on the right palm was called\nBad.\n\u201cHumans, we can help you distinguish which situation is good and which is\nbad.\u201d\nGood Gu and Bad Gu said together in a soft voice.\nThus, with the help of Good Gu and Bad Gu, Ren Zu's group was able to choose\na piece of floating ice that had a good situation.\n\nAll three of them felt happy when standing on this floating ice.\nWhen the floating ice started to submerge and good situations turned bad, the\nthree jumped away.\nLike this, the three gradually turned happy, then ecstatic, before finally becoming euphoric. They could not move forward anymore as they drowned in emotions of endless joy.\nThe three forgot about their situation; the truthful floating ice they were standing on submerged completely, and they fell into the river one after the other." },
  { num: "44", title: "Finding self", body: "After falling into the water of the River of Time, Ren Zu and the other two\nwoke up in shock.\nThe three immediately climbed up to a nearby floating ice; although it was only\na short time, they had already grown old.\n\u201cTime Gu is hidden within the River of Time; our lifespan will be washed away\nby the river water.\u201d Great Strength True Martial sighed.\nRen Zu felt regretful: \u201cConstantly encountering good situations is actually a\nbad thing; it will create a huge problem! It is not good to be too happy or constantly happy; it can make people indulge in the present and forget about time as they\nget immersed entirely.\u201d\nBut Carefree Wisdom Heart said with a tone of joy: \u201cQuick, look at your heart.\u201d\nThe three of them inspected their inner hearts; they saw that many accumulated emotions had been washed away earlier when they fell into the river.\nThis discovery made Ren Zu and the other two feel very happy.\nNext, they continued to travel on the floating ice.\nWhenever they encountered a bad situation and felt negative emotions, they\nwould put their heart into the river water to wash it: \u201cThese bad situations will\npass eventually.\u201d\nTheir negative emotions faded away with time.\nWhenever they encountered a good situation and felt immersed in joy, they\n\nwould put their heart into the river water to wash it: \u201cThese good situations will\npass eventually.\u201d\nTheir positive emotions also weakened over time, preventing them from feeling indulgent.\nCognition Gu saw that the three of them were constantly washing their hearts; it\ncould not help but remind them: \u201cTime has never healed the wounds of the heart,\nexcept that your hearts have grown old. The worst thing is not your body growing\nold but your hearts aging. Stop washing them.\u201d\nRen Zu and the other two heard these words and quickly stopped their actions.\nBut without washing the hearts, their speed fell again.\n\u201cLet me help you.\u201d At this time, a Gu worm flew over and landed on Ren Zu.\nRen Zu and the other two saw this Gu worm and became very happy.\nIt was Familial Emotion Gu.\nWith the help of Familial Emotion Gu, Ren Zu and the other two spread their\nemotions around; the joy of one person was split among three, the sorrow of one\nperson was also split into three.\nUsing familial emotion, Ren Zu and the other two consoled each other and carried each other's burden; they moved quickly and firmly.\nBut good times did not last.\nMore and more emotions accumulated in their hearts; their hearts became tired\nand gradually got hurt after being unable to sustain it any longer.\nDeep emotions hurt the heart.\nThe situation soon aggravated because their hearts were severely injured; they\ncould not take in more emotions.\nAt this time, Carefree Wisdom Heart took out a cage and held it in her hand:\n\u201cThis is the Mental Domain that I created; place all your emotions in here.\u201d\nRen Zu and Great Strength True Martial did as she said.\nThey put their emotions into the Mental Domain.\nImmediately, the truthful floating ice revealed its original appearance in front\nof the three.\nThey were simply pieces of floating ice; the three felt a different sensation\ntowards it now.\nThe emotions of people did not concern others; only their mental state mattered.\n\u201cWhat is this?\u201d Carefree Wisdom Heart soon found a Gu worm in the floating ice.\nThe Gu worm answered: \u201cI am Calm Gu.\u201d\n\nThe truth was icy cold; this was the attitude that one should have when facing\nsituations.\nRen Zu and the other two finally reached the center of the truthful floating ice.\nBut they did not find Self Gu.\n\u201cSo Self Gu is not here.\u201d Ren Zu was very disappointed.\nInitially, people would often think that they were the center of all situations,\nbut that was not true.\nAt the center of the truthful floating ice, there was no Self Gu, but three other\nGu instead.\nThey were Rules Gu, Regulation Gu, and Practice Gu.\nRules and Regulation Gu had been with Ren Zu for a long time; after Ren Zu's\nheart was eaten by the Predicament, they thought that he died and left him.\nThey came here to create truthful floating ice along with Practice Gu.\nAll sorts of situations were bound by the rules and regulation of heaven and\nearth.\nThe three Gu continued to create truthful floating ice like this; afterwards,\nunder the effect of Time Gu, these floating ice flowed away and sank.\nRules and Regulation Gu saw Ren Zu and felt surprised: \u201cOh human, so you\ndid not die.\u201d\nRen Zu quickly asked them on how he could find Self Gu.\nRules and Regulation Gu pointed at Practice Gu and said in unison: \u201cIt can\nhelp you.\u201d\nPractice Gu replied: \u201cOh human, you have gone through too many situations.\nAfter such a long time, you have changed a lot. Self Gu is the same; even if it is right\nbefore you, it will feel very foreign now, you cannot recognize it.\u201d\n\u201cWhat can I do?\u201d Ren Zu was troubled.\n\u201cThis is simple.\u201d Practice Gu laughed. \u201cCan't you just undergo the \u2018situation\nof recognizing yourself\u2019?\u201d\n\u201cThat's right!\u201d Ren Zu and the other two realized at once.\nPractice Gu continued: \u201cFor a human, recognizing yourself is the most important and also the most difficult thing in the world. Great Strength True Martial, you\nare strong and have ability; if we work together, the chance of success is very high.\u201d\nAbility Gu laughed and said: \u201cUndergoing situations can make me stronger.\u201d\nCarefree Wisdom Heart supported this; she gave Serious Gu to Great Strength\nTrue Martial.\nGreat Strength True Martial started to undergo situations alongside Practice\nGu.\n\nThey first created a piece of floating ice that was as small as a ball. It surrounded Great Strength True Martial and Practice Gu as a light membrane appeared\naround the ice ball.\nRen Zu and Carefree Wisdom Heart stood on top of the ice ball as they flowed\naway, eventually encountering Year Gu.\n\u201cIs this Self Gu?\u201d Ren Zu asked.\nGreat Strength True Martial replied: \u201cNo, Self Gu is smaller than it.\u201d\nThey continued to undergo situations within the ice ball as Ability Gu got\nstronger; the floating ice also became larger as a water membrane appeared around\nthe periphery.\nWhile floating, Ren Zu saw Month Gu.\n\u201cIs this Self Gu?\u201d Ren Zu asked.\nGreat Strength True Martial replied: \u201cNo, Self Gu is smaller than it.\u201d\nGreat Strength True Martial and Practice Gu continued working hard; Ability Gu got stronger and made this floating ice even bigger; the periphery of the ice\nball was covered in a stone membrane.\nRen Zu saw Day Gu.\n\u201cIs this Self Gu?\u201d Ren Zu asked.\nGreat Strength True Martial replied: \u201cNo, Self Gu is smaller than it.\u201d\nThe stronger the ability, the more one would find that they were small and\ninsignificant.\nEventually, the floating ice reached its biggest size; the periphery was covered\nby a crystal membrane. Ren Zu and the other two floated on the ice ball and eventually found Self Gu.\n\u201cSelf Gu is actually so small.\u201d Ren Zu was internally shaken.\n\nCognition Gu sighed: \u201cIn the eyes of heaven and earth, in the eyes of\nmankind, a single Self Gu is very small and insignificant.\u201d" },
]

    const { useState, useRef, useEffect, useCallback } = React;


const CHAPTERS = window.__CHAPTERS__

const THEMES = ["all","hope","self","fate","freedom","love","failure","fear","ordinary","sacrifice","identity","wisdom","strength","betrayal","death","life","perseverance","loneliness","pride","cognition","ambition","meaning","rules","time","reputation","dreams"];
function getTags(ch) {
  const text = (ch.title + " " + ch.body).toLowerCase();
  return THEMES.filter(t => t !== "all" && text.includes(t));
}
const TAGGED = CHAPTERS.map(c => ({ ...c, tags: getTags(c) }));

// ─── Star Field ───────────────────────────────────────────────────────────────
// ─── Star Field ───────────────────────────────────────────────────────────────
function StarField({ dark }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!dark) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let W, H, raf;
    const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    resize();
    window.addEventListener("resize", resize);
    const STARS = Array.from({ length: 180 }, () => ({
      x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
      r: Math.random() * 1.1 + 0.15, vx: (Math.random() - 0.5) * 0.06, vy: (Math.random() - 0.5) * 0.06,
      base: Math.random() * 0.55 + 0.18, pulse: Math.random() * Math.PI * 2,
      pspd: Math.random() * 0.006 + 0.002, blue: Math.random() < 0.15,
    }));
    const LINKS = [];
    for (let i = 0; i < STARS.length; i++)
      for (let j = i + 1; j < STARS.length; j++) {
        const dx = STARS[i].x - STARS[j].x, dy = STARS[i].y - STARS[j].y;
        if (Math.sqrt(dx*dx + dy*dy) < 110 && Math.random() < 0.045) LINKS.push([i, j]);
      }
    let shooters = [], nextShoot = 300 + Math.random() * 500, frame = 0;
    const draw = () => {
      frame++;
      ctx.clearRect(0, 0, W, H);
      LINKS.forEach(([i, j]) => {
        const a = STARS[i], b = STARS[j];
        ctx.strokeStyle = "rgba(255,255,255,0.032)"; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      });
      STARS.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.pulse += p.pspd;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const alpha = p.base * (0.75 + 0.25 * Math.sin(p.pulse));
        const col = p.blue ? `rgba(210,225,255,${alpha.toFixed(3)})` : `rgba(255,255,255,${alpha.toFixed(3)})`;
        if (p.r > 0.75) {
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
          g.addColorStop(0, p.blue ? `rgba(200,220,255,${(alpha*0.35).toFixed(3)})` : `rgba(255,255,255,${(alpha*0.28).toFixed(3)})`);
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = col; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      });
      if (frame >= nextShoot) {
        shooters.push({ x: Math.random()*W*0.7, y: Math.random()*H*0.5, len: 90+Math.random()*110, angle: Math.PI*0.22+(Math.random()-0.5)*0.25, speed: 7+Math.random()*7, life: 1 });
        nextShoot = frame + 350 + Math.random() * 600;
      }
      shooters = shooters.filter(s => s.life > 0.02);
      shooters.forEach(s => {
        s.x += Math.cos(s.angle)*s.speed; s.y += Math.sin(s.angle)*s.speed; s.life -= 0.022;
        const tail = ctx.createLinearGradient(s.x, s.y, s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
        tail.addColorStop(0, `rgba(255,255,255,${(s.life*0.85).toFixed(2)})`);
        tail.addColorStop(1, "rgba(255,255,255,0)");
        ctx.strokeStyle = tail; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len); ctx.stroke();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, [dark]);
  if (!dark) return null;
  return <canvas ref={canvasRef} style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }} />;
}

function InkBlobs({ show }) {

      <div style={{ position: "absolute", top: "52%", left: "-18%", width: 520, height: 520, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,0,0,0.016) 0%, transparent 68%)", animation: "blobDrift 20s ease-in-out infinite alternate-reverse" }} />
    </div>

}

// ─── Scroll progress bar ──────────────────────────────────────────────────────
function ScrollProgress({ dark, customColor }) {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      setPct(el.scrollHeight - el.clientHeight > 0 ? (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100 : 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const bg = customColor || (dark ? "linear-gradient(90deg, rgba(220,220,220,0.8), rgba(255,255,255,0.9))" : "linear-gradient(90deg, rgba(0,0,0,0.3), rgba(0,0,0,0.18))");
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: 2, zIndex: 100 }}>
      <div style={{ height: "100%", width: `${pct}%`, background: bg, transition: "width 0.1s linear", boxShadow: dark ? "0 0 12px rgba(255,255,255,0.3)" : "none" }} />
    </div>
  );
}

// ─── Intro screen ─────────────────────────────────────────────────────────────
// ─── Bouncing Balls — header animation ────────────────────────────────────────
function BouncingBalls({ dark, scroll }) {
  // Ball color: black on light/scroll, white on dark
  const ballColor = dark
    ? "rgba(255,255,255,0.13)"
    : scroll
      ? "rgba(15,8,0,0.10)"
      : "rgba(0,0,0,0.10)";
  const balls = [
    { size: 8,  startX: "8%",  delay: 0,    duration: 3.8, amplitude: 18, phase: 0 },
    { size: 5,  startX: "18%", delay: 0.6,  duration: 4.5, amplitude: 12, phase: 1 },
    { size: 10, startX: "30%", delay: 1.1,  duration: 3.2, amplitude: 22, phase: 0.4 },
    { size: 6,  startX: "45%", delay: 0.3,  duration: 5.0, amplitude: 14, phase: 0.8 },
    { size: 9,  startX: "60%", delay: 0.9,  duration: 3.6, amplitude: 20, phase: 0.2 },
    { size: 5,  startX: "72%", delay: 1.4,  duration: 4.2, amplitude: 11, phase: 0.6 },
    { size: 7,  startX: "83%", delay: 0.4,  duration: 4.8, amplitude: 16, phase: 1.2 },
    { size: 4,  startX: "92%", delay: 1.8,  duration: 3.4, amplitude: 9,  phase: 0.9 },
  ];
  return (
    <div style={{ position:"absolute", inset:0, pointerEvents:"none", overflow:"hidden", borderRadius:22, zIndex:0 }}>
      <style>{`
        @keyframes ballBounceLeft  { 0%,100%{transform:translateY(0px);} 50%{transform:translateY(var(--amp));} }
        @keyframes ballBounceRight { 0%,100%{transform:translateY(var(--amp));} 50%{transform:translateY(0px);} }
      `}</style>
      {balls.map((b, i) => {
        const fromLeft = i % 2 === 0;
        return (
          <div key={i} style={{
            position: "absolute",
            left: b.startX,
            top: "50%",
            marginTop: -(b.size / 2),
            width: b.size,
            height: b.size,
            borderRadius: "50%",
            background: ballColor,
            "--amp": (fromLeft ? -b.amplitude : b.amplitude) + "px",
            animation: `${fromLeft ? "ballBounceLeft" : "ballBounceRight"} ${b.duration}s ${b.delay}s ease-in-out infinite`,
          }} />
        );
      })}
    </div>
  );
}

function IntroScreen({ onDone }) {
  const [phase, setPhase] = useState(1);
  const [leaving, setLeaving] = useState(false);
  function handleTap() { setLeaving(true); setTimeout(onDone, 600); }
  return (
    <div onClick={handleTap} style={{
      position: "fixed", inset: 0, zIndex: 999,
      background: "radial-gradient(ellipse at 50% 40%, #1c1408 0%, #0a0704 100%)",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      cursor: "pointer",
      opacity: leaving ? 0 : 1,
      transition: "opacity 0.6s ease",
    }}>
      <style>{`
        @keyframes introImgIn { from { opacity:0; transform:scale(0.88); filter:blur(20px); } to { opacity:1; transform:scale(1); filter:blur(0); } }
        @keyframes introLineIn { from { opacity:0; } to { opacity:0.16; } }
        @keyframes introT1 { 0%{opacity:0;transform:translateY(10px);} 100%{opacity:1;transform:translateY(0);} }
        @keyframes introT2 { 0%{opacity:0;transform:translateY(8px);} 100%{opacity:1;transform:translateY(0);} }
        @keyframes introT3 { 0%{opacity:0;} 100%{opacity:0.42;} }
        @keyframes introGlow { 0%,100%{box-shadow:0 0 50px rgba(180,120,30,0.22),0 0 100px rgba(120,70,5,0.10);} 50%{box-shadow:0 0 80px rgba(200,140,40,0.32),0 0 140px rgba(150,90,15,0.15);} }
        @keyframes tapGlow { 0%,100%{ color: rgba(180,148,82,0.30); text-shadow:0 0 6px rgba(212,175,100,0.10); } 50%{ color: rgba(228,192,116,0.65); text-shadow:0 0 18px rgba(228,192,116,0.65); } }
      `}</style>
      <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse 60% 50% at 50% 42%, rgba(100,55,8,0.42) 0%, transparent 70%)", pointerEvents:"none" }} />
      <div style={{
        position:"relative", width:"min(320px,68vw)", height:"min(415px,88vw)",
        borderRadius:"28% / 22%", overflow:"hidden",
        animation:"introImgIn 1.1s cubic-bezier(.2,.8,.3,1) both, introGlow 4s ease-in-out 1.2s infinite",
        border:"1px solid rgba(180,130,40,0.20)", marginBottom:32,
      }}>
        <img src={IMG_COLOR} alt="Legends of Ren Zu" style={{ width:"100%", height:"100%", objectFit:"cover", objectPosition:"center top", display:"block" }} />
        <img src={IMG_LINE} alt="" style={{
          position:"absolute", inset:0, width:"100%", height:"100%",
          objectFit:"cover", objectPosition:"center top",
          mixBlendMode:"screen", filter:"invert(1) brightness(0.55)",
          opacity:0, animation:"introLineIn 2.2s 0.5s ease both",
        }} />
        <div style={{ position:"absolute", inset:0, background:"linear-gradient(180deg, rgba(0,0,0,0.28) 0%, transparent 28%, transparent 55%, rgba(0,0,0,0.75) 82%, rgba(0,0,0,0.97) 100%)", pointerEvents:"none" }} />
      </div>
      <div style={{ textAlign:"center", padding:"0 16px", width:"100%", maxWidth:"min(580px,94vw)" }}>
        {phase >= 1 && (<>
          <div style={{ fontFamily:"'Cinzel Decorative', Georgia, serif", fontSize:"clamp(9px,2.5vw,11px)", letterSpacing:"0.38em", color:"rgba(200,155,60,0.75)", textTransform:"uppercase", marginBottom:10, animation:"introT3 0.8s ease both" }}>Reverend Insanity · Gu Zhen Ren</div>
          <div style={{ fontFamily:"'Cinzel Decorative', Georgia, serif", fontSize:"clamp(16px,4.2vw,28px)", fontWeight:700, color:"#ede0bb", letterSpacing:"0.04em", lineHeight:1.2, marginBottom:16, animation:"introT1 0.7s 0.1s ease both", textShadow:"0 2px 28px rgba(200,140,30,0.55)", whiteSpace:"nowrap" }}>The Legends of Ren Zu</div>
          <div style={{ fontFamily:"'EB Garamond', 'Cormorant Garamond', Georgia, serif", fontStyle:"italic", fontWeight:400, fontSize:"clamp(8px,1.1vw,9px)", color:"rgba(226,206,165,0.68)", letterSpacing:"0.04em", lineHeight:1.35, maxWidth:"min(360px,80vw)", margin:"0 auto 16px", textAlign:"center", animation:"introT2 0.7s 0.22s ease both" }}>The Legends of Ren Zu is an esoteric tragedy chronicling how humanity's first ancestor, Ren Zu, bartered his very essence to primordial concepts in a relentless, brutal pursuit to ultimately conquer Fate itself.</div>
          <div style={{ fontFamily:"'Poppins', sans-serif", fontWeight:300, fontSize:"clamp(8px,1.8vw,9px)", color:"rgba(180,148,82,0.30)", letterSpacing:"0.30em", textTransform:"uppercase", animation:"introT3 0.5s 0.5s ease both, tapGlow 2.6s ease-in-out 1.2s infinite" }}>Tap to enter</div>
        </>)}
      </div>
    </div>
  );
}

// ─── Deep parchment overlay — cracks, burns, age stains ────────────────────
function ParchmentOverlay({ scroll }) {
  if (!scroll) return null;
  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 1, overflow: "hidden" }}>
      {/* Deep vignette — corners burn dark like old leather */}
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(72,38,5,0.38) 75%, rgba(45,18,2,0.62) 100%)" }} />

      {/* Top torn/burned edge */}
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 120,
        background: "linear-gradient(180deg, rgba(55,22,2,0.70) 0%, rgba(90,45,8,0.30) 40%, transparent 100%)" }} />
      {/* Bottom torn/burned edge */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 120,
        background: "linear-gradient(0deg, rgba(55,22,2,0.70) 0%, rgba(90,45,8,0.30) 40%, transparent 100%)" }} />
      {/* Left edge shadow — parchment curling */}
      <div style={{ position: "absolute", top: 0, bottom: 0, left: 0, width: 60,
        background: "linear-gradient(90deg, rgba(45,18,2,0.55) 0%, rgba(90,45,8,0.18) 60%, transparent 100%)" }} />
      {/* Right edge shadow */}
      <div style={{ position: "absolute", top: 0, bottom: 0, right: 0, width: 60,
        background: "linear-gradient(270deg, rgba(45,18,2,0.55) 0%, rgba(90,45,8,0.18) 60%, transparent 100%)" }} />

      {/* SVG cracks layer — main crack runs through header area */}
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.55 }} viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
        {/* MAIN HEADER CRACK — runs through the top/header zone, prominent */}
        <path d="M 300 0 L 360 18 L 410 8 L 480 32 L 520 22 L 600 45 L 660 28 L 740 52 L 800 38 L 880 60 L 950 44 L 1040 68 L 1100 52 L 1160 72" stroke="#3d1a00" strokeWidth="2.8" fill="none" strokeLinecap="round"/>
        {/* Branch from main header crack */}
        <path d="M 480 32 L 470 58 L 455 80 L 462 105" stroke="#3d1a00" strokeWidth="1.4" fill="none" strokeLinecap="round"/>
        <path d="M 480 32 L 498 55 L 488 78" stroke="#3d1a00" strokeWidth="0.9" fill="none" strokeLinecap="round"/>
        <path d="M 740 52 L 748 78 L 736 102 L 752 128" stroke="#3d1a00" strokeWidth="1.3" fill="none" strokeLinecap="round"/>
        <path d="M 740 52 L 728 72 L 718 90" stroke="#3d1a00" strokeWidth="0.8" fill="none" strokeLinecap="round"/>

// ─── Typewriter ───────────────────────────────────────────────────────────────
function Typewriter({ text, color, streaming, font }) {
  // streaming=true: text grows live token-by-token from Groq stream, render directly
  // streaming=false: Together AI non-stream, animate character-by-character on arrival
  const [displayed, setDisplayed] = useState("");
  const prevText = useRef("");

  useEffect(() => {
    if (streaming) {
      setDisplayed(text);
      prevText.current = text;
      return;
    }
    if (!text) { setDisplayed(""); prevText.current = ""; return; }
    if (text === prevText.current) return;
    prevText.current = text;
    setDisplayed("");
    let i = 0;
    const interval = setInterval(() => {
      i += 3; setDisplayed(text.slice(0, i));
      if (i >= text.length) clearInterval(interval);
    }, 10);
    return () => clearInterval(interval);
  }, [text, streaming]);

  return <span style={{ color, fontFamily: font || "'IM Fell English', 'Palatino Linotype', Georgia, serif", fontSize: 14, lineHeight: 1.9 }}>{displayed}</span>;
}

function highlight(text, q) {
  if (!q) return text;
  const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
  return parts.map((p, i) => p.toLowerCase() === q.toLowerCase()
    ? <mark key={i} style={{ background: 'rgba(212,168,60,0.45)', color: 'inherit', borderRadius: 2, padding: '0 1px' }}>{p}</mark>
    : p
  );
}

// Theme-aware highlight — scroll mode uses a darker mark so it contrasts against parchment
function highlightThemed(text, q, S, D) {
  if (!q) return text;
  const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
  const bg = S ? 'rgba(80,38,4,0.55)' : D ? 'rgba(200,180,255,0.35)' : 'rgba(212,168,60,0.45)';
  const color = S ? '#f5e6c8' : 'inherit';
  return parts.map((p, i) => p.toLowerCase() === q.toLowerCase()
    ? <mark key={i} style={{ background: bg, color, borderRadius: 2, padding: '0 1px' }}>{p}</mark>
    : p
  );
}

        <button onClick={onClose} style={{
          position: "absolute", top: 12, right: 14, width: 32, height: 32, borderRadius: "50%",
          background: "transparent", border: "none", color: textDim, fontSize: 18, cursor: "pointer",
        }}>✕</button>

        <div style={{ fontSize: 40, marginBottom: 8 }}>{failed ? "⚠️" : data.code ? "🎁" : "⏳"}</div>
        <div style={{ fontFamily: headFont, fontSize: 20, fontWeight: 700, color: text, marginBottom: 8 }}>
          {failed ? "Offering incomplete" : data.code ? "Your realm code is ready" : "Confirming your offering"}
        </div>

        <div style={{ fontSize: 13, color: textDim, lineHeight: 1.6, marginBottom: 16, fontFamily: "'IM Fell English', Georgia, serif" }}>
          {failed
            ? "Flutterwave returned you without a successful payment. If you were charged, contact support with the transaction reference below."
            : data.code
              ? "If the email delays or never arrives, you can still claim your realm right here or copy the code for later."
              : "Your payment redirect worked. Heaven is now waiting for the webhook to finish refining your access code. This can take a few seconds."}
        </div>

        {data.txRef && (
          <div style={{
            fontSize: 10, color: textDim, marginBottom: 14, lineHeight: 1.6,
            padding: "10px 12px", borderRadius: 12, border: `1px solid ${border}`,
            background: D ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.03)",
            overflowWrap: "anywhere"
          }}>
            <strong style={{ color: text }}>Transaction Ref:</strong> {data.txRef}
          </div>
        )}

        {!failed && data.loading && (
          <div style={{ fontSize: 12, color: textDim, marginBottom: 16 }}>
            Waiting for Flutterwave webhook confirmation…
          </div>
        )}

        {!failed && data.code && (
          <>
            <div style={{
              marginBottom: 14, padding: "16px 14px", borderRadius: 16,
              border: `1px solid ${border}`,
              background: D ? "rgba(255,255,255,0.04)" : S ? "rgba(139,94,26,0.08)" : "rgba(0,0,0,0.03)"
            }}>
              <div style={{ fontSize: 10, color: textDim, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6, fontFamily: headFont }}>
                {data.tier ? `${data.tier.replaceAll("_", " ")} token` : "Cultivator token"}
              </div>
              <div style={{ fontFamily: headFont, fontSize: 18, color: text, letterSpacing: "0.08em", overflowWrap: "anywhere" }}>
                {data.code}
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
              <button onClick={onRedeem}
                disabled={data.redeeming}
                style={{
                  padding: "10px 16px", borderRadius: 12, border: `1px solid ${border}`,
                  background: D ? "rgba(255,255,255,0.13)" : S ? "#c79a3b" : "#1a1a1a",
                  color: D ? "#fff" : S ? "#1f0f02" : "#fff", fontSize: 12, cursor: "pointer", fontFamily: headFont, fontWeight: 600,
                  opacity: data.redeeming ? 0.7 : 1,
                }}>
                {data.redeeming ? "Claiming…" : "Claim realm now"}
              </button>
              <button onClick={copyCode}
                style={{
                  padding: "10px 16px", borderRadius: 12, border: `1px solid ${border}`,
                  background: "transparent", color: text, fontSize: 12, cursor: "pointer", fontFamily: headFont, fontWeight: 600,
                }}>
                {copied ? "Copied" : "Copy code"}
              </button>
            </div>
          </>
        )}

        {!failed && !data.loading && !data.code && (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
            <button onClick={onRetry}
              style={{
                padding: "10px 16px", borderRadius: 12, border: `1px solid ${border}`,
                background: "transparent", color: text, fontSize: 12, cursor: "pointer", fontFamily: headFont, fontWeight: 600,
              }}>
              Check again
            </button>
          </div>
        )}

        {data.error && <div style={{ fontSize: 11, color: "tomato", marginTop: 10, lineHeight: 1.6 }}>{data.error}</div>}
      </div>
    </div>
  );
}

// ─── Refinement Cauldron — fake-out tier animation ────────────────────────────
function RefinementCauldron({ tier }) {
  const [phase, setPhase] = useState("brewing");
  const [hidden, setHidden] = useState(false);
  const doFakeout = tier === "gu_immortal" || tier === "venerable";
  const cfg = {
    gu_master:   { liquid: "#d8a34d", name: "Gu Master"   },
    gu_immortal: { liquid: "#62e8ff", name: "Gu Immortal" },
    venerable:   { liquid: "#ffd36a", name: "Venerable"   },
  }[tier] || { liquid: "#d8a34d", name: "Gu Master" };

  React.useEffect(() => {
    setHidden(false);
    setPhase("brewing");
    if (doFakeout) {
      const t1 = setTimeout(() => setPhase("failing"),     1150);
      const t2 = setTimeout(() => setPhase("persevering"), 1850);
      const t3 = setTimeout(() => setPhase("success"),     2250);
      const t4 = setTimeout(() => setHidden(true),         3200);
      return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
    } else {
      const t1 = setTimeout(() => setPhase("success"), 1100);
      const t2 = setTimeout(() => setHidden(true),     2200);
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }
  }, [tier, doFakeout]);

  if (hidden) return null;

  const liquidColor =
    phase === "failing"      ? "#ff4438" :
    phase === "persevering"  ? "#ffffff" :
    cfg.liquid;

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 10005,
      background: phase === "persevering"
        ? "radial-gradient(ellipse at center, rgba(255,255,255,0.20), rgba(0,0,0,0.96))"
        : "radial-gradient(ellipse at center, rgba(0,0,0,0.92), rgba(0,0,0,1))",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      animation: phase === "failing" ? "rcCauldronShake 0.06s infinite" : "none",
      overflow: "hidden",
    }}>
      <style>{`
        @keyframes rcCauldronShake { 0%,100% { transform: translate(0,0); } 25% { transform: translate(-4px,3px); } 50% { transform: translate(3px,-3px); } 75% { transform: translate(-3px,2px); } }
        @keyframes rcBubbleRise {
          0% { transform: translateY(0) scale(1); opacity: 0.8; }
          90% { opacity: 0.5; }
          100% { transform: translateY(-130px) scale(0.2); opacity: 0; }
        }
        @keyframes rcSteamWisp {
          0% { transform: translateY(0) scaleX(1); opacity: 0.45; }
          50% { opacity: 0.85; }
          100% { transform: translateY(-240px) scaleX(2.2); opacity: 0; }
        }
        @keyframes rcLiquidSurge {
          0%,100% { transform: scaleY(1); filter: brightness(1); }
          50% { transform: scaleY(1.05); filter: brightness(1.35); }
        }
        @keyframes rcBurstRing {
          0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
          100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
        }
        @keyframes rcTextPulse {
          0%,100% { opacity: 0.95; }
          50% { opacity: 1; transform: translate(-50%,-50%) scale(1.04); }
        }
        .rc-bubble-anim { animation: rcBubbleRise 1.5s ease-in infinite; }
        .rc-steam-anim  { animation: rcSteamWisp 2.2s ease-out infinite; }
        .rc-liquid-anim { animation: rcLiquidSurge 1.0s ease-in-out infinite; }
        .rc-burst-ring-anim { animation: rcBurstRing 0.9s ease-out forwards; }
      `}</style>

      {Array.from({ length: 30 }).map((_, i) => (
        <div key={i} style={{
          position: "absolute",
          left: `${(i*9.7) % 100}%`,
          top: `${(i*11.3) % 70}%`,
          width: 1.5 + (i % 3),
          height: 1.5 + (i % 3),
          borderRadius: "50%",
          background: phase === "failing" ? "#ff4438" : cfg.liquid,
          boxShadow: `0 0 6px ${phase === "failing" ? "#ff4438" : cfg.liquid}`,
          animation: `rcBubbleRise ${3 + (i % 3)}s ease-in infinite`,
          animationDelay: `${(i*100) % 1500}ms`,
          opacity: 0.55,
        }} />
      ))}

      <div style={{
        position: "relative", width: "min(260px, 70vw)", height: "min(290px, 70vw)",
      }}>
        <div style={{
          position: "absolute", left: "50%", top: -10, transform: "translateX(-50%)",
