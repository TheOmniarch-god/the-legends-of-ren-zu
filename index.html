 Self Gu was residing within it. He also had a Heart of\nDiscontent.\nThus, right now, he took out the Heart of Discontent.\nThe Heart of Discontent was dry and shrivelled, small and weak, because this\nheart had little blood left. Ren Zu had once used almost all of his heart blood in\nOrdinary Abyss to grow the grass and trees of achievement.\nLove Gu flew into the Heart of Discontent and flew out, then it flew into the\nHeart of Domination and flew out again. It flew into the sky and said: \u201cAlright,\nyou want the Fire of Love, let these two hearts clash.\u201d\nThe Snowman and Ren Zu took out their respective hearts, putting them\ntogether.\nCrackle, sparks were created. The sparks grew rapidly, turning into a Blazing\nFlame \u2014 Fire of Love.\nThe Fire of Love burned on Ren Zu\u2019s heart of discontent; it instantly turned\nthis heart into ashes. Ren Zu was stunned.\nLove Gu said: \u201cLove has a price; it makes people willing to sacrifice.\u201d\nThe Snowman laughed: \u201cOh Ren Zu, thankfully you have two hearts; otherwise, without a heart, you would die.\u201d\nThe Snowman turned to look at the Heart of Domination in her hand. The Fire\nof Love enveloped this heart, but this heart shone brighter and brighter.\nThe Snowman was nonchalant: \u201cOh, what? This Fire of Love only has an\nimpressive appearance, it neither has the heat of Bright Light Glorious Ring Fire,\nnor the heaviness of Azure Divine Stone Furnace Fire, nor the chaos of Raging\nWave Rising Dragon Fire.\u201d\nAs she said that, she placed the Heart of Domination into her chest. Next, her\nbody started bursting out in flames; she started melting like snowflakes under the\nsun. She turned pale from shock, she quickly patted and attempted to put out the\nFire of Love.\nBut the Fire of Love could not be extinguished. Eventually, the Snowman completely melted, only her heart was left, burning in raging flames.\nRen Zu was extremely shocked; he felt that this Snowman was very strong, to\nthink that she would vanish like this.\n\u201cThe Fire of Love is so scary.\u201d Ren Zu was shocked.\n\nLove Gu said: \u201cThe result of love varies from heart to heart. The heart of the\nSnowman was domination, but you had the Heart of Discontent, and it was completely burned from the fire. Thus, this was the result. Actually, there are good\nresults that can occur when the Fire of Love burns. The results of love varied each\nexperience of love was a risk and gamble.\u201d\nRen Zu suddenly thought of something, becoming stirred up: \u201cOh Love Gu,\nyou said that love can make people willing to sacrifice. This is wonderful, I will fall\nin love with the Feathermen and make them willing to fly for me so that they can\nsave my daughter from Ordinary Abyss.\u201d\nRight at this moment, a voice could be heard: \u201cFather, father.\u201d\nFrom the burning flames of the Heart of Domination, a boy jumped out. He\nwas Blazing Glory Lightning Brilliance.\nBlazing Glory Lightning Brilliance jumped into Ren Zu\u2019s arms as he said:\n\u201cFather, father, so I have a sister as well. I support you, let\u2019s go save sister.\u201d\nRen Zu was extremely overjoyed; he rubbed Blazing Glory Lightning Brilliance\u2019s\nhead as he said: \u201cMy son, you are so smart and sensible.\u201d\nRen Zu brought Blazing Glory Lightning Brilliance and went on a journey\nagain, not long after, they returned to the gathering spot of the Feathermen.\nRen Zu took out his Heart of Loneliness, saying to the Feathermen: \u201cDo you\nall have hearts?\u201d\nThe Feathermen answered: \u201cWe all have the Heart of Freedom.\u201d\nRen Zu laughed: \u201cThen let us fall in love. I have a heart too, as well as Love Gu.\u201d\nThe Feathermen shook their heads: \u201cThe Heart of Freedom will be completely burned in the Fire of Love. The process of pursuing love was also the process of\nlosing freedom.\u201d\nRen Zu was persistent: \u201cThe results of love vary from hearts to hearts. Don\u2019t\njust look at one heart; my Heart of Loneliness is part of the process too.\u201d But no\nmatter how Ren Zu urged, the Feathermen would not agree.\nRen Zu was helpless; he asked Love Gu: \u201cOh Gu, oh Gu, they don\u2019t want to love\nme, you have to help me, and ignite the Fire of Love in our hearts.\u201d\nLove Gu sighed: \u201cThis is beyond my abilities. I cannot force others to love, no\nmatter what heart, it has to collide on its own free will.\u201d\nRen Zu shook his head: \u201cNo, this is a good chance to save my daughter; I cannot\ngive up. Self Gu, I will rely on you.\u201d\nSelf Gu nodded, using its strength. It had once eaten a mouthful of Strength\nGu, and right now, Ren Zu had his strength. Thus, these Feathermen were all cap76\n\ntured by Ren Zu; their hearts were dug out and used to collide with Ren Zu\u2019s heart.\nBut no matter how they collided, there were no hearts that created the spark\nof love.\nLove Gu sighed: \u201cOh Ren Zu, forcing others to love is impossible, you will only\ncreate hatred.\u201d As it said that, a Gu Worm appeared before Ren Zu.\nRen Zu took a look, and it was Hatred Gu indeed. Hatred Gu made all of the\nFeathermen feel hatred. They shouted: \u201cOh Ren Zu, you are too much; you are\nbullying us, and we will make you pay the price.\u201d\nThus, these Feathermen flew up together, shining worms were flying out of their\nbodies; they were wild Freedom Gu.\nThe Freedom Gu fused together into a gigantic Freedom Gu. This Freedom Gu\neasily took away Ren Zu\u2019s Love Gu.\n\u201cHenceforth, love is free.\u201d This giant Freedom Gu said.\nRen Zu\u2019s Self Gu quickly flew out, wanting to snatch Love Gu, but it could not\noverpower Freedom Gu; it only managed to take a bite of Love Gu.\nSelf Gu said angrily: \u201cLove also belongs to oneself.\u201d" },
  { num: "28", title: "Miniman in a well", body: "Boundless Forest Samsara was separated from her father, Ren Zu, and could\nonly stay in Ordinary Abyss.\nShe was heartbroken and did not feel happy eating the fruits anymore.\nEvery day, she would shed tears and weep incessantly, until she got tired and\ngradually fell asleep.\nIn a dream of hers, she vaguely heard some extremely soft voices and felt something small, like an ant, climbing her body.\nImmediately, she woke up and sat up, and saw a Miniman was climbing on her\nbody.\nBecause of Boundless Forest Samsara\u2019s movement, this Miniman\u2019s foothold\nbecame unstable, and it fell to the ground.\n\u201cWho are you? There is actually such a small person like you in the world?\u201d\nBoundless Forest Samsara saw the Miniman that was not even the size of her\nfinger and felt extremely curious, forgetting to cry for a moment.\nThe Miniman looked at the giant Boundless Forest Samsara with a stupefied\nlook, and after the shock, he raised his head and started crying loudly.\n\u201cHey, little person, I am not crying, what are you crying for?\u201d Boundless Forest\nSamsara was puzzled.\nThe Miniman spoke while crying, \u201cI am the tallest in my tribe, and I was brave,\narrogant, and proud because of this. Today, I intended to climb a mountain, but to\nthink that this mountain was really a person. There are actually such giant people\nlike you in the world; this is the first time I\u2019ve seen someone like you, so I burst\ninto tears.\u201d\nAlmost every person who explored and grew up would have such a mental journey.\nThe more they saw, the more they realized their weaknesses. Sometimes they\nwould sigh at the vastness of the world, and sometimes they would find how far\ntheir goal was, and to reach their goal, they had to go through an endless journey\nwhich they had not considered before. They would feel loss, bewilderment, discouragement, panic, even hopelessness.\nThus, one could understand the Miniman crying when it saw Boundless Forest\nSamsara." },
  { num: "29", title: "Opening one\u2019s horizon", body: "Ren Zu\u2019s fourth child, Boundless Forest Samsara, fell from the tree; she did not\nfollow after Ren Zu; instead, she was trapped inside Ordinary Abyss.\nOne day, when she was sleeping, she met a Miniman.\nThe Miniman was crying; Boundless Forest Samsara asked him why.\nThe Miniman spoke while crying: \u201cI am the tallest in my tribe, and I was brave,\narrogant, and proud because of this. Today, I intended to climb a mountain, but to\nthink that this mountain was really a person. There are actually such giant people\nlike you in the world; this is the first time I\u2019ve seen someone like you, so I burst\ninto tears.\u201d\nSince then, Boundless Forest Samsara and the Miniman became good friends;\nthey were inseparable.\n\u201cMiniman, oh Miniman, where is your father? Do you not have siblings? Why\nhave I never seen your family?\u201d One day, Boundless Forest Samsara asked the Miniman.\nThe Miniman directed Boundless Forest Samsara to a well, saying: \u201cLook at this\nwell; my former home is inside.\u201d\nBoundless Forest Samsara sprawled in front of the well, extending her head to\nlook inside.\nNext, she shouted: \u201cAh, there are so many Minimen!\u201d\nShe saw that there were countless Minimen inside the well; they were living\ntogether. They built many houses; they lived among each other; there were markets, flowers; it was a harmonious scene; they were very happy.\nThe Minimen in the well also shouted: \u201cWhy did the sky become so dark? It\u2019s\nnight time already.\u201d\n\u201cThere was thunder but no rain; I don\u2019t see lightning either.\u201d\nThe Minimen were in panic; they discussed as the entire city went into commotion.\n\u201cYour family is here? Why did you go outside the well? You don\u2019t want to live\nwith them?\u201d Boundless Forest Samsara asked.\nThe Miniman shook his head: \u201cThey were the ones who exiled me; they think\nI am a monster.\u201d\n\u201cOh? Why is that?\u201d Boundless Forest Samsara was curious.\n\nThe Miniman answered with sadness: \u201cI told them that the world we were living\nin was just a well. The outside world is very big. But they did not believe me; they\ntold me to stop spouting nonsense.\u201d\n\u201cI also told them that the mountain at the fringe of our city is a very small\nmound. But they refuse to believe me; they think that it is the tallest mountain in\nthe world; they told me to stop spreading lies.\u201d\n\u201cWhich mountain is it?\u201d Boundless Forest Samsara asked.\n\u201cThat\u2019s Miniscule Mountain.\u201d The Miniman pointed.\nBoundless Forest Samsara started to giggle: \u201cYou call that a mountain? It can\nfit in my palm.\u201d\nSuddenly, Boundless Forest Samsara clapped: \u201cThen let me tell them the truth.\u201d\nThe Miniman shook his head: \u201cIt is useless.\u201d\nBoundless Forest Samsara did not believe him; she faced the well as she shouted; the Minimen inside started to panic even more.\nThey felt that today was too strange.\nNot only did the sky turn dark, but there was also thunder rumbling, and it was\ngetting louder and more frequent.\n\u201cHeaven is raging, I want to repent, I want to confess.\u201d\n\u201cNo, it is a monster, a monster ate heaven; it is burping now.\u201d\n\u201cSave me, this world is getting destroyed.\u201d\nSome Minimen knelt on the ground and begged; some had despair on their faces,\nwhile others were running around crazily.\nBoundless Forest Samsara\u2019s breathing became a tornado inside the well.\nBoundless Forest Samsara\u2019s saliva became a huge rainstorm when it went into\nthe well.\nBoundless Forest Samsara\u2019s words were like rumbling thunder in the Minimen\u2019s\nears; their eardrums almost burst from it.\nBoundless Forest Samsara eventually gave up; she sprawled outside the well,\nexhausted; she said weakly: \u201cWhy are these Minimen so stupid? Can\u2019t they be like\nyou, to get out of the well and see the world?\u201d\nThe Miniman shook his head as he sighed: \u201cThey think that they are big enough;\nthey think the sky is round; they think the mountain is only that tall; they think\nlife is just like this.\u201d\n\u201cThen why did you climb out?\u201d Boundless Forest Samsara opened her eyes wide\nas she asked with curiosity.\nThe Miniman smiled bitterly: \u201cBecause I realized how small and insignificant,\nI was; therefore, I got out to see how big the world is.\u201d" },
  { num: "30", title: "Perseverance bears a ladder", body: "Boundless Forest Samsara made friends with a Miniman, and the Miniman\nbrought her to see his home \u2014 City Well. After Boundless Forest Samsara saw\nCityWell, she raised her head at the sky.\n\u201cI understand now,\u201d Boundless Forest Samsara looked above her.\nShe was trapped inside Ordinary Abyss, just like the Minimen who were trapped\nunder the well. The Minimen raised their heads and saw the sky within the well,\nmuch like the sky that Boundless Forest Samsara saw when she looked up at Ordinary Abyss.\n\u201cI have decided; I will work hard and get out of this abyss to meet with father\nagain!\u201d\nBoundless Forest Samsara raised her fists, making up her mind.\nThe Miniman was overjoyed: \u201cSure. I want to leave Ordinary Abyss and see the\nworld outside as well. I see that there are many trees here in Ordinary Abyss; we\ncan chop them down and make a ladder to climb up.\u201d\nBoundless Forest Samsara gasped, looking at the Miniman: \u201cOh Miniman, don't\nyou have wings? Why can't you fly out?\u201d\nThe Miniman smiled bitterly: \u201cOh human, I might have a pair of wings, but\nthey are flimsy and weak. They can only carry me for a short distance. When I left\nCity Well, I also used a ladder.\u201d\n\u201cSo that's it,\u201d Boundless Forest Samsara realized.\nIn the following days, she stayed with the Miniman, chopping trees, and creating a ladder. Trees were chopped down one by one, and Wisdom Gu flew out\nfrom them.\nBoundless Forest Samsara was shocked: \u201cWisdom Gu, why are you here?\u201d\n\u201cWisdom is hidden in the ordinary; of course, I can be here,\u201d Wisdom Gu\nanswered.\nNext, Wisdom Gu said: \u201cYou are all very smart; you know how to use the\nachievements of predecessors to escape from being ordinary. But if you two want\nto leave Ordinary Abyss, you need to build your own ladders and complete them\nalone. Otherwise, you cannot leave.\u201d\nBoundless Forest Samsara quickly nodded: \u201cOh Wisdom Gu, thanks for reminding us; we will take note.\u201d\n\nShe and the Miniman made their own ladders. The ladders became taller and\ntaller; soon, Boundless Forest Samsara's ladder surpassed the Miniman's. The Miniman's ladder was short and small, with a small distance between each step. In comparison, Boundless Forest Samsara's ladder was long and tall.\nBoundless Forest Samsara teased the Miniman: \u201cMiniman, oh Miniman, the\nladder I make in half a day is as tall as the one you make in half a month. At this rate,\nwhen can you make a proper ladder to step on and escape from Ordinary Abyss?\u201d\nThe Miniman was helpless: \u201cI can't help it; I am already doing my best. But this\nis all the wood I can carry after spending half a day, while you only need one hand\nto carry this over. I need to use a long time to chop down a small tree, but you only\ntake three swings. I am already doing my best to reach this extent.\u201d\nBoundless Forest Samsara nodded: \u201cIt is a pity we can only make our own ladders.\u201d\nThe Miniman replied: \u201cThat's right; to leave Ordinary Abyss, we can use our\npredecessors\u2019 achievements, but we truly need to rely on ourselves. Let's continue working hard.\u201d\nBoundless Forest Samsara and the Miniman continued to chop down trees to\nmake their ladders. Trees fell one by one, and from within, Strength Gu flew out.\nBoundless Forest Samsara was shocked: \u201cOh Strength Gu, why are you here?\u201d\n\u201cStrength is hidden in the ordinary; of course, I can be here,\u201d Strength Gu\nanswered.\nBoundless Forest Samsara thought about it and asked: \u201cOh Strength Gu, can\nyou give us any advice? Like Wisdom Gu.\u201d\nStrength Gu said: \u201cI have no advice to give you, but I can grant you great\nstrength, as long as you give me your youth.\u201d\nBoundless Forest Samsara fell into hesitation.\nStrength Gu said: \u201cAccording to your current strength, when will you be able\nto build a ladder tall enough to escape Ordinary Abyss?\u201d\nBoundless Forest Samsara thought: \u201cVery long; I will need twenty to thirty\nyears.\u201d\nStrength Gu said: \u201cYes, by then, you will no longer be young; you will lose your\nyouth and become middle-aged. Rather than that, you might as well give me your\nyouth. Even though you will become middle-aged, you only need a few years to\nbuild the ladder.\u201d\nBoundless Forest Samsara thought about it and nodded: \u201cYou are absolutely\nright, Strength Gu; I will rely on you.\u201d\nThus, Boundless Forest Samsara obtained Strength Gu, and her speed in build82\n\ning the ladder became very fast. She could chop more trees at once. A year later,\nher ladder was extremely tall.\nShe stood at the top of the ladder and looked down. She saw that the trees were\nvery small, and the grass was a field of green. She was very happy.\n\u201cSo when I stand at a high point, things that are big usually become small. It is\njust like City Well.\u201d\nShe looked down at the Miniman's ladder; it was very short, less than one percent of hers. She pouted.\nBoundless Forest Samsara walked down and said to the Miniman: \u201cWhy are you\nstill so slow? My ladder is already so tall.\u201d\nThe Miniman looked at her ladder in admiration, saying helplessly: \u201cI really\nadmire you; your strength surpassed me to begin with, but now you also have\nStrength Gu. It is too bad that I have no help; I can only rely on myself. I have\nalready tried my best; every day, other than eating and resting, I spend all my time\nbuilding this ladder. But it cannot match yours.\u201d\nBoundless Forest Samsara nodded: \u201cThat is natural.\u201d\nAnother year passed.\nBoundless Forest Samsara continued to build the ladder even taller. She stood\nat the peak and looked down, only to see that clouds were blocking her vision. She\nwanted to look at the Miniman's ladder, but she could barely see it; it was less than\none ten-thousandth of her ladder.\nBoundless Forest Samsara sighed; she felt lonely. When the wind blew, she shuddered, feeling cold.\n\u201cSo when I stand at this tall point, not only will I feel lonely, I will also feel cold.\u201d\nBoundless Forest Samsara walked down the ladder and told the Miniman about\nthis.\nThe Miniman shook his head: \u201cMy ladder is not tall enough; I don't know how\nyou feel.\u201d\nBoundless Forest Samsara felt bored. She continued to build the ladder, but the\ntime she spent on it was decreasing.\nStrength Gu asked her: \u201cOh human, why are you not building your ladder?\u201d\nBoundless Forest Samsara answered: \u201cThe ladder is too tall and cold; I need to\nrest and regain warmth.\u201d\nAnother year passed.\nBoundless Forest Samsara felt extremely bored. She was still building her ladder,\nbut she was spending less and less time on it.\nStrength Gu asked her: \u201cOh human, why are you not building your ladder?\u201d\n\nBoundless Forest Samsara answered: \u201cThe ladder is too tall; when I look down,\nI get afraid. I need to rest and let my heart calm down.\u201d\nAnother year passed.\nBoundless Forest Samsara became even lazier.\nStrength Gu asked her: \u201cLook at the Miniman; he has never stopped building his\nladder; he is giving it his all. If you continue being lazy, he will surpass you one day.\u201d\nBoundless Forest Samsara laughed: \u201cHow can that be possible? One day of work\nfor me is a month of his. How can he ever surpass me?\u201d\nLike this, years passed without stopping.\nFinally, one day, the Miniman found Boundless Forest Samsara resting under a\ntree, saying to her: \u201cOh friend, my ladder is at the edge of Ordinary Abyss; tomorrow, I will step out and leave Ordinary Abyss.\u201d\nBoundless Forest Samsara laughed: \u201cOh Miniman, don't lie to me; this is too\nfunny.\u201d\nThe Miniman shook his head, saying seriously: \u201cGrandness and being laughable\nis merely an inch apart. But I am not laughable anymore; I am grand and can finally\nleave this Ordinary Abyss. If you do not believe me, watch as I leave.\u201d\nThus, the Miniman started to climb his ladder.\nBoundless Forest Samsara was shocked at this; the Miniman was really at the\nedge of the abyss, and he could leave if he continued like this.\nBoundless Forest Samsara shouted: \u201cOh Miniman, do you not feel cold?\u201d\nThe Miniman said: \u201cOf course, but I want to build my ladder and climb out\nof here.\u201d\nBoundless Forest Samsara shouted again: \u201cOh Miniman, do you not feel lonely?\u201d\nThe Miniman said: \u201cOf course, but I want to build my ladder and climb out\nof here.\u201d\nBoundless Forest Samsara shouted again: \u201cOh Miniman, do you not feel afraid?\u201d\nThe Miniman said: \u201cOf course, but I want to build my ladder and climb out\nof here.\u201d\nAfter saying those three lines, a bright light flashed on his body, rapidly forming into a Gu Worm.\n\u201cMy name is Perseverance; oh Miniman, thank you for giving me life.\u201d Perseverance Gu thanked the Miniman.\nThe Miniman laughed: \u201cGreat, even though I do not have strength, I have perseverance.\u201d\nThe Miniman said as he climbed out of Ordinary Abyss, stepping into the outside world.\n\nHe first saw someone.\nIt was Ren Zu.\nThe rate of time inside Ordinary Abyss was different from the outside world.\nRen Zu sighed as he saw the Miniman: \u201cThis is Perseverance Gu? What a pity,\nif I had it, I would have been able to conquer Reverse Flow River.\u201d" },
  { num: "31", title: "Wealth", body: "When the Miniman saw Ren Zu, Ren Zu sighed. If he had Perseverance Gu\nback then, he would have conquered Reverse Flow River and would not have created such a mess.\nRen Zu wanted to save his children, but until now, he had not achieved anything.\nRen Zu saw that the Miniman had Perseverance Gu and gained new hope; he\nsaid to the Miniman, \u201cMiniman, oh Miniman, I need your help.\u201d\nThe Miniman asked, \u201cOh Ren Zu, how do you want me to help you?\u201d\nRen Zu told the Miniman that he wanted to borrow and use Perseverance Gu.\nThe Miniman said, \u201cOh Ren Zu, the reason why I could leave Ordinary Abyss\nwas that I used the trees that you planted. I chopped down those trees and built\nmy ladder, thus, I owe you a favor.\u201d\nThe Miniman agreed to lend Perseverance Gu to Ren Zu.\nBut after Ren Zu gained Perseverance Gu, he realized he could not use it.\n\u201cThis is the perseverance of the Miniman, not yours, Ren Zu.\u201d Cognition Gu\nappeared at this time and told Ren Zu this fact.\nRen Zu was anguished; he sighed deeply.\nHe asked Cognition Gu, \u201cThen what should I do? I know that Perseverance\nGu can help me, but I cannot use it. I know the Feathermen can help me, but love\ncannot control them.\u201d\nCognition Gu told Ren Zu, \u201cNobody can force anyone to love them, but you\ncan create a Gu to lure the Feathermen into helping you do things. Think about\nit, how did the Miniman gain Perseverance Gu?\u201d\n\nCognition Gu's words were a huge inspiration to Ren Zu.\nRen Zu was overjoyed. \u201cOh Cognition Gu, thank you for the great idea. I know\nwhat to do now; I want to create my own Gu.\u201d\nCognition Gu was curious. \u201cWhat Gu is that?\u201d\nRen Zu shook his head. \u201cI am not sure, but I have an idea. I want this Gu to be\nsomething everyone in the world wants.\u201d\nThus, Ren Zu left Ordinary Abyss and went to the Blue Sea of Life.\nThis was the Blue Sea of Life that formed life Gu; it was the source of all life in\nthe world.\nRen Zu had walked ashore from the Blue Sea of Life; he was back here again.\nRen Zu was thirsty; he scooped up the blue sea water and drank a few mouthfuls.\nHe got thirstier as he drank it, but Ren Zu was satisfied. \u201cI want to use the blue\nsea water to refine Gu. After I succeed, no matter who obtains it, they will never\nbe satisfied, and they will want more.\u201d\nThus, Ren Zu took away a lot of blue sea water.\nAfter the sea level reduced, the beach was exposed. Ren Zu found that there were\nmany sea urchin-like Gu on the beach.\nThis was not life Gu; it was difficulty Gu.\nAny life would face difficulties.\nRen Zu's eyes shone; he said, \u201cI want to refine Gu that everyone needs, but to\nobtain it, there will be difficulties.\u201d\nThus, he took many difficulty Gu.\nAfter doing all these, Ren Zu left the Blue Sea of Life and headed to the Door\nof Life and Death.\nAfter entering it, Ren Zu did not go deeply into the Door of Life and Death but\nonly walked one round around the Road of life.\nHe gathered a lot of worry Gu as he said, \u201cI want to refine Gu that after getting\nit, people will not abandon easily; they will be worried that it will go missing.\u201d\nAfter leaving the Door of Life and Death, along the way, Ren Zu met with Sadness Gu.\nRen Zu laughed happily. \u201cExcellent, I want to refine Gu in which once people\nlose it, they will be very sad. This way, people will not abandon it easily.\u201d\nThus, he collected the Sadness Gu.\nRen Zu had gathered everything; he started to refine Gu.\nThe flames of the Gu refinement raged on, and a lot of black smoke was produced, attracting many Gu and lifeforms to come and watch.\n\n\u201cOh Ren Zu, what Gu are you trying to refine?\u201d Stupidity Gu was lured here\nas it asked curiously.\nRen Zu smiled. \u201cOh Stupidity Gu, if you want to know, go into the fire and see\nfor yourself.\u201d\nStupidity Gu went inside and never came out again.\nNot long after, Wisdom Gu came here as well; it asked, \u201cOh Ren Zu, what are\nyou trying to refine?\u201d\nRen Zu laughed. \u201cOh Wisdom Gu, if you want to know, go into the fire and\nsee for yourself.\u201d\nWisdom Gu flew in too.\nBut it only flew into the black smoke; once its vision was obscured, it flew\naround randomly and flew out again.\n\u201cRen Zu, oh Ren Zu, I was almost deceived by you. I already know what you are\nrefining; I am leaving.\u201d Saying this, Wisdom Gu flew away.\nRen Zu felt that it was a pity; he sighed. \u201cThis way, after my Gu is refined, it can\nenslave stupid people and blind wise people for some time.\u201d\nDays passed one by one.\nThe Gu refinement flame continued to burn, but he did not succeed.\nThe black smoke did not fade away; it gathered in the sky and created huge\nblack clouds.\n\u201cOh Ren Zu, you must have felt it; we are just one step away. This final step is\nthe most crucial one.\u201d Cognition Gu said.\nRen Zu nodded; he stood up with determination and walked towards the fire.\n\u201cIt seems that this Gu needs to be created with human hands.\u201d\nSaying so, Ren Zu chopped off both hands and threw them into the fire.\nBoom!\nThe flame exploded as the endless dark clouds in the sky faded. Under the golden\nsunlight that shone down, a little girl appeared before Ren Zu.\n\u201cOh father, thank you for giving life to me. I am Myriad Gold Wondrous\nEssence.\u201d\nThe girl was radiating an aura of prosperity; she smiled towards Ren Zu.\nRen Zu looked at her and laughed. \u201cHahaha, I have another daughter now. But\nwait, did my Gu refinement succeed.\u201d\nMyriad Gold Wondrous Essence opened her right palm as she held the Gu\ntowards Ren Zu: \u201cLook father, this is the Gu that you refined; it is called \u2014 Wealth.\u201d" },
  { num: "32", title: "Webs of Fate", body: "Ren Zu had spent an enormous amount of energy and effort gathering Gu materials, even sacrificing his own two hands to finally refine Wealth Gu.\nHe brought his son, Blazing Glory Lightning Brilliance, and daughter, Myriad\nGold Wondrous Essence, to the Feathermen\u2019s residence. However, strangely, all the\nFeathermen had disappeared with no traces left.\n\u201cWhat's going on?\u201d Ren Zu was puzzled.\n\u201cThat is because I arrived here; those Feathermen are afraid of me. All of them\nran away.\u201d A black and white spider walked towards Ren Zu leisurely.\n\u201cWho are you?\u201d Ren Zu asked.\nThe spider smiled, \u201cHuman, you have walked through the road I created in the\nDoor of Life and Death; you still don\u2019t know who I am? I am Fate Gu.\u201d\nMyriad Gold Wondrous Essence added, \u201cFate Gu, you are not even the size of\nmy palm. Why would those Feathermen fear you?\u201d\nFate Gu chuckled, \u201cBecause they pursue freedom, but I, Fate, bind and restrict\nthem.\u201d\nBlazing Glory Lightning Brilliance grumbled, \u201cSo your intention was the same\nas us. You are really a failure, not capturing even one Featherman, while hindering us as well.\u201d\nFate Gu laughed loudly, \u201cWho said I failed? The Feathermen are pursuing freedom, but what do they know? Their escape is only on the superficial level. I have\nalready bound them. The road towards their freedom was all arranged by me, but\nthey think they succeeded, not knowing anything. You are also the same, look at\nyourselves.\u201d\nRen Zu, Blazing Glory Lightning Brilliance, and Myriad Gold Wondrous\nEssence looked at their bodies. They discovered that white spider silk had stuck to\ntheir limbs and body for some unknown time. They also discovered that not just\nthemselves, even the surrounding flowers, grass, trees, rocks, water\u2014everything\nwas bound by the spider silk.\nThese spider silk strands gathered together to form a spider web, which spread\nout endlessly in the sight of Ren Zu and his children.\n\u201cThis is the web that I weaved; it is called the all-encompassing web. Everything\nin the world is bound by this web, to be arranged and controlled by me, Fate. Every88\n\none you encountered and all the things that have happened are all controlled by\nme,\u201d Fate Gu said.\nRen Zu and his children felt a chill in their hearts and began to struggle fiercely.\nFate Gu smiled, \u201cIt is useless; you cannot escape. Fate cannot be altered.\u201d\nRen Zu glared at Fate Gu furiously, \u201cOh Fate, why do you have to manipulate\nand toy with us? From what you said, all the hardships and misfortunes I encountered were all your doings. The loss of my children was also due to you.\u201d\nFate Gu said calmly, \u201cHuman, I know you want to save your eldest son Verdant\nGreat Sun, but he is already dead. Death is a necessary fate of humans; you simply\ncannot save him. Moreover, you want to rely on Wealth Gu to save your daughter\nBoundless Forest Samsara; that is also impossible.\u201d\nAs Fate willed, a thread of spider silk bound Ren Zu\u2019s Wealth Gu and dragged\nit in front of Fate Gu.\n\u201cRelease it, that is our Gu worm!\u201d Blazing Glory Lightning Brilliance shouted.\nMyriad Gold Wondrous Essence\u2019s eyes reddened, sobbing, \u201cFather sacrificed his\nown hands to painstakingly refine this Wealth Gu. How dare you take it away?\u201d\nRen Zu struggled fiercely, but the spider silk continued to become tighter, firmly\nbinding them.\nFate Gu laughed loudly, \u201cLife and death are decreed by fate, prosperity is up to\nheaven. Human, you are fated to be poor and menial, tormented and humiliated till you become insane, and in the end, you will also die. Although you refined\nWealth Gu, you don\u2019t have the fate to enjoy it. If you are fated to be poor, even if\nyou dug out gold, it will turn to copper; if you are fated to be rich, even if you pick\nup paper, it will turn to silk. All these things are under my control.\u201d\nRen Zu, Blazing Glory Lightning Brilliance, and Myriad Gold Wondrous\nEssence started cursing Fate Gu furiously.\nFate Gu was not the least bit angry, still carefree and at leisure, \u201cMany have\ncursed me, but so what? Humans, no matter how you curse me, it won\u2019t change\nanything.\u201d\nFate Gu suddenly moved the spider silk, throwing Blazing Glory Lightning\nBrilliance and Myriad Gold Wondrous Essence far away, completely out of Ren\nZu\u2019s sight.\n\u201cMy children!\u201d Ren Zu howled.\nFate Gu said darkly, \u201cHuman, don\u2019t blame me; this is your fate. Not just you,\nloneliness is the fate of every person. Even if they are your own children, they will\nnot accompany you for life and will eventually leave you. Every encounter is temporary; separation is normality.\u201d\n\nRen Zu, however, kept on struggling, but the more he struggled, the tighter\nthe spider silk bound him. Ren Zu felt an increasingly enormous pressure pushing him down to the point of suffocation. He panted heavily, gradually losing the\nstrength to struggle.\nRen Zu started crying, tears rolling down his cheeks, \u201cWhy does my fate have\nto be so pitiful?\u201d\nFate Gu was silent. But at this time, a voice emerged from the depths of Ren\nZu\u2019s heart. The voice belonged to Self Gu, \u201cHuman, believe in your own strength\nrather than blaming your fate.\u201d\nRen Zu stopped crying as he suddenly realized, \u201cRight, although I don\u2019t have\nStrength Gu, Self Gu has taken a bite of Strength Gu. I have my own strength now.\nSelf Gu, I can only rely on you.\u201d\nSelf Gu then erupted with a dazzling light as it attempted to break the spider\nsilk.\nSome spider silk was torn, but even more came to bind Ren Zu.\n\u201cMy own strength is not enough?\u201d Ren Zu was anxious, \u201cRight, Self Gu, you\nhave also taken a bite of Love Gu. If strength does not work, let us rely on love\ninstead.\u201d\nThereupon, Self Gu let out a gentle light as it attempted to break the spider silk,\nbut this also failed.\nFate Gu said, \u201cOh human, why can\u2019t you understand? Love is a type of fate; I\narranged it to make Verdant Great Sun fall in love with Desolate Ancient Moon, I\nalso arranged it to make the Rockman fall in love with Desolate Ancient Moon. I\nalso arranged success and failure in their lives, so they eventually ended up dead.\u201d\n\u201cNo! No\u2014!\u201d Ren Zu screamed and bawled.\nFate Gu listened quietly. Ren Zu gradually lost the strength to cry; he mumbled\npowerlessly, \u201cI understand now; I know why the Feathermen pursue freedom.\u201d\nFate Gu smiled, \u201cHuman, you also want to pursue freedom?\u201d\nRen Zu nodded, \u201cYes, if I have freedom, I will no longer be bound by you.\u201d\nFate Gu said, \u201cBut look at those Feathermen, even though they pursue freedom,\naren\u2019t they still under my control?\u201d\nRen Zu shook his head, \u201cMy freedom is different from them. I will pursue absolute freedom.\u201d\nFate Gu laughed loudly, \u201cA person\u2019s absolute freedom is insanity. Oh human, see\nfor yourself; you are seeking freedom but you are actually moving towards insanity. I already said this earlier; you will lose your mind. That is the road I arranged\nfor you; you cannot escape my control.\u201d\n\n\u201cNo! I don\u2019t believe you! I will use my own strength and wisdom to obtain freedom. I don\u2019t believe your words; I will escape your control!\u201d Ren Zu retorted.\nFate Gu's laughter became louder, \u201cOh human, you are truly going crazy; you are\nalready deranged. Did you forget? Your Self Gu has only taken a bite of Strength\nGu and Love Gu, so you only have your own strength and love, but not your own\nwisdom. Oh human, when you think you are intelligent, it will be the sign that\nyou are going crazy.\u201d\n\u201cHahaha, hahaha.\u201d It was Ren Zu\u2019s turn to laugh, \u201cI don\u2019t believe you, oh Fate\nGu, I don\u2019t believe you! I don\u2019t believe that this world has fate.\u201d\nFate Gu was silent for a moment before saying, \u201cEven if you don\u2019t believe it, I\nwill still exist.\u201d\nRen Zu rebuked, \u201cNo, that is not true. When I stop believing in you, you will\nstop existing. I refuse to believe in fate; fate does not exist! Hahaha!\u201d\nFate Gu shook its head, sighing, \u201cTruly pitiful, oh human, you have already\nfallen into insanity.\u201d\nRen Zu scratched his hair and skin; his tears and mucus mixed together. He\nstruggled, he knelt on the ground as he rolled around.\nIt was like how Fate declared; he had become insane." },
  { num: "33", title: "Pursuit of Freedom", body: "Ren Zu wandered alone on the vast land; his hair was dishevelled, and he seemed\nto have lost his mind. At times, he wailed, at times, he sat down in a daze, and at\ntimes, he laughed like a fool.\nFate Gu's manipulation had separated him from his children, and he also lost\nWealth Gu. Ren Zu was forced into a state of madness.\n\u201cWho am I? Where am I? What am I doing?\u201d Ren Zu was at a loss and went\ncrazy again.\nOne morning, a group of birds ran past Ren Zu. These birds did not have wings;\ntheir six legs moved alternately as they ran on the ground, raising clouds of dust\nin their path.\nRen Zu jumped with joy when he saw these birds.\n\u201cSo, I'm a bird!\u201d He also spread his legs and ran wildly, joining the bird group.\nThe birds growled strangely towards Ren Zu: \u201cYou are a human; you use two\nlegs to walk. You are not a bird. Leave, don't disturb us. We are pursuing freedom\nGu; we want to retrieve our freedom.\u201d\nRen Zu asked, \u201cWhy are you all searching for Freedom Gu?\u201d\nThe birds said with a heavy tone, \u201cWe once possessed Freedom Gu, but we did\nnot realize that. Only after losing it, we found that we no longer had wings and\ncould not fly anymore. When we regain freedom, we will be able to spread our\nwings and soar to the sky again.\u201d\nRen Zu realized, \u201cI understand; humans also need freedom. If humans don't\nhave freedom, they will be like birds who have lost their wings.\u201d\n\u201cRight! I remember now!\u201d Ren Zu clapped and laughed madly. \u201cI also need to\nsearch for freedom to get rid of fate's shackles. After that, I can go wherever I want\nto go and be with whomever I want to be forever.\u201d\nThe birds casted a strange look at Ren Zu, \u201cOh human, how can you have such\npreposterous thoughts? Look at us; how can birds not have wings? So, chasing after\nfreedom is part of our duty. But you humans are destined to be alone; all gatherings\nwill end up in separation. Oh human, you want to pursue freedom, but you also\nneed to abide by your nature; you should not indulge in wild fantasies.\u201d\nRen Zu scratched his head, puzzled, \u201cIs that how it works?\u201d\nThe birds left behind their last words, \u201cOh human, let us give you some sincere\n\nadvice. If you obtain freedom in the future, you must cherish it; don't be like us\nand let go. Don't let Freedom Gu fly away; otherwise, you will regret it.\u201d\nAfter Ren Zu parted ways with the birds, he slowly forgot his identity and goals\nonce again.\nOne afternoon, a leap of blue leopards passed by him. The insane Ren Zu saw\nthe group of leopards and shouted in joy, \u201cSo, I am a leopard.\u201d\nRen Zu rushed into the group, but the leopards pushed him away and shouted, \u201cYou are a human, not a leopard. You use two legs to walk, while we have four\nlegs. Leave, don't disturb us. We are pursuing freedom Gu; we want to retrieve our\nfreedom.\u201d\nRen Zu asked, \u201cWhy are you searching for Freedom Gu?\u201d\nThe blue leopards looked depressed, \u201cSigh, we once possessed Freedom Gu, but\nwe did not realize it. Only after losing it, we found that we no longer had teeth and\ncould not bite and tear apart our prey. When we regain freedom, we will be able\nto eat happily again.\u201d\nRen Zu realized, \u201cI understand; humans also need freedom. If humans don't\nhave freedom, they will be like beasts with no teeth.\u201d\n\u201cRight!\u201d Ren Zu clapped and laughed madly. \u201cI need to search for freedom\nto get rid of fate's shackles. I will possess countless delicacies and wines, endless\nwealth, and all kinds of comfortable and beautiful clothes.\u201d\nThe blue leopards were stunned before laughing loudly as they mocked Ren Zu,\n\u201cOh human, how can you have such preposterous thoughts? Look at us; how can\nbeasts not have fangs or claws? So, chasing after freedom is part of our duty. But\nyou humans were born with empty hands and will pass away with nothing. Oh\nhuman, you want to pursue freedom, but you also need to abide by your nature;\nyou should not indulge in wild fantasies.\u201d\nRen Zu scratched his head, unsatisfied, \u201cIs that how it works?\u201d\nThe leopards left behind their final words, \u201cOh human, let us give you some\nsincere advice. If you obtain freedom in the future, you must cherish it; don't be\nlike us and let go. Don't let Freedom Gu fly away; otherwise, you will regret it.\u201d\nAfter Ren Zu parted ways with the leopards, he slowly forgot his identity and\ngoals once again.\nOne evening, a school of fish swam past him. Ren Zu saw the fish and shouted\nin joy, \u201cSo, I am a fish.\u201d\nRen Zu joined the fish group and tried to swim like them. There was a commotion in the fish group as they pushed Ren Zu away and shouted, \u201cYou are a human,\nnot a fish. You use two legs to walk, while we have no legs. Leave, don't disturb us.\n\nWe are pursuing Freedom Gu; we want to retrieve our freedom.\u201d\nRen Zu asked, \u201cWhy are you searching for Freedom Gu?\u201d\nThe fish sighed, \u201cWe once possessed Freedom Gu, but we did not realize that.\nOnly after losing it, we found that we no longer had gills and could not breathe\nin the water again. When we regain freedom, we will be able to swim in the water\nagain.\u201d\nRen Zu realized, \u201cI understand; humans also need freedom. If humans don't\nhave freedom, they will be like fish with no gills and cannot breathe.\u201d\n\u201cRight!\u201d Ren Zu clapped and laughed madly. \u201cI need to search for freedom to\nget rid of fate's shackles. I will breathe freely and live on forever; I want eternal life.\u201d\nThe fish sneered, \u201cOh human, how can you have such preposterous thoughts?\u201d\n\u201cLook at us, a fish must have gills, so chasing after freedom is part of our duty.\nBut you humans are destined to have no relation with eternal life; you will die of\nold age and illnesses. Oh human, you want to pursue freedom, but you also need\nto abide by your nature; you should not indulge in wild fantasies.\u201d\nRen Zu frowned, feeling irritated, \u201cIs that how it works?\u201d\nThe fishes left behind their final words, \u201cOh human, let us give you some sincere advice. If you obtain freedom in the future, you must cherish it; don't be like\nus and let go. Don't let Freedom Gu fly away; otherwise, you will regret it.\u201d\nAfter Ren Zu parted ways with the fishes, he slowly forgot the advice of the\nbirds, leopards, and the fish.\n\u201cI am a human; I need to pursue freedom. I need to get rid of the shackles of fate.\nI want to live forever with my loved ones; I want to enjoy life with enough wealth.\nI want to live on forever.\u201d\nMany beings that walked past Ren Zu heard him; they shook their heads and\nstayed away from him.\n\u201cLet's quickly leave; he is Ren Zu and he is talking nonsense again.\u201d\n\u201cHe has already gone mad completely.\u201d\n\u201cHow could he dare to have such thoughts?\u201d" },
  { num: "34", title: "Reverend Insanity", body: "Ren Zu said, \u201cI want freedom and to get rid of fate\u2019s shackles. After that, I can\ngo wherever I want to go and be with whomever I want to be forever.\u201d\nThe birds berated him, \u201cYou humans are destined to be alone; all gatherings will\nend up in separation. Oh human, you want to pursue freedom, but you also need\nto abide by your nature; you should not indulge in wild fantasies.\u201d\nRen Zu said, \u201cI want freedom and to get rid of fate\u2019s shackles. I will possess\ncountless delicacies and wines, endless wealth, and all kinds of comfortable and\nbeautiful clothes.\u201d\nThe beasts ridiculed him, \u201cBut you humans were born with empty hands and\nwill pass away with nothing. Oh human, you want to pursue freedom, but you also\nneed to abide by your nature; you should not indulge in wild fantasies.\u201d\nRen Zu said, \u201cI want freedom and to get rid of fate\u2019s shackles. I will breathe\nfreely and live on forever; I want eternal life.\u201d\nThe fishes rebutted, \u201cBut you humans are destined to have no relation with eternal life; you will die of old age and illnesses. Oh human, you want to pursue freedom, but you also need to abide by your nature; you should not indulge in wild\nfantasies.\u201d\nRen Zu was puzzled.\nRen Zu was disgruntled.\nRen Zu was irritated.\nRen Zu became insane.\n\u201cWhy can\u2019t I have the same thoughts?\u201d\n\u201cWhy can\u2019t a human be together forever with their loved ones?\u201d\n\u201cWhy can\u2019t a human live life without worries and have endless wealth?\u201d\n\u201cWhy can\u2019t a human have eternal life?\u201d\n\u201cBecause fate does not allow it.\u201d\n\u201cBecause it does not allow, therefore I cannot do it?! I cannot even think about\nit?!\u201d\n\u201cOn what basis!?\u201d\n\u201cOn what damned basis?\u201d\n\n\u201cOn what basis am I not allowed to think about it?\u201d\n\n\u201cOn what basis is eternal life forbidden?!\u201d\n\u201cIf such pursuit makes me demonic.\u201d\n\u201cThen let me become a demon!\u201d" },
  { num: "35", title: "Joy and Weight of Freedom", body: "One day, Freedom Gu flew towards Ren Zu on its own accord. Ren Zu was\njoyous as he grabbed it.\n\u201cOh, freedom, I finally obtained freedom.\u201d Ren Zu was extremely happy but\nalso felt puzzled as he asked Freedom Gu, \u201cThis is really strange. The wingless birds\nare pursuing you, the toothless beasts are pursuing you, the gill-less fish are pursuing you, but you flew to me. What is going on here?\u201d\nFreedom Gu replied, \u201cI didn't fly to you, human. You once used Attitude Gu\nto bully me, used Love to bind me, and used Wealth to bribe me. I loathe and hate\nyou! I flew over because I was attracted by the Cognition Gu on you.\u201d\nCognition Gu floated out of Ren Zu's body and explained with a smile, \u201cRen\nZu, because you have gone mad, you are thinking deliriously all the time. A human\nthat desires companionship forever, a human who has an extravagant hope of living\na life with no worries, a human who pursues eternal life; what else can this be other\nthan a lunatic?\u201d\nFreedom Gu sighed, \u201cFreedom of cognition is the greatest freedom. These delirious thoughts can strengthen me. Ren Zu, although you captured me, I will never\nwork for you. Release me now.\u201d\nRen Zu shook his head and grasped even tighter, \u201cFreedom Gu, I will not let\nyou go.\u201d\nFreedom Gu sneered, \u201cThen prepare yourself; don't collapse from the pressure.\u201d\nThe moment it finished speaking, Responsibility Gu flew over, pressing on Ren\nZu's shoulder.\n\u201cHeavy, so heavy!\u201d Ren Zu almost bent over from the pressure.\nCognition Gu sighed, \u201cFreedom and responsibility coexist, oh Ren Zu, you\nwant to obtain freedom, so you need to shoulder the responsibility. At least, you\nneed to be responsible for yourself.\u201d\nRen Zu clenched his teeth and persevered; sweat flowed down his body like a\nriver.\nSoon, he knelt down on the ground.\nHe saw spider webs again.\nFate Gu's spider silk wrapped around his whole body. Ren Zu was barely shouldering the heavy responsibility and had no strength to break free from the spider\n\nsilk's bindings.\nFate Gu's spider silk constricted tightly, forming blood wounds everywhere on\nRen Zu's body.\nRen Zu shouted, \u201cWhat is going on?\u201d\nCognition Gu explained, \u201cOh human, the more freedom you experience, the\nmore you will feel the restriction around you.\u201d\nFreedom Gu laughed, \u201cJust let me go; the longer you hold on to me, the more\nspider silk will bind you, the binding will become tighter and will even constrict\nyou to death.\u201d\nRen Zu shook his head, \u201cNo, I won't let go. Oh Freedom Gu, I must have you.\u201d\nCountless spider silk pierced into Ren Zu's flesh; Ren Zu howled in pain and\nrolled on the ground but did not let go.\n\u201cHahaha!\u201d Ren Zu began laughing foolishly again, \u201cI can sense a Gu far away.\nJust this feeling alone makes me happy and satisfied.\u201d\nCognition Gu admitted frankly, \u201cThat is natural. Whoever obtains Freedom\nGu will also be able to sense the location of Happiness Gu.\u201d\nRen Zu continued to persevere; he cried in pain at times and laughed happily at\nother times. The spider silk constricted tightly, tearing into his bones, and leaving\ndeep marks on them, but Ren Zu still did not loosen his hands.\nIn the end, he fainted from the pain.\nAfter a long time, he slowly woke up.\nFate Gu's spider silk was no longer constricting him, Responsibility Gu also did\nnot exert heavy pressure, while Cognition Gu had disappeared.\n\u201cWait, what about Freedom Gu?\u201d Ren Zu did not sense Freedom Gu's existence,\nand in his moment of panic, he opened his hands.\nThe moment a gap appeared, Freedom Gu flew away and left Ren Zu behind.\nHumans often did not understand freedom when they possessed it; only after\nlosing it would they come to a sudden realization.\nRen Zu was stunned when he saw Freedom Gu flying away. He remembered the\nadvice of the birds, leopards, and fish; he felt extremely regretful.\nHe tore out his hair painfully and rolled on the ground.\n\u201cI am better off dead.\u201d Ren Zu was overwhelmed with grief. \u201cI would rather lose\nlove; I would rather lose my life. I don't want to lose freedom.\u201d" },
  { num: "36", title: "Strong eat the weak", body: "Ren Zu lost Freedom Gu; he was anguished and only recovered after a long time.\nRen Zu was troubled; he asked Cognition Gu, \u201cOh Cognition Gu, how can I\nobtain Freedom Gu again? After what happened last time, Freedom Gu will not\napproach me anymore.\u201d\nCognition Gu answered, \u201cOh human, why do you desire Freedom Gu so much?\u201d\nRen Zu replied irritably, \u201cDon't you know the reason already? I am searching\nfor freedom to break free of the restraints of fate.\u201d\nCognition Gu answered once again, \u201cThen I have nothing much to tell you.\nHaven't you told Fate Gu the answer to this question already?\u201d\nRen Zu was dazed before he recalled, before he went insane, he met Fate Gu.\nWhen he was harmed by Fate Gu, he shouted at it that he would use his own\nstrength and wisdom to obtain freedom; he would eventually break free from fate's\ncontrol.\nRen Zu's eyes brightened, \u201cOh Gu, I remember now, thank you for the reminder. I need to rely on myself to break free of fate. I already have my own strength;\nwhat I lack is my own wisdom. I need to let Self Gu eat a mouthful of Wisdom Gu,\njust like how it ate a part of Strength Gu in the past. But where is Wisdom Gu?\u201d,\nRen Zu asked Cognition Gu.\nCognition Gu replied, \u201cI do not know. Wisdom Gu has been to many places;\nits location is not fixed. You can find wisdom in countless places, so human, you\nneed to find it yourself.\u201d\nRen Zu nodded as he set off on his journey again.\nHe walked and walked and walked. One day, he saw two Gu worms chasing each\nother along the road.\nOne Gu worm was white and tiny; it escaped ahead as it begged for mercy, \u201cStop\nchasing me, stop chasing me, I do not want to be eaten by you.\u201d\nThe other Gu was clearly larger in size; it had thick armor and said in a deep tone,\n\u201cI want to eat you, I want to eat you! No matter where you escape to, I will eat you.\u201d\nThe tiny white Gu was about to be caught by the larger Gu behind; it suddenly saw Ren Zu and hid behind him, \u201cOh human, I beg of you, quickly save me.\u201d\nRen Zu saw that this Gu worm was so pitiful, chased by another Gu worm,\nunable to fend for itself, he felt like he was seeing himself.\n\nAt this instance, a new heart grew in his chest\u2014the heart of sympathy.\nRen Zu stretched out both arms as he stopped the larger Gu, \u201cStop, stop chasing it.\u201d\nThe armored Gu shouted, \u201cHey human, are you obstructing me? No, you\ncannot stop me; you are unable to stop me. Why is that so?\u201d, Ren Zu was curious.\nThe armored Gu explained, \u201cI am Strong Gu; that is Weak Gu. Since time immemorial, the rule of nature is that the strong prey on the weak. Thus, the strong must\neat the weak; weaklings are the food of the strong.\u201d\nRen Zu sighed as he tried to convince the Gu, \u201cThen why don't you let it off just\nthis once; look at how pitiful it is.\u201d\nStrong Gu sneered, \u201cNot even once! In the eyes of the strong, weaklings have no\nstature; there is no sympathy for the weak. This is because heaven and earth will\nnever pity the weak; it will only marvel at the incredible feats of the strong. Weaklings are born to be subdued, controlled, and devoured by the strong.\u201d\nRen Zu saw that his words fell on deaf ears; he could only deny Strong Gu forcefully, \u201cI have already saved this Gu; go and eat others.\u201d\nStrong Gu knew that it could not beat Ren Zu alone; it could only fly away in\ndissatisfaction, \u201cI will be back.\u201d" },
  { num: "37", title: "Lightning and Hatred", body: "Blazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence were\nsent flying away by Fate Gu and were forced to leave Ren Zu, arriving at the immemorial blue heaven.\nRumble!\nThunder rumbled unceasingly here. Lightning flashed, imprinting the sky, and\nforming a forest of lightning.\n\u201cI am angry! I am angry!\u201d The source of this lightning forest was Lightning Gu,\nand it was roaring continuously.\nBlazing Glory Lightning Brilliance and Myriad Gold Wondrous Essence were\nextremely afraid. The lightning was too strong; if a lightning bolt struck them, they\n\nwould be heavily injured or even die. They did not move at all, afraid of Lightning\nGu discovering them and bombarding them to death.\nThey waited patiently for Lightning Gu\u2019s anger to dissipate, planning to move\nonce it calmed down. However, Lightning Gu remained extremely angry, and the\nlightning forest kept on growing in size.\n\u201cWhat should we do?\u201d Myriad Gold Wondrous Essence was worried. \u201cHow can\nwe return to father? Brother, do you have any good suggestions?\u201d\nBlazing Glory Lightning Brilliance shook his head, his brows furrowed. \u201cIt is\nall Fate Gu\u2019s fault! It forcefully separated us from father. I am definitely going to\ntake revenge in the future. Argh, my heart hurts every time I think of Fate Gu.\u201d\nBlazing Glory Lightning Brilliance held his chest, finding his heart aching more\nand more.\n\u201cHow could this be?\u201d He quickly opened up his chest and looked at the depths\nof his heart.\n\u201cOh, why is there a Gu in my heart?\u201d Blazing Glory Lightning Brilliance was\nastonished. \u201cIt is no wonder my heart is in constant pain; this Gu was biting on\nmy heart.\u201d\nMyriad Gold Wondrous Essence also saw this Gu worm. \u201cIsn\u2019t this Love Gu? I\nheard father mentioning it before.\u201d\n\u201cNo, I am Hatred Gu.\u201d The Gu worm spoke. \u201cAlthough I look similar to Love\nGu on the surface.\u201d\nMyriad Gold Wondrous Essence urged, \u201cHatred Gu, why are you gnawing on\nmy brother\u2019s heart? Please stop quickly.\u201d\nBut Hatred Gu said, \u201cI won\u2019t! I am building my home here. I am changing your\nbrother\u2019s heart into a heart of hatred.\u201d\nBlazing Glory Lightning Brilliance was furious. \u201cWho allowed you to build your\nhome in my heart? Get out quickly; I don\u2019t welcome you. If you don\u2019t get out, I\nwill crush you to death.\u201d\nHatred Gu laughed loudly. \u201cI was attracted by Lightning Gu\u2019s anger, but unexpectedly discovered that your heart is more suitable for my home. I won\u2019t leave.\u201d\nBlazing Glory Lightning Brilliance was furious. He put his hand inside his heart\nand grabbed Hatred Gu. Hatred Gu was like a curved blade without a handle; Blazing Glory Lightning Brilliance\u2019s hand was pierced and bled as he grabbed it. He\nclenched his teeth and exerted strength, crushing Hatred Gu to death. But Hatred\nGu resurrected from the blood and became even bigger.\n\u201cIt is useless,\u201d Hatred Gu said. \u201cHatred cannot be killed. Vengeance only breeds\nmore hatred and grudges. The more you treat me like this, the more your hatred\n\nwill increase.\u201d\nMyriad Gold Wondrous Essence was somewhat stunned and helpless against\nHatred Gu.\n\u201cIt hurts, it hurts, it hurts!\u201d Blazing Glory Lightning Brilliance covered his chest,\nhis face pale from the pain.\nHatred Gu was drilling in and out of his heart, creating holes after holes, transforming his heart into Heart of Hatred. The current Blazing Glory Lightning Brilliance hated Fate Gu even more.\n\u201cIf I was not sent flying here by Fate Gu, how could I have encountered Hatred\nGu? How could my heart be pierced by Hatred Gu? I will definitely destroy Fate\nGu; I will definitely take revenge.\u201d\nThe more Blazing Glory Lightning Brilliance thought, the more he hated. He\nwas no longer afraid of angering Lightning Gu; he stood up suddenly.\n\u201cSister, let\u2019s go. I don\u2019t want to stay here.\u201d Blazing Glory Lightning Brilliance\nheld Myriad Gold Wondrous Essence\u2019s hand.\nBut Myriad Gold Wondrous Essence hesitated. \u201cBrother, there is lightning all\naround us; we don\u2019t know when it will strike. It is too dangerous.\u201d\nBlazing Glory Lightning Brilliance said, \u201cSister, don\u2019t be afraid. The hatred in\nmy heart has shown me a path, that is the path of revenge. There is no lightning\non this path. As long as I follow it, I can find Fate Gu and take revenge against it.\nQuick, follow me.\u201d\nBlazing Glory Lightning Brilliance dragged Myriad Gold Wondrous Essence.\nThe strange thing was that despite lightning bolts crackling around them, not a\nsingle one struck Blazing Glory Lightning Brilliance and Myriad Gold Wondrous\nEssence.\nThe two ran and ran when they suddenly collided with something.\n\u201cWhat is ahead?\u201d Myriad Gold Wondrous Essence touched the air in front of\nher and found it was like a transparent wall.\n\u201cThis is the heavenly wind qi wall, the border of the immemorial nine heavens.\u201d\nHatred Gu explained.\n\u201cBrother, there is a wall ahead; we cannot leave.\u201d Myriad Gold Wondrous\nEssence said helplessly.\nBut Blazing Glory Lightning Brilliance had a different perspective. \u201cWhere is\nthe wall? I only see the path ahead. As long as we follow along this trail, we can definitely leave and find Fate Gu.\u201d\nTime and again, Blazing Glory Lightning Brilliance got up and rushed forward\nbefore colliding with the heavenly wind qi wall; his head bled as he fell to the\n\nground. Then, he climbed up and charged forward again.\nMyriad Gold Wondrous Essence wanted to stop him, but Blazing Glory Lightning Brilliance did not listen.\nHatred Gu laughed. \u201cIt is useless. I have already built my home in his heart.\nAlthough his eyes are open, he can only see the path that I point towards. He\ncannot see any other thing. Hahaha.\u201d\nRight at this time, Lightning Gu sensed Blazing Glory Lightning Brilliance and\nMyriad Gold Wondrous Essence; the terrifying lightning forest began to quickly\nspread towards them.\nThere was no road to advance or retreat. Myriad Gold Wondrous Essence was\nextremely anxious but she did not have any ideas. \u201cIt would have been great if we\nstill had Wealth Gu.\u201d\nBlazing Glory Lightning Brilliance did not listen to her; he continued to collide\ninto the heavenly wind qi wall. Blood filled the ground.\nLightning Gu finally reached closer; Myriad Gold Wondrous Essence cried. \u201cAm\nI going to die here?\u201d\nBut Lightning Gu restrained its power and approached slowly. It let out a rumbling sound. \u201cDon\u2019t worry, oh humans. I won\u2019t harm you or injure you. On the\ncontrary, I want your help.\u201d\nMyriad Gold Wondrous Essence stopped crying and asked curiously, \u201cLightning Gu, you are so strong. How can we possibly help you?\u201d\nLightning Gu: \u201cI have been trapped here all along. The Immemorial Blue\nHeaven is large, but I am already sick of it. I want to go out but I am unable to find\na path that leads to the outside. Thus, I am angry. Anger often leads to hatred, so\nHatred Gu was attracted here. But from your brother, I can see the path to exit.\nTherefore, humans, let us cooperate. I will help you break the heavenly wind qi\nwall, and you will bring me out of here, alright?\u201d Lightning Gu proposed.\nMyriad Gold Wondrous Essence and Blazing Glory Lightning Brilliance were\nvery happy at this suggestion.\n\u201cI agree to it. Your help will be great.\u201d Blazing Glory Lightning Brilliance replied.\nThereupon, Lightning Gu landed on Blazing Glory Lightning Brilliance\u2019s hand\nand started to emit a terrifying radiance.\nHatred Gu laughed loudly: \u201cLet me lend you a hand.\u201d\nLightning Gu obtained Hatred Gu\u2019s strength and became extremely powerful.\nRumble rumble...\nLightning Gu erupted with fierce strength, not only destroying the heavenly\nwind qi wall but even shattering the whole of Immemorial Blue Heaven.\n\n\u201cQuickly leave!\u201d, Blazing Glory Lightning Brilliance was greatly shocked and\nknew that they had created a huge disaster. He quickly grabbed his sister and left\nwith Lightning Gu and Hatred Gu." },
  { num: "38", title: "Facing a Strong Predicament", body: "Ren Zu continued on his journey. After a while, a huge Predicament entered\nRen Zu's vision.\nStrong Gu was inside this Predicament's body, laughing, \u201cOh human, I am back\nagain. This time, I have help. Let's see what you can do.\u201d\nRen Zu had to stop walking, even though the Predicament before him was huge;\nhe did not fluster.\nLong ago, Ren Zu had been chased by a group of Predicaments as he escaped.\nHowever, after he gave his heart to Hope Gu, those Predicaments, which feared\nhope, escaped in panic.\n\u201cOh Hope Gu, I need your help,\u201d Ren Zu summoned hope Gu, but the light of\nhope did not scare away this Predicament.\n\u201cWhat was going on?\u201d, Hope Gu asked.\n\u201cHaha!\u201d Strong Gu laughed. \u201cOh human, this Predicament has gained my help.\n\u201cIt will definitely be the greatest Predicament you have ever met in your life. With\njust hope, how can you possibly defeat it?\u201d\nRen Zu could not think of a way.\nAt this moment, Weak Gu, shielded by Ren Zu, spoke in a soft voice, \u201cOh\nhuman, thank you for protecting me. Don't worry; I have an idea. Let's scare this\nPredicament away.\u201d\n\u201cYou can scare it away?\u201d Ren Zu asked.\nWeak Gu shook its head, \u201cOh human, even something as weak as me has a\nmethod to survive in life. Against those that want to eat or bully me, I will often\nput up a deceiving disguise to make others think that I am very strong. This world\nfavors the strong. Even if we are weak, we need to disguise ourselves as strong\nbeings, or we will be bullied everywhere. Oh human, you can do it. Don't you have\n\nFear Gu? Isn't Attitude Gu on your face?\u201d\nRen Zu heard Weak Gu's suggestion and decided to try it. He first twisted his\nappearance using Attitude Gu, revealing his teeth, and showing a fierce expression.\nNext, he used Fear Gu to scare the Predicament, which bared its teeth, sprawling on the ground and staring at Ren Zu vigilantly.\nRen Zu was dazed. \u201cWhy didn't we scare it away?\u201d\nWeak Gu urged, \u201cDidn't it jump earlier? This means that my method works, but\nwe need to put in more effort. Oh human, why don't you put Attitude Gu on top\nof Self Gu? What is the best form of deceit or disguise? It is to deceive even yourself. By doing that, we should be able to deceive the Predicament.\u201d\nWeak Gu continued, \u201cAs long as the Predicament thinks that you are strong, it\nwill definitely let you pass. That is because Predicaments often take the initiative\nto give way to the strong.\u201d\nRen Zu took off the mask on his face as he placed Attitude Gu on Self Gu. However, it was pointless; the Predicament did not run off in fear.\nRen Zu realized at once, \u201cI understand now. When a person faces a huge predicament, putting up a facade will never solve the real problem.\u201d\nStrong Gu laughed, \u201cOh human, stop wasting your effort. With me here to\nremind the Predicament, how can you guys possibly deceive it? You should not\nhave saved Weak Gu; weak people often like to jeer and taunt others, showing a\nruthless demeanour to conceal their own weakness inside.\u201d\nRen Zu was helpless; he could only stall for time temporarily.\nSuddenly, he had a flash of inspiration and said to Strong Gu, \u201cYou said that\nthe law of survival is for the strong to eat the weak. I agree with that. But how do\nyou prove that you are strong while we are weak? If you cannot prove this, on what\nbasis are you allowed to eat us?\u201d\nStrong Gu was dazed, \u201cIt is because I am Strong Gu, and that is Weak Gu.\u201d\nRen Zu shook his head, \u201cJust your names alone cannot prove anything. Moreover, other than both of you Gu worms, this Predicament and I are also here.\u201d\nStrong Gu smiled coldly, \u201cThen I have a good method to prove it! We will eat a\nportion of each other; whoever fails to persevere to the end will lose. Whoever is\nweak deserves to be eaten.\u201d\nRen Zu saw that he could not stall for any more time; he had to take a risk.\n\u201cThen we will do that. Don't regret it! However, which of us will eat first?\u201d\nStrong Gu was confident in its strength, it chuckled, \u201cSo what if I let you go\nfirst?\u201d\nRen Zu assessed the Predicament with his gaze. The truth was he had never\n\neaten any Predicaments before.\nRen Zu thought about it before he had an idea. \u201cThen I will eat the head of the\nPredicament first.\u201d\nThus, Predicament took off its head and gave it to Ren Zu.\nRen Zu only took a bite when his face became distorted; he almost vomited on\nthe spot. \u201cSo bitter!\u201d\nIt turned out that this was a huge bitter head.\nNot just that, even though the Predicament lost its head, it was still standing;\nthe neck that was missing a head did not bleed at all, there were no issues at all.\n\u201cHaha!\u201d Strong Gu laughed. \u201cOh human, you chose wrongly. By just eating\nbitter heads, you cannot resolve any predicaments. Moreover, whether you are capable of eating this huge bitter head is another question altogether! If you cannot eat\nit, it means that you are a weakling; you deserve to be eaten by us.\u201d\nCompared to the Predicament's head, Ren Zu's body was very small.\nRen Zu knew that Strong Gu was right; he could not afford to lose. If he lost,\nnot only would he fail to protect Weak Gu, he would even lose his life and become\nthe food of the Predicament.\nRen Zu could only frown as he opened his mouth, continuing to eat the bitter\nhead.\nAfter taking dozens of mouthfuls, Ren Zu suddenly stopped; he opened his\nmouth and almost vomited.\nHope Gu encouraged him, \u201cOh human, don't vomit. If you grit your teeth, you\ncan devour any hardship that comes your way. Humans do not just need to eat food;\nthey also need to taste bitterness.\u201d\nRen Zu nodded as he continued to eat. Halfway through, the Fear Gu on his\nbody started to shout, \u201cOh heaven, when will we ever finish eating it?\u201d\nRen Zu also felt a trace of despair.\nCourage Gu quickly said, \u201cOh human, you cannot be afraid of tasting bitterness. Don't fear bitterness; suffering is only temporary. If you start to fear suffering, you will suffer for life.\u201d\nWith the help of Courage Gu, Ren Zu finally managed to eat all of the bitter\nheads after great hardship.\nRen Zu wiped his mouth as he looked at Strong Gu with difficulty, \u201cYou can\nchoose now.\u201d\nStrong Gu smiled, \u201cThen we will eat your skin first.\u201d\nRen Zu had to pull off the skin on his body as he threw it to the Predicament.\nThe Predicament had no head; it stuffed Ren Zu's skin down its neck. Ren Zu's\n\nskin was completely eaten, but its huge belly did not expand at all.\nStrong Gu asked again, \u201cOh human, what are you going to eat next?\u201d\nRen Zu was troubled now; he had just eaten the Predicament's head, and it was\ntoo bitter. Even though he endured the process, his stomach was almost full.\nAs for the Predicament, even though it had no head, it was still alive and standing.\n\u201cWhat should I eat now? I ate too much earlier; my stomach is reaching its limit.\nIf I have to eat a lot, my stomach might burst, and I'll die.\u201d Ren Zu thought to himself; he had to eat the most important and fatal part of the Predicament's body.\nBut which part of the Predicament's body was the most important?\nAfter thinking for a long time, Ren Zu finally had an idea. He said to Strong Gu,\n\u201cThen I will eat the part that you absolutely do not want me to eat.\u201d\nStrong Gu snorted coldly, \u201cThen you can eat some losses.\u201d\nIt took out all of the losses from the Predicament's body and gave them to Ren\nZu for consumption.\nThese losses were not big; the quantity was not large either.\nRen Zu was quite surprised because after these losses were taken out, the originally huge Predicament shrunk by a lot.\nRules and Regulation Gu started to explain for Ren Zu, \u201cOh human, this is not\nstrange. Predicaments vary according to people. Since you ate such a huge bitter\nhead earlier, you will have fewer losses to eat, thus, it became smaller.\u201d\nRen Zu became happy, \u201cThis is great. Even if I eat all of these losses, I will not\nreach my limit; it will not fill my stomach completely.\u201d\nRen Zu opened his mouth and ate a small loss.\nIt was so spicy that Ren Zu could not even speak at this moment.\nContinuing to eat, Ren Zu opened his mouth as he breathed heavily; his empty\neye sockets also started to tear up uncontrollably.\nEating again, Ren Zu's entire body was covered in sweat that merged with the\ntears flowing out of his eye sockets.\nThe most uncomfortable thing for Ren Zu was that budding flames started to\nappear in his heart. These yellowish flames resembled chicks; they gathered together in groups.\nThe more losses one ate, the more flames of resentment they would feel in their\nheart.\nThe more flames of resentment they had, the more uncomfortable it felt. Even\nRen Zu's several hearts could not take it; they were going to be incinerated soon.\nRight at this moment, the Heart of Nobleness grew in Ren Zu's chest.\n\nCompared to the other hearts, the Heart of Nobleness was able to endure the\nmost flames of resentment. With this heart to bear the burden, Ren Zu finally\nmanaged to endure it.\nRen Zu ate all of the losses.\nStrong Gu looked at Ren Zu's bulging belly as he smiled coldly, \u201cOh human,\nyou are almost at your limit; it is time for us to eat.\u201d\nRen Zu breathed roughly as he asked, \u201cWhat do you want to eat?\u201d\nStrong Gu said, \u201cI want to eat your flesh.\u201d\nRen Zu was helpless about it; he could only let it eat his flesh.\nRen Zu's skin and flesh were inside Predicament's stomach; he only had his\nbones, organs, and hair left." },
  { num: "39", title: "Hope triumphs again", body: "Ren Zu stared at the skeleton head. \u201cNext, I will eat the most important part of\nthe Predicament's body.\u201d\nStrong Gu laughed. \u201cThis is a stupid move! Oh, human, your choice is extremely foolish.\u201d\nThe Predicament shook its body as it shrank. At the same time, countless Tribulations flew out of its neck and attacked Ren Zu.\nThe Tribulations were like fire, burning Ren Zu's bones. They were like hammers, charging at Ren Zu as his bones cracked. The Tribulations were like wind\nand rain, sweeping at Ren Zu's lone body. The Tribulations were like flashing lightning, striking Ren Zu continuously.\nFear Gu shouted, \u201cOh heaven, this is too scary. That human will die for sure at\nthis rate.\u201d\nCourage Gu encouraged, \u201cOh human, don't be afraid.\u201d\nSelf Gu and Attitude Gu shouted together, \u201cI am very strong, I am very strong.\nAll Tribulations are mere drizzles, they are insignificant breezes.\u201d\nWeak Gu, Betrayal Gu, and Fear Gu flew together, wanting to escape with Ren\nZu.\n\n\u201cOh human, quickly run. Don't believe in Self Gu's words; it has already been\ndeceived.\u201d\nRen Zu was trapped in the Tribulations; he could not escape. When Tribulations loom over you, it is not a simple matter of running away.\n\u201cThis is too scary; let's go. Forget about the human.\u201d Weak Gu, Betrayal Gu,\nand Fear Gu flew away together.\n\u201cYou traitors!\u201d Self Gu was furious; it grabbed onto these three Gu and bit\nthem all.\nThe three Gu were injured, but they were not stopped by Self Gu. They quickly\nescaped from Ren Zu. Self Gu wanted to chase them, but Rules and Regulation Gu\nurged, \u201cDon't chase them. Escaping when Tribulations strike due to fear and weakness, betraying oneself and courage in the process will only lead to death. Isn't it\ngood that they are gone? Weak Gu and Betrayal Gu are unable to help us, as for Fear\nGu... if the Tribulations did not appear, fear would have been pointless. But since\nthe Tribulations are here now, fear will only lead to greater pain in the human.\u201d\n\u201cYou are absolutely right.\u201d Self Gu stopped.\nHope Gu flickered with light as it supported Ren Zu. \u201cOh human, as long as\nyou still have hope in your heart during the Tribulations, there will still be hope\nin this situation.\u201d\nStrong Gu could not stop laughing. \u201cOh human, you are truly pitiful. You easily\nbelieve in the words of hope. Don't you know? Having only hope during the Tribulations will only cause them to continue longer. Hope is the thing that lengthens the person's pain. When you stop bearing any hope, you will feel relaxed in the\nTribulations.\u201d\nRen Zu did not speak; he endured the attacks of the Tribulations with great\ndifficulty.\nNo matter how bent his body became, he did not fall.\nStrong Gu soon found the reason \u2014 on Ren Zu's feet, there was a pair of independent wings. Even though the wings were small, they flapped stubbornly, helping Ren Zu to stand up despite everything.\nStrong Gu continued to demoralize Ren Zu. \u201cOh human, I am starting to\nadmire you. It is a pity that you are going to fall soon. Look at your bones; they are\ncovered in cracks now due to the Tribulations.\u201d\nRen Zu was silent. Originally, Ren Zu's bones were shiny and intact; there were\nno cracks at all. Now, his skeleton was covered in cracks; it seemed like it would\nshatter at any moment.\nAll the other Gu worms were silent; only Hope Gu gave out light. \u201cOh human,\n\ndon't give up! Tribulations are not scary. The scariest thing is a person who has\nlost hope.\u201d\nThe light of Hope Gu penetrated the cracks of Ren Zu's bones, into his bone\nmarrow.\nIn the life of everyone in this world, cracks would always form at some point,\nbut those were the times where the light of hope would shine in.\nRen Zu's bones absorbed the light of hope; they started to engulf the surrounding Tribulations. Each crack was like a huge mouth; the larger the crack, the larger\nthe mouth, and the more Tribulations it could devour.\n\u201cHow could this happen?\u201d, Strong Gu was extremely shocked.\nThe more Tribulations that Ren Zu's skeleton devoured, the stronger and firmer\nhis bones became. Tribulations could destroy people, but they could also toughen oneself.\nAs the Tribulations continued, Ren Zu's bones started to shine in a golden light.\nThe Tribulations became wilder as Ren Zu's bones burned in flames, becoming\ndazzlingly golden.\nRen Zu started to straighten his back; he raised his head and puffed his chest.\nAfter enduring countless tortures, his skeleton shined like a golden pillar; he stood\ndirectly inside the Tribulations. This was the Myriad Tribulation Golden Skeleton.\nAnd on Ren Zu's skeleton head, a crown grew out naturally; it was the heaven\nconnecting bone crown. All of the tribulations and disasters that people suffer\nwould become their crowns of achievement in the future.\nEven though the Tribulations had not ended, Ren Zu could already speak at this\ntime. \u201cI know, Fate has arrangements. Tribulations are the arrangements it makes\nfor people. But I can persevere; any Tribulations that seem unendurable are all, in\nfact, endurable to me.\u201d\nStrong Gu was shocked and bewildered.\nSelf Gu realized at this time. \u201cI understand. Oh human, you are someone who\nwalked out of Ordinary Abyss; that is why you can endure these Tribulations that\nare impossible to endure.\u201d\nStrong Gu saw that the Tribulations could not take down Ren Zu; it forced itself\nto stay calm. \u201cOh human, don't forget, as long as you have Hope Gu, these Tribulations will not stop. Are you going to delay our bet from earlier? I don't care! I will\ntreat it as if you passed the Tribulations. Now, it is our turn to eat you.\u201d\n\u201cWhich part of me do you want to eat?\u201d, Ren Zu sighed.\nStrong Gu laughed loudly, pointing at Ren Zu's chest. \u201cNext, I will eat your\nhearts.\u201d\n\nRen Zu shook slightly; Strong Gu's choice was too fatal. How could a human\nlive without his heart?\n\u201cQuickly take out all of your hearts; let us eat them!\u201d Strong Gu shouted in\nexcitement.\nRen Zu sighed as he hesitated, before taking out the Heart of Sympathy.\nStrong Gu directly placed the Heart of Sympathy into the Predicament's neck\nas the heart fell into its stomach. The Predicament's stomach expanded slightly.\nWhen faced with predicaments, people often lose their hearts of sympathy first.\nRen Zu took out his heart of nobleness next; the Predicament ate it as its stomach expanded some more, it seemed to have problems digesting it.\nRen Zu took out his original heart. \u201cOh Hope Gu, leave now. I do not want to\nimplicate you.\u201d\nHope Gu resided in Ren Zu's original heart; it did not fly out. Instead, it said,\n\u201cI am not leaving; this is my home. Oh human, just toss me in along with it. I do\nnot blame you.\u201d\nRen Zu had no choice; as Strong Gu rushed him, he gave his original heart to\nthe Predicament as food.\nAfter the Predicament ate it, its belly expanded again. Predicaments often\ncaused people to lose hope as well.\nWithout Hope Gu, all of the Tribulations around Ren Zu vanished. This caused\nthe pressure on Ren Zu to fall, but he felt deep melancholy as well.\n\u201cQuick, oh human, take out your final heart and let us eat it!\u201d Strong Gu pointed at the Heart of Loneliness in Ren Zu's chest.\nRen Zu hesitated as he felt troubled. The Heart of Loneliness did not only contain his Self Gu; it was also his final heart. Without this heart, Ren Zu might die.\nStrong Gu laughed and threatened. \u201cQuick! If you do not take it out yourself,\nwe will make our move and eat you entirely.\u201d\nSelf Gu had already been deceived; it called out in nonchalance. \u201cOh human,\njust give it to them. I do not care; you will not die either! We are the strongest.\u201d\n\u201cGive it to me!\u201d Strong Gu
