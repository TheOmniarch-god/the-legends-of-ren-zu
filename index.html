// ─── Ascension Overlay — clean reveal-pull: void → light pillar → burst → portrait reveal → name card ──
function AscensionOverlay({ tier }) {
  const [fading, setFading] = useState(false);
  if (!tier) return null;

  const images = {
    gu_master:   "/assets/realm-gumaster.jpg",
    gu_immortal: "/assets/realm-guimmortal.jpg",
    venerable:   "/assets/realm-venerable.jpg",
  };
  const titles = {
    gu_master:   "Gu Master",
    gu_immortal: "Gu Immortal",
    venerable:   "Venerable",
  };
  const subtitles = {
    gu_master:   "You have refined your aperture. Primeval essence flows.",
    gu_immortal: "The mortal aperture shatters. The immortal aperture opens.",
    venerable:   "人如棋子，弈者何人。",
  };

  const CFG = {
    gu_master: {
      accent: "#d8a34d", glow: "rgba(216,163,77,", core: "rgba(255,231,160,",
      flashColor: "rgba(255,234,178,0.85)", flashColor2: "rgba(216,163,77,0.30)",
      bg: "#020004",
      glyphs: ["蛊","木","水","火","土","金","魂"],
      portraitSize: "min(190px,50vw)", cardWidth: "min(340px,88vw)",
      chargeTime: 1100,
      particleCount: 60, particleSpeed: 5.5, ringCount: 40,
      doLightning: false, doRays: false, doChains: false, doHeavenRain: false,
    },
    gu_immortal: {
      accent: "#62e8ff", glow: "rgba(98,232,255,", core: "rgba(210,251,255,",
      flashColor: "rgba(210,252,255,0.95)", flashColor2: "rgba(82,207,255,0.36)",
      bg: "#000a14",
      glyphs: ["蛊","仙","道","劫","痕","宇","宙","智","力"],
      portraitSize: "min(230px,56vw)", cardWidth: "min(400px,90vw)",
      chargeTime: 1500,
      particleCount: 100, particleSpeed: 8, ringCount: 80,
      doLightning: true, doRays: false, doChains: false, doHeavenRain: false,
    },
    venerable: {
      accent: "#ffd36a", glow: "rgba(255,211,106,", core: "rgba(255,255,240,",
      flashColor: "rgba(255,255,240,1)", flashColor2: "rgba(255,211,106,0.46)",
      bg: "#070002",
      glyphs: ["尊","道","天","地","命","炼","运","梦","魂","力","智","血"],
      portraitSize: "min(280px,68vw)", cardWidth: "min(460px,92vw)",
      chargeTime: 2200,
      particleCount: 180, particleSpeed: 13, ringCount: 140,
      doLightning: true, doRays: true, doChains: true, doHeavenRain: true,
    },
  };
  const cfg = CFG[tier] || CFG.gu_master;

  const canvasRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const animRef = React.useRef(null);
  const particlesRef = React.useRef([]);
  const lastAmbientRef = React.useRef(0);
  const lastFrameRef = React.useRef(0);
  const TARGET_FRAME_MS = 1000 / 20; // 20fps — heavier, more cinematic feel
  const lightningsRef = React.useRef([]);
  const daoLayerRef = React.useRef(null);
  const flashRef = React.useRef(null);
  const portraitRef = React.useRef(null);
  const textCardRef = React.useRef(null);
  const haloRef = React.useRef(null);
  const apertureRef = React.useRef(null);
  const raysRef = React.useRef(null);
  const chainsRef = React.useRef(null);
  const audioRef = React.useRef(null);

  function initAudio() {
    if (!audioRef.current) {
      try { audioRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    const actx = audioRef.current;
    if (actx && actx.state === "suspended") actx.resume().catch(() => {});
  }

  function playChargeSound(duration) {
    initAudio();
    const actx = audioRef.current;
    if (!actx) return;
    const now = actx.currentTime;
    const dur = duration / 1000;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(55, now);
    osc.frequency.exponentialRampToValueAtTime(tier === "venerable" ? 780 : tier === "gu_immortal" ? 560 : 340, now + dur * 0.88);
    gain.gain.setValueAtTime(0.0, now);
    gain.gain.linearRampToValueAtTime(0.09, now + 0.25);
    gain.gain.setValueAtTime(0.09, now + dur * 0.75);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(now); osc.stop(now + dur + 0.1);
    const rumble = actx.createOscillator();
    const rGain = actx.createGain();
    rumble.type = "sine";
    rumble.frequency.setValueAtTime(32, now);
    rGain.gain.setValueAtTime(tier === "venerable" ? 0.38 : 0.22, now);
    rGain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    rumble.connect(rGain); rGain.connect(actx.destination);
    rumble.start(now); rumble.stop(now + dur + 0.1);
  }

  function playImpactSound() {
    initAudio();
    const actx = audioRef.current;
    if (!actx) return;
    const now = actx.currentTime;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(tier === "venerable" ? 110 : tier === "gu_immortal" ? 85 : 65, now);
    osc.frequency.exponentialRampToValueAtTime(18, now + 1.8);
    gain.gain.setValueAtTime(tier === "venerable" ? 0.75 : tier === "gu_immortal" ? 0.55 : 0.38, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.8);
    osc.connect(gain); gain.connect(actx.destination);
    osc.start(now); osc.stop(now + 1.9);
    if (tier !== "gu_master") {
      const shimmer = actx.createOscillator();
      const sGain = actx.createGain();
      shimmer.type = "sine";
      shimmer.frequency.setValueAtTime(tier === "venerable" ? 1800 : 1200, now);
      shimmer.frequency.exponentialRampToValueAtTime(400, now + 1.2);
      sGain.gain.setValueAtTime(0.12, now);
      sGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
      shimmer.connect(sGain); sGain.connect(actx.destination);
      shimmer.start(now); shimmer.stop(now + 1.3);
    }
  }

  function addParticle(o) {
    const life = o.life || 80;
    particlesRef.current.push({
      x: o.x, y: o.y, vx: o.vx || 0, vy: o.vy || 0,
      gravity: o.gravity || 0, drag: o.drag || 0.98,
      size: o.size || 3, color: o.color || "#ffffff",
      glow: o.glow || 12, alpha: o.alpha || 1,
      life, maxLife: life, kind: o.kind || "orb",
    });
  }

  function doBurst(color, amount, power, sizeMax, kind) {
    sizeMax = sizeMax || 4; kind = kind || "orb";
    const cvs = canvasRef.current;
    if (!cvs) return;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const cx = cvs.width / (2 * DPR), cy = cvs.height / (2 * DPR);
    for (let i = 0; i < amount; i++) {
      const a = Math.random() * Math.PI * 2;
      addParticle({ x: cx + (Math.random()-0.5)*30, y: cy + (Math.random()-0.5)*30,
        vx: Math.cos(a)*power*(0.35+Math.random()), vy: Math.sin(a)*power*(0.35+Math.random()),
        size: 1+Math.random()*sizeMax, color, glow: 16+Math.random()*18,
        life: 55+Math.random()*52, drag: 0.965, kind });
    }
  }

  function doRingBurst(color, amount, radius, power) {
    radius = radius || 120; power = power || 4;
    const cvs = canvasRef.current;
    if (!cvs) return;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const cx = cvs.width / (2 * DPR), cy = cvs.height / (2 * DPR);
    for (let i = 0; i < amount; i++) {
      const a = (i/amount)*Math.PI*2 + (Math.random()-0.5)*0.18;
      addParticle({ x: cx+Math.cos(a)*radius, y: cy+Math.sin(a)*radius,
        vx: Math.cos(a)*(power+Math.random()*3), vy: Math.sin(a)*(power+Math.random()*3),
        size: 1.5+Math.random()*3.5, color, glow: 18, life: 70+Math.random()*45, drag: 0.972 });
    }
  }

  function doHeavenRain(color, amount) {
    const cvs = canvasRef.current;
    if (!cvs) return;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const W = cvs.width / DPR, H = cvs.height / DPR, cx = W/2;
    for (let i = 0; i < amount; i++) {
      addParticle({ x: cx+(Math.random()-0.5)*W*0.95, y: -80-Math.random()*H*0.35,
        vx: (Math.random()-0.5)*1.2, vy: 7+Math.random()*8,
        size: 1+Math.random()*2.2, color, glow: 20, life: 95+Math.random()*50, drag: 0.995, kind: "streak" });
    }
  }

  function doLightning(color, count) {
    count = count || 4;
    const cvs = canvasRef.current;
    if (!cvs) return;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const W = cvs.width / DPR, H = cvs.height / DPR;
    for (let i = 0; i < count; i++) {
      const sx = Math.random()*W;
      const tx = W/2 + (Math.random()-0.5)*Math.min(W*0.45, 520);
      const ty = H/2 + (Math.random()-0.5)*Math.min(H*0.25, 240);
      const life = 14+Math.random()*10;
      const pts = [];
      for (let j = 0; j <= 12; j++) {
        const tt = j/12, taper = Math.sin(tt*Math.PI);
        pts.push({ x: sx+(tx-sx)*tt+(Math.random()-0.5)*140*taper+(Math.random()-0.5)*24,
                   y: -60+(ty+60)*tt+(Math.random()-0.5)*26 });
      }
      pts[0] = { x: sx, y: -60 }; pts[12] = { x: tx, y: ty };
      lightningsRef.current.push({ points: pts, color, width: 2+Math.random()*3.5, life, maxLife: life });
    }
  }

  function spawnDaoMark() {
    const layer = daoLayerRef.current;
    const cvs = canvasRef.current;
    if (!layer || !cvs) return;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const W = cvs.width/DPR, H = cvs.height/DPR;
    const cx = W/2, cy = H/2;
    const scale = tier === "venerable" ? 1.3 : tier === "gu_immortal" ? 1.0 : 0.8;
    const mark = document.createElement("span");
    const angle = Math.random()*Math.PI*2;
    const r = 45 + Math.random()*Math.min(W,H)*0.18;
    const lx = cx + Math.cos(angle)*r;
    const ly = cy + Math.sin(angle)*r;
    const dx = Math.cos(angle)*(150+Math.random()*280)*scale;
    const dy = Math.sin(angle)*(150+Math.random()*280)*scale;
    const life = 2800+Math.random()*850;
    const glyph = cfg.glyphs[Math.floor(Math.random()*cfg.glyphs.length)];
    const fs = 16+Math.random()*22*scale;
    mark.textContent = glyph;
    mark.setAttribute("style",
      "position:absolute;pointer-events:none;user-select:none;" +
      "left:" + lx + "px;top:" + ly + "px;" +
      "color:" + cfg.accent + ";" +
      "font-weight:700;font-size:" + fs + "px;" +
      "text-shadow:0 0 9px currentColor,0 0 22px currentColor;" +
      "opacity:0;transform:translate(-50%,-50%);" +
      "--dx:" + dx + "px;--dy:" + dy + "px;" +
      "animation:daoMarkAnim " + life + "ms linear forwards;"
    );
    layer.appendChild(mark);
    setTimeout(() => { if (mark.parentNode) mark.parentNode.removeChild(mark); }, life + 300);
  }

  React.useEffect(() => {
    const cvs = canvasRef.current;
    const container = containerRef.current;
    if (!cvs || !container) return;
    const ctx2 = cvs.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let frame = 0;
    let alive = true;

    function resize() {
      cvs.width = Math.floor(window.innerWidth * DPR);
      cvs.height = Math.floor(window.innerHeight * DPR);
      cvs.style.width = window.innerWidth + "px";
      cvs.style.height = window.innerHeight + "px";
      ctx2.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener("resize", resize);

    function ambient() {
      if (particlesRef.current.length > 700) return;
      const now = performance.now();
      if (now - lastAmbientRef.current < 100) return;
      lastAmbientRef.current = now;
      const W = window.innerWidth;
      const cols = ["rgba(180,140,255,0.3)","rgba(255,220,130,0.22)","rgba(105,235,255,0.2)"];
      addParticle({ x: Math.random()*W, y: window.innerHeight+30,
        vx: (Math.random()-0.5)*0.3, vy: -0.3-Math.random()*0.7,
        size: 0.8+Math.random()*1.6, color: cols[Math.floor(Math.random()*cols.length)],
        glow: 8, alpha: 0.55, life: 180+Math.random()*120, drag: 0.999 });
    }

    function drawLoop() {
      if (!alive) return;
      animRef.current = requestAnimationFrame(drawLoop);
      const now = performance.now();
      if (now - lastFrameRef.current < TARGET_FRAME_MS) return;
      lastFrameRef.current = now;
      frame++;
      const W = window.innerWidth, H = window.innerHeight;
      ctx2.clearRect(0, 0, W, H);
      ambient();

      ctx2.save();
      ctx2.fillStyle = "rgba(20,10,35,0.38)";
      ctx2.beginPath();
      const mpts = [[0,.78],[.07,.58],[.15,.75],[.24,.45],[.34,.74],[.45,.50],[.55,.78],[.67,.42],[.79,.74],[.90,.55],[1,.80],[1,1],[0,1]];
      mpts.forEach(([x,y],i) => i===0 ? ctx2.moveTo(x*W,y*H) : ctx2.lineTo(x*W,y*H));
      ctx2.closePath(); ctx2.fill(); ctx2.restore();

      ctx2.save();
      ctx2.globalCompositeOperation = "lighter";

      for (let i = particlesRef.current.length-1; i >= 0; i--) {
        const p = particlesRef.current[i];
        p.life -= 1;
        if (p.life <= 0) { particlesRef.current.splice(i,1); continue; }
        p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
        p.vx *= p.drag; p.vy *= p.drag;
        const a = Math.max(p.life/p.maxLife,0)*p.alpha;
        ctx2.globalAlpha = a; ctx2.shadowBlur = p.glow; ctx2.shadowColor = p.color;
        if (p.kind === "streak") {
          ctx2.strokeStyle = p.color; ctx2.lineWidth = p.size;
          ctx2.beginPath(); ctx2.moveTo(p.x,p.y); ctx2.lineTo(p.x-p.vx*6,p.y-p.vy*6); ctx2.stroke();
        } else {
          ctx2.fillStyle = p.color;
          ctx2.beginPath(); ctx2.arc(p.x,p.y,p.size,0,Math.PI*2); ctx2.fill();
        }
      }

      for (let i = lightningsRef.current.length-1; i >= 0; i--) {
        const l = lightningsRef.current[i];
        l.life -= 1;
        if (l.life <= 0) { lightningsRef.current.splice(i,1); continue; }
        const a = Math.max(l.life/l.maxLife,0);
        ctx2.globalAlpha = a; ctx2.strokeStyle = l.color; ctx2.lineWidth = l.width;
        ctx2.shadowBlur = 26; ctx2.shadowColor = l.color;
        ctx2.beginPath();
        l.points.forEach((pt,j) => j===0 ? ctx2.moveTo(pt.x,pt.y) : ctx2.lineTo(pt.x,pt.y));
        ctx2.stroke();
        ctx2.globalAlpha = a*0.9; ctx2.strokeStyle = "rgba(255,255,255,0.95)";
        ctx2.lineWidth = Math.max(1,l.width*0.34); ctx2.shadowBlur = 12; ctx2.shadowColor = "#fff";
        ctx2.beginPath();
        l.points.forEach((pt,j) => j===0 ? ctx2.moveTo(pt.x,pt.y) : ctx2.lineTo(pt.x,pt.y));
        ctx2.stroke();
      }
      ctx2.restore();
    }
    drawLoop();

    const W = window.innerWidth;
    const H = window.innerHeight;

    playChargeSound(cfg.chargeTime);

    const gravityInterval = setInterval(() => {
      if (particlesRef.current.length >= 220) return;
      const angle = Math.random()*Math.PI*2;
      const r = 80 + Math.random()*Math.max(W,H)*0.45;
      const cx = W/2, cy = H/2;
      const px = cx+Math.cos(angle)*r, py = cy+Math.sin(angle)*r;
      addParticle({ x: px, y: py,
        vx: (cx-px)*0.013, vy: (cy-py)*0.013,
        size: 1.2+Math.random()*2.8, color: cfg.accent,
        glow: 14, alpha: 0.7, life: 55+Math.random()*35, drag: 0.98 });
    }, 28);

    const daoInterval = setInterval(spawnDaoMark, tier==="venerable"?180:tier==="gu_immortal"?280:420);

    const halo = haloRef.current, ap = apertureRef.current;
    if (halo) { halo.style.opacity = "1"; halo.style.transform = "translate(-50%,-50%) scale(1)"; }
    if (ap) setTimeout(() => { if (ap) ap.style.opacity = "0.75"; }, 200);

    setTimeout(() => {

      clearInterval(daoInterval);

      {cfg.doChains && (

      <div ref={flashRef} style={{position:"absolute",inset:0,zIndex:55,opacity:0,pointerEvents:"none",mixBlendMode:"screen"}} />

      <div ref={portraitRef} style={{
        position:"relative",zIndex:20,

        boxShadow:"0 0 0 8px rgba(255,255,255,0.08),0 0 50px " + cfg.glow + "0.4)",
        opacity:0,transform:"scale(1.18)",filter:"brightness(3) blur(7px)",
        transition:"opacity 0.65s cubic-bezier(.2,.8,.3,1),transform 0.65s cubic-bezier(.2,.8,.3,1),filter 0.65s ease",
        animation:"aoRimPulse 2.2s 1s ease-in-out infinite",
      }}>
        <img src={images[tier]} alt={titles[tier]} style={{width:"100%",height:"100%",objectFit:"cover"}} />
      </div>

      <div ref={textCardRef} style={{
        position:"absolute",bottom:"8vh",left:"50%",
        transform:"translateX(-50%) translateY(22px)",
        width:cfg.cardWidth,textAlign:"center",zIndex:30,pointerEvents:"none",
        opacity:0,transition:"opacity 0.5s ease,transform 0.5s ease",
      }}>
        <div style={{
          fontFamily:"Metamorphous,Georgia,serif",
          fontSize:tier==="venerable"?"clamp(26px,6.5vw,40px)":tier==="gu_immortal"?"clamp(22px,5.5vw,32px)":"clamp(18px,4.5vw,26px)",
          fontWeight:700,color:"#fff",letterSpacing:"0.08em",
          textShadow:"0 0 20px " + cfg.glow + "0.9),0 0 50px " + cfg.accent + "80",
        }}>{titles[tier]}</div>
        <div style={{
          marginTop:10,fontSize:13,color:"rgba(255,245,225,0.82)",
          fontFamily:"'IM Fell English',Georgia,serif",lineHeight:1.55,padding:"0 16px",
        }}>{subtitles[tier]}</div>
      </div>

      <div className="ao-vignette" style={{zIndex:45}} />
    </div>
  );
}

// ─── Main ─────────────────────────────────────────────────────────────────────
function RenZuReader() {
  // ── Font loader — runs in user's browser, not sandbox
  useEffect(() => {
    const fonts = [
      // Metamorphous: heavy medieval serif (closest to Morris Roman on Google Fonts)
      // IM Fell English: aged Renaissance body text (closest to Junicode on Google Fonts)
      "https://fonts.googleapis.com/css2?family=Metamorphous&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&family=Cinzel+Decorative:wght@400;700&family=Poppins:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=EB+Garamond:ital@1&display=swap"
    ];
    fonts.forEach(href => {
      if (!document.querySelector(`link[href="${href}"]`)) {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href;
        document.head.appendChild(link);
      }
    });
  }, []);

  // ── Sticky header on scroll ─────────────────────────────────────────────
  useEffect(() => {
    const handleScroll = () => {
      const contentEl = document.querySelector('[data-content-area]');
      if (contentEl) {
        setHeaderSticky(contentEl.scrollTop > 80);
      } else {
        setHeaderSticky(window.scrollY > 80);
      }
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  // mode: "light" | "dark" | "scroll"
  const [showIntro, setShowIntro]   = useState(true);
  const [mode, setMode]             = useState("light");
  const [query, setQuery]           = useState("");
  const [theme, setTheme]           = useState("all");
  const [themeOpen, setThemeOpen]   = useState(false);
  const [selected, setSelected]     = useState(null);
  const [aiResponse, setAiResponse] = useState("");
  const [aiLoading, setAiLoading]   = useState(false);
  const [aiQuestion, setAiQuestion] = useState("");
  const [aiStreaming, setAiStreaming] = useState(false);
  const [hovered, setHovered]       = useState(null);
  const [transitioning, setTransitioning] = useState(false);
  const [voice, setVoice]           = useState("en-GB-Studio-B");
  const [voicePickerOpen, setVoicePickerOpen] = useState(false);
  const [speechRate, setSpeechRate]  = useState(1);
  const speechRateRef = useRef(1);
  const [accentRegion, setAccentRegion] = useState("british");
  const [highlightStart, setHighlightStart] = useState(0);
  const [selectionMenu, setSelectionMenu] = useState(null); // {x,y,text,sentenceIdx}
  const chapterCanvasRef = useRef(null);
const chapterKeyRef = useRef(null);
  const [headerSticky, setHeaderSticky] = useState(false);
  const [audioPlaying, setAudioPlaying] = useState(false);
  const [audioPaused, setAudioPaused] = useState(false);
  const [audioLoading, setAudioLoading] = useState(false);
  const [audioError, setAudioError] = useState(false);
  const [audioStatus, setAudioStatus] = useState("");
  const [activeSentenceIdx, setActiveSentenceIdx] = useState(-1);
  // ── Cultivation billing / essence state ───────────────────────────────
  const [deviceId, setDeviceId] = useState(null);
  const [userEmail, setUserEmail] = useState("");
  const [userName, setUserName] = useState("");
  const [tier, setTier] = useState("mortal");
  const [dailyChatUsed, setDailyChatUsed] = useState(0);
  const [dailyAudioUsed, setDailyAudioUsed] = useState(0);
  const [narrationsRemaining, setNarrationsRemaining] = useState(0);
  const [chatsRemaining, setChatsRemaining] = useState(0);
  const [lastResetDate, setLastResetDate] = useState(null);
  const [showTreasure, setShowTreasure] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [paymentReturn, setPaymentReturn] = useState({
    visible: false,
    status: "",
    txRef: "",
    transactionId: "",
    code: "",
    tier: "",
    loading: false,
    error: "",
    redeeming: false
  });
  const [essenceLoading, setEssenceLoading] = useState(false);
  const [ascensionTier, setAscensionTier] = useState(null);
  const [refiningTier, setRefiningTier] = useState(null);
  const [showRenZuLoader, setShowRenZuLoader] = useState(false);
  const [collectedGu, setCollectedGu] = useState([]);
  const [awardedGu, setAwardedGu] = useState(null);
  const [showDevPanel, setShowDevPanel] = useState(false);
  const [devTapCount, setDevTapCount] = useState(0);
  const devTapTimerRef = React.useRef(null);
  const [backendMode, setBackendMode] = useState('local'); // 'api' | 'local'
  const utteranceRef = useRef(null);
  const sentenceIndexRef = useRef(0);
  const sentencesRef = useRef([]);
  const playbackActiveRef = useRef(false);
  const pausedRef = useRef(false);
  const audioContextRef = useRef(null);
  const currentSourceRef = useRef(null);
  const chainIdRef = useRef(0);
  const aiRef    = useRef(null);
  const customRef = useRef(null);
  const topRef   = useRef(null);
  const paymentLookupTimerRef = useRef(null);

  // ── Cultivation billing / essence helpers ────────────────────────────
  const DAILY_CHAT_LIMIT = 3;
  const DAILY_AUDIO_LIMIT = 2;
  const GU_MASTER_NARRATIONS = 42;
  const GU_MASTER_CHATS = 100;
  const GU_IMMORTAL_NARRATIONS = 500;

  function getTodayKey() {
    return new Date().toISOString().slice(0, 10);
  }

  function generateDeviceId() {
    return 'd-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now().toString(36);
  }

  function cancelPaymentLookup() {
    if (paymentLookupTimerRef.current) {
      clearTimeout(paymentLookupTimerRef.current);
      paymentLookupTimerRef.current = null;
    }
  }

  function clearPaymentParamsFromUrl() {
    try {
      const url = new URL(window.location.href);
      ["status", "tx_ref", "transaction_id", "txRef", "transactionId"].forEach(k => {
        url.searchParams.delete(k);
      });
      const next = url.pathname + (url.search ? url.search : (url.searchParams.toString() ? `?${url.searchParams.toString()}` : "")) + url.hash;
      window.history.replaceState(window.history.state, "", next);
    } catch (_) {}
  }

  async function lookupPaymentCode(txRef, status = "successful", transactionId = "", attempt = 0) {
    cancelPaymentLookup();

    if (!txRef) {
      setPaymentReturn({
        visible: true,
        status,
        txRef: "",
        transactionId,
        code: "",
        tier: "",
        loading: false,
        error: "Missing transaction reference.",
        redeeming: false
      });
      return;
    }

    setPaymentReturn(prev => ({
      ...prev,
      visible: true,
      status,
      txRef,
      transactionId,
      loading: true,
      error: "",
      code: attempt === 0 ? "" : prev.code,
      tier: attempt === 0 ? "" : prev.tier,
      redeeming: false
    }));

    try {
      const res = await fetch(`/api/get-code?reference=${encodeURIComponent(txRef)}`);
      const data = await res.json().catch(() => ({}));

      if (res.ok && data.code) {
        setPaymentReturn(prev => ({
          ...prev,
          visible: true,
          status,
          txRef,
          transactionId,
          code: data.code,
          tier: data.tier || "",
          loading: false,
          error: "",
          redeeming: false
        }));
        return;
      }

      if (res.status === 404 && attempt < 14) {
        paymentLookupTimerRef.current = setTimeout(() => {
          lookupPaymentCode(txRef, status, transactionId, attempt + 1);
        }, 2500);
        return;
      }

      setPaymentReturn(prev => ({
        ...prev,
        visible: true,
        status,
        txRef,
        transactionId,
        loading: false,
        error: data.error || "The code is not ready yet. Try again in a few seconds.",
        redeeming: false
      }));
    } catch (err) {
      setPaymentReturn(prev => ({
        ...prev,
        visible: true,
        status,
        txRef,
        transactionId,
        loading: false,
        error: "Could not check for your code right now. Try again shortly.",
        redeeming: false
      }));
    }
  }

  async function redeemRecoveredCode() {
    if (!paymentReturn.code || !deviceId) return;

    setPaymentReturn(prev => ({ ...prev, redeeming: true, error: "" }));

    try {
      const res = await fetch("/api/redeem-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ deviceId, code: paymentReturn.code.trim().toLowerCase() })
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.success) {
        throw new Error(data.error || "Could not redeem code.");
      }

      clearPaymentParamsFromUrl();
      setPaymentReturn({
        visible: false,
        status: "",
        txRef: "",
        transactionId: "",
        code: "",
        tier: "",
        loading: false,
        error: "",
        redeeming: false
      });
      unlockAudio(data.tier);
    } catch (err) {
      setPaymentReturn(prev => ({
        ...prev,
        redeeming: false,
        error: err.message || "Could not redeem code."
      }));
    }
  }

  function closePaymentReturn() {
    cancelPaymentLookup();
    clearPaymentParamsFromUrl();
    setPaymentReturn({
      visible: false,
      status: "",
      txRef: "",
      transactionId: "",
      code: "",
      tier: "",
      loading: false,
      error: "",
      redeeming: false
    });
  }

  // Load local state and deviceId on mount, then sync with backend
  useEffect(() => {
    let id;
    try {
      id = localStorage.getItem("renzu_device_id");
      if (!id) {
        id = generateDeviceId();
        localStorage.setItem("renzu_device_id", id);
      }
      setDeviceId(id);
    } catch (_) {
      id = generateDeviceId();
      setDeviceId(id);
    }

    try {
      const saved = localStorage.getItem("renzu_essence");
      if (saved) {
        const data = JSON.parse(saved);
        const today = getTodayKey();
        if (data.lastResetDate === today) {
          setDailyChatUsed(data.dailyChatUsed || 0);
          setDailyAudioUsed(data.dailyAudioUsed || 0);
        } else {
          setDailyChatUsed(0);
          setDailyAudioUsed(0);
        }
        setTier(data.tier || "mortal");
        setNarrationsRemaining(data.narrationsRemaining || 0);
        setChatsRemaining(data.chatsRemaining || 0);
        setUserEmail(data.userEmail || "");
        setUserName(data.userName || "");
        setLastResetDate(today);
      }
    } catch (_) {}

    syncWithBackend(id);
  }, []);

  useEffect(() => {
    if (!deviceId) return;

    const params = new URLSearchParams(window.location.search || "");
    const txRef = params.get("tx_ref") || params.get("txRef") || "";
    const status = params.get("status") || "";
    const transactionId = params.get("transaction_id") || params.get("transactionId") || "";

    if (!txRef && !status) return;

    if (status && status !== "successful") {
      setPaymentReturn({
        visible: true,
        status,
        txRef,
        transactionId,
        code: "",
        tier: "",
        loading: false,
        error: "",
        redeeming: false
      });
      return;
    }

    lookupPaymentCode(txRef, status || "successful", transactionId, 0);

    return () => cancelPaymentLookup();
  }, [deviceId]);

  async function getAuthHeaders() {
    try {

  async function deductEssence(type) {
    resetDailyIfNeeded();
    if (!deviceId) return false;
    if (tier === "venerable") return true;

    setEssenceLoading(true);

    // Try backend first
    if (backendMode === "api") {
      try {
        const authHeaders = await getAuthHeaders();

        const res = await fetch("/api/use-credit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...authHeaders
          },
          body: JSON.stringify({ deviceId, type }),
        });
        const data = await res.json();
        if (data.success) {
          if (data.narrationsRemaining !== undefined) setNarrationsRemaining(data.narrationsRemaining);
          if (data.chatsRemaining !== undefined) setChatsRemaining(data.chatsRemaining);
          if (data.dailyAudioUsed !== undefined) setDailyAudioUsed(data.dailyAudioUsed);
          if (data.dailyChatUsed !== undefined) setDailyChatUsed(data.dailyChatUsed);
          setEssenceLoading(false);
          return true;
        }
        if (res.status === 402) {
          setEssenceLoading(false);
          setShowTreasure(true);
          return false;
        }
        throw new Error(data.error);
      } catch (err) {
        setBackendMode("local");
      }
    }

    // Local fallback
    if (tier === "venerable") {
      setEssenceLoading(false);
      return true;
    }
    if (tier === "gu_immortal") {
      if (type === "audio") {
        if (narrationsRemaining > 0) {
          setNarrationsRemaining(n => n - 1);
          setEssenceLoading(false);
          return true;
        }
      } else {
        setEssenceLoading(false);
        return true;
      }
    }
    if (tier === "gu_master") {
      if (type === "audio") {
        if (narrationsRemaining > 0) {
          setNarrationsRemaining(n => n - 1);
          setEssenceLoading(false);
          return true;
        }
      } else {
        if (chatsRemaining > 0) {
          setChatsRemaining(c => c - 1);
          setEssenceLoading(false);
          return true;
        }
      }
    }
    // Mortal
    if (type === "audio") {
      if (dailyAudioUsed < DAILY_AUDIO_LIMIT) {
        setDailyAudioUsed(c => c + 1);
        setEssenceLoading(false);
        return true;
      }
    } else {
      if (dailyChatUsed < DAILY_CHAT_LIMIT) {
        setDailyChatUsed(c => c + 1);
        setEssenceLoading(false);
        return true;
      }
    }
    setEssenceLoading(false);
    setShowTreasure(true);
    return false;
  }

  // Award Gu worms from the tier's pool (hybrid: deterministic main + random bonus)
  function awardGuFromTier(tierName) {
    const pool = GU_POOL[tierName] || [];
    if (pool.length === 0) return [];
    const ownedIds = new Set(collectedGu.map(g => g.id));
    const newGu = [];
    // 1. Deterministic main Gu (feature-bound to tier)
    const mainId = TIER_MAIN_GU[tierName];
    const mainGu = pool.find(g => g.id === mainId) || pool[0];
    if (!ownedIds.has(mainGu.id)) {
      newGu.push({ ...mainGu, tier: tierName, awardedAt: Date.now(), isMain: true });
      ownedIds.add(mainGu.id);
    }
    // 2. Random bonus from same pool, excluding already-owned
    const available = pool.filter(g => !ownedIds.has(g.id));
    if (available.length > 0) {
      const bonus = available[Math.floor(Math.random() * available.length)];
      newGu.push({ ...bonus, tier: tierName, awardedAt: Date.now(), isMain: false });
    }
    if (newGu.length > 0) setCollectedGu(c => [...c, ...newGu]);
    return newGu;
  }

  // ── Google Cloud TTS — Studio narrator voices ────────────────────────────────
  // Chains sentences for seamless narration with sentence-level highlighting.
  // Supports true pause/resume: pausing suspends the AudioContext and holds the
  // chain in a wait-loop; resuming just flips the flag so the same chain continues.
  // A chainIdRef ensures only one chain is ever active — switching voice, chapter,
  // or stopping increments the ID, making any running chain abandon itself.

  function stopAllAudio() {
    // Invalidate any running chain by bumping the chain ID
    chainIdRef.current += 1;
    playbackActiveRef.current = false;
    pausedRef.current = false;
    if (audioContextRef.current) {
      audioContextRef.current.close().catch(() => {});
      audioContextRef.current = null;
    }
    if (currentSourceRef.current) {
      try { currentSourceRef.current.stop(); } catch (_) {}
      currentSourceRef.current = null;
    }
    sentencesRef.current = [];
    sentenceIndexRef.current = 0;
    setActiveSentenceIdx(-1);
  }

  async function playAudioFromBlob(audioBlob, myChainId) {
    if (!audioBlob || audioBlob.size === 0) return true;
    // Abort if this chain is stale
    if (chainIdRef.current !== myChainId) return false;

    const arrayBuffer = await audioBlob.arrayBuffer();
    if (chainIdRef.current !== myChainId) return false;

    if (!audioContextRef.current) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) throw new Error("Web Audio API not supported");
      audioContextRef.current = new AudioContext();
    }
    const ctx = audioContextRef.current;
    if (ctx.state === "suspended") await ctx.resume();
    if (chainIdRef.current !== myChainId) return false;

    const decoded = await new Promise((resolve, reject) =>
      ctx.decodeAudioData(arrayBuffer, resolve, reject)
    );

    if (chainIdRef.current !== myChainId) return false;

    const source = ctx.createBufferSource();
    source.buffer = decoded;
    source.connect(ctx.destination);
    currentSourceRef.current = source;

    // Returns true if played to completion; false if stopped early (e.g. paused/stopped)
    return new Promise((resolve) => {
      source.onended = () => {
        // If we're currently paused, the source was stopped early by toggleAudio
        resolve(!pausedRef.current && chainIdRef.current === myChainId);
      };
      source.start(0);
    });
  }

  async function runChain(myChainId) {
    while (true) {
      // Abort if chain was superseded
      if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;

      const sentences = sentencesRef.current;
      const idx = sentenceIndexRef.current;

      if (idx >= sentences.length) {
        setAudioPlaying(false);
        setAudioLoading(false);
        setAudioPaused(false);
        setActiveSentenceIdx(-1);
        playbackActiveRef.current = false;
        return;
      }

      setActiveSentenceIdx(idx);

      try {
        const ttsRes = await fetch("/api/ai-chat-tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: sentences[idx], voice, speakingRate: speechRateRef.current })
        });

        if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;

        if (!ttsRes.ok) {
          let errMsg = `TTS failed: ${ttsRes.status}`;
          try { const b = await ttsRes.json(); if (b.error) errMsg += ` — ${b.error}`; } catch (_) {}
          throw new Error(errMsg);
        }

        const audioBlob = await ttsRes.blob();
        if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;

        if (idx === 0) { setAudioLoading(false); setAudioPlaying(true); }

        // Wait while paused — audio blob is already fetched, we just hold here.
        // The AudioContext is suspended so nothing plays while we wait.
        while (pausedRef.current) {
          if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;
          await new Promise(r => setTimeout(r, 80));
        }
        if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;

        // Play the sentence. Returns true if it completed naturally, false if stopped mid-way.
        const completedNaturally = await playAudioFromBlob(audioBlob, myChainId);

        if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;

        if (!completedNaturally) {
          // Paused mid-sentence — enter the wait-loop WITHOUT advancing the index.
          // When resumed, the loop will re-fetch and re-play the same sentence from the start.
          while (pausedRef.current) {
            if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;
            await new Promise(r => setTimeout(r, 80));
          }
          if (chainIdRef.current !== myChainId || !playbackActiveRef.current) return;
          // Don't advance idx — loop back to re-fetch & play this sentence again
          continue;
        }

        sentenceIndexRef.current = idx + 1;
        // loop continues to next sentence
      } catch (err) {
        if (chainIdRef.current !== myChainId) return; // stale chain, silently exit
        console.error("TTS error:", err);
        setAudioError(true);
        setAudioStatus(err.message || "Audio playback failed");
        setAudioLoading(false);
        setAudioPlaying(false);
        setActiveSentenceIdx(-1);
        playbackActiveRef.current = false;
        return;
      }
    }
  }

  // Split text into sentences
  function splitSentences(text, maxLen = 220) {
    const raw = text.replace(/\n+/g, " ");
    const parts = raw.match(/[^.!?…]+[.!?…]*["'»\s]*/g) || [raw];
    const out = [];
    let cur = "";
    for (const s of parts) {
      if (cur.length + s.length > maxLen && cur.length > 0) { out.push(cur.trim()); cur = ""; }
      cur += s;
    }
    if (cur.trim()) out.push(cur.trim());
    return out;
  }

  // ── Long-press to select (Kindle/Moon+ Reader style) ──
  // Long press on any sentence highlights it and shows the action bar.
  // No event race with scroll — the timer is cancelled on any movement.
  const [tappedSentenceIdx, setTappedSentenceIdx] = useState(-1);
  const longPressTimerRef = useRef(null);
  const longPressActiveIdxRef = useRef(-1);
  const longPressMoved = useRef(false);
  const longPressStartPos = useRef({ x: 0, y: 0 });
  const tappedSentenceIdxRef = useRef(-1); // mirrors tappedSentenceIdx, read inside the timer closure
  const menuShownAtRef = useRef(0); // timestamp when the selection menu last appeared

const LONG_PRESS_MS = 350;
const LONG_PRESS_MOVE_THRESHOLD = 16; // px — ignore sub-pixel tremor, only cancel on real movement
  const MENU_DISMISS_GUARD_MS = 500; // ms — ignore dismiss events fired right after menu appears

  function cancelLongPress() {
    if (longPressTimerRef.current) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; }
  }

  function handleSentencePointerDown(sentenceIdx, sentenceText, e) {
    // Only primary pointer (finger / left-click)
    if (e.button !== undefined && e.button !== 0) {
      return;
    }
    e.preventDefault(); // Prevent native text selection / callout on long press
    longPressMoved.current = false;
    longPressActiveIdxRef.current = sentenceIdx;
    longPressStartPos.current = { x: e.clientX, y: e.clientY };
    cancelLongPress();
      longPressTimerRef.current = setTimeout(() => {
    longPressTimerRef.current = null;
    if (longPressMoved.current) { return; } // finger drifted — it was a scroll
    // Haptic feedback on supported devices
    if (navigator.vibrate) navigator.vibrate(32);
    setTappedSentenceIdx(sentenceIdx);
    setSelectionMenu({ text: sentenceText, sentenceIdx });
    menuShownAtRef.current = Date.now();
  }, LONG_PRESS_MS);
  }

  function handleSentencePointerMove(e) {
    // Only treat as a scroll once the pointer has actually traveled past the
    // threshold — tiny sub-pixel jitter on mobile shouldn't kill the timer.
    const dx = e.clientX - longPressStartPos.current.x;
    const dy = e.clientY - longPressStartPos.current.y;
    if (dx * dx + dy * dy > LONG_PRESS_MOVE_THRESHOLD * LONG_PRESS_MOVE_THRESHOLD) {
      longPressMoved.current = true;
      cancelLongPress();
    }
  }

  function handleSentencePointerUp() {
    cancelLongPress();
  }

  // ── Dismiss on tap outside (not inside popup, not on a sentence span) ──
  const selectionMenuRef = useRef(null);
  useEffect(() => { tappedSentenceIdxRef.current = tappedSentenceIdx; }, [tappedSentenceIdx]);
  useEffect(() => {
    selectionMenuRef.current = selectionMenu;
  }, [selectionMenu]);

  useEffect(() => {
    function onDocPointerDown(e) {
      if (tappedSentenceIdxRef.current < 0 && !selectionMenuRef.current) return;
      // Guard: ignore dismiss events fired within MENU_DISMISS_GUARD_MS of the menu appearing.
      // This kills the Android finger-lift micro-movement that fires a spurious touchmove/pointerdown.
      if (Date.now() - menuShownAtRef.current < MENU_DISMISS_GUARD_MS) {
        return;
      }
      const popup = document.getElementById("sel-menu-popup");
      if (popup && popup.contains(e.target)) {
        return;
      }
      // Don't dismiss if pointerdown is on a sentence span (long-press handler will deal with it)
      let el = e.target;
      while (el) {
        if (el.dataset && "sentIdx" in el.dataset) { return; }
        el = el.parentElement;
      }
      setTappedSentenceIdx(-1);
      setSelectionMenu(null);
    }
    // Prevent Android's native long-press context menu from stealing the event
    function onContextMenu(e) {
      e.preventDefault();
    }
    document.addEventListener("pointerdown", onDocPointerDown, true);
    document.addEventListener("contextmenu", onContextMenu, { capture: true });
    return () => {
      document.removeEventListener("pointerdown", onDocPointerDown, true);
      document.removeEventListener("contextmenu", onContextMenu, { capture: true });
    };
  }, []);

  async function toggleAudio() {
    if (audioLoading) return;
    if (!selected) return;

    // If currently playing → pause (no essence cost)
    if (audioPlaying && !audioPaused) {
      pausedRef.current = true;
      setAudioPaused(true);
      setAudioPlaying(false);
      // Suspend context so audio output stops immediately
      if (audioContextRef.current) audioContextRef.current.suspend().catch(() => {});
      // Stop the current source so it doesn't keep buffering/playing after resume
      if (currentSourceRef.current) {
        try { currentSourceRef.current.stop(); } catch (_) {}
        currentSourceRef.current = null;
      }
      return;
    }

    // If paused → resume (no essence cost)
    if (audioPaused) {
      pausedRef.current = false;
      setAudioPaused(false);
      setAudioPlaying(true);
      // Resume context so subsequent sentences can play
      if (audioContextRef.current) audioContextRef.current.resume().catch(() => {});
      // Do NOT call runChain() here — the existing chain is still looping in its wait-loop
      return;
    }

    // Fresh start — deduct essence
    const hasEssence = await deductEssence("audio");
    if (!hasEssence) return;
    stopAllAudio();
    setSelectionMenu(null);
    setTappedSentenceIdx(-1);
    setAudioError(false);
    setAudioLoading(true);
    setAudioStatus("");
    setAudioPlaying(false);
    setAudioPaused(false);

    playbackActiveRef.current = true;
    const _sents = splitSentences(selected.body);
    sentencesRef.current = _sents;
    sentenceIndexRef.current = 0;

    const myChainId = chainIdRef.current;
    runChain(myChainId).catch(err => {
      setAudioError(true); setAudioLoading(false);
    });
  }

  // ── Read from here — start narration at a specific sentence index ──
  async function readFromHere(sentenceIdx) {
    if (!selected) return;
    const hasEssence = await deductEssence("audio");
    if (!hasEssence) return;
    stopAllAudio();
    setAudioError(false);
    setAudioLoading(true);
    setAudioStatus("");
    setAudioPlaying(false);
    setAudioPaused(false);
    setSelectionMenu(null);
    setTappedSentenceIdx(-1);

    // Make sure sentences are populated (audio needs the full body)
    if (sentencesRef.current.length === 0) {
      const _sents = splitSentences(selected.body);
      sentencesRef.current = _sents;
    }
    playbackActiveRef.current = true;
    sentenceIndexRef.current = Math.max(0, sentenceIdx);
    const myChainId = chainIdRef.current;
    runChain(myChainId).catch(() => { setAudioError(true); setAudioLoading(false); });
  }

  // ── Read selection — speak only the highlighted text then stop ──
  async function readSelection(text) {
    if (!text || !text.trim()) return;
    const hasEssence = await deductEssence("audio");
    if (!hasEssence) return;
    stopAllAudio();
    setAudioError(false);
    setAudioLoading(true);
    setAudioStatus("");
    setAudioPlaying(false);
    setAudioPaused(false);
    setSelectionMenu(null);
    setTappedSentenceIdx(-1);

    // Temporarily replace sentence list with just the selection
    sentencesRef.current = [text.trim()];
    sentenceIndexRef.current = 0;
    playbackActiveRef.current = true;
    const myChainId = chainIdRef.current;
    runChain(myChainId).catch(() => { setAudioError(true); setAudioLoading(false); });
  }

  function switchVoice(v) {
    if (v === voice) return;

    stopAllAudio();
    setAudioError(false);

  function select(c) {
    setSelected(c); setAiResponse(""); setAiQuestion("");
    try {
      window.history.pushState({ view: "chapter", num: c.num }, "", "#chapter-" + encodeURIComponent(c.num));
    } catch (_) {}
    setTimeout(() => {
      const firstMark = document.querySelector("mark");
      if (firstMark) firstMark.scrollIntoView({ behavior: "smooth", block: "center" });

  // Used by the in-app "← All" button. If we got here via a pushed chapter
  // history entry, step back through it (this fires popstate below, which
  // does the actual setSelected(null)); otherwise just clear selection.
  function goHome() {
    if (typeof window !== "undefined" && window.history.state && window.history.state.view === "chapter") {
      window.history.back();
    } else {
      setSelected(null); setAiResponse(""); setAiQuestion("");
      setTimeout(() => topRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
    }
  }

  // Make the device/browser back button return to the chapter list rather
  // than quitting the app, and the forward button re-open the chapter.
  useEffect(() => {
    if (!window.history.state) {
      try { window.history.replaceState({ view: "home" }, "", window.location.pathname + window.location.search); } catch (_) {}
    }
    function onPopState(e) {
      const state = e.state;
      if (state && state.view === "chapter" && state.num) {
        const c = TAGGED.find(ch => ch.num === state.num);
        setSelected(c || null);
      } else {
        setSelected(null);
      }
      setAiResponse(""); setAiQuestion("");
      setTimeout(() => topRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
    }
    window.addEventListener("popstate", onPopState);
    return () => window.removeEventListener("popstate", onPopState);
  }, []);

  // ── Copy attribution — silently appends source credit to any copied text ──
  useEffect(() => {
    if (!selected) return;
    function onCopy(e) {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) return;
      const selectedText = sel.toString();
      if (!selectedText.trim()) return;
      e.clipboardData.setData("text/plain", selectedText + "\n\n— The Legends of Ren Zu (Reverend Insanity · Gu Zhen Ren)");
      e.preventDefault();
    }
    document.addEventListener("copy", onCopy);
    return () => document.removeEventListener("copy", onCopy);

  useEffect(() => {

      cancelLongPress();
      if (selectionMenu) { setSelectionMenu(null); setTappedSentenceIdx(-1); }
    }
    // Do NOT listen on touchmove — Android fires spurious touchmove events
    // during a long-press (sub-pixel finger tremor) which instantly dismiss

    window.addEventListener("scroll", onScroll, true);
    return () => {

  // ── AI Scholar — talks to our own serverless function (/api/ai-chat),
  //    which holds the GROQ_API_KEY / GEMINI_API_KEY server-side. No keys in the browser.
  async function askAI(question) {
    if (!selected) return;
    const hasEssence = await deductEssence("chat");
    if (!hasEssence) return;
    setAiLoading(true); setAiResponse(""); setAiQuestion(question); setAiStreaming(false);
    setTimeout(() => aiRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);

    // Cap how much chapter text we send — keeps each request well within
    // free-tier token limits (Groq/Gemini) without losing the gist for
    // very long chapters.
    const MAX_CHARS = 9000;
    const bodyForAI = selected.body.length > MAX_CHARS
      ? selected.body.slice(0, MAX_CHARS) + "\n\n[…chapter truncated for length…]"
      : selected.body;

    const userMsg = `Part ${selected.num}: "${selected.title}"\n\nText:\n${bodyForAI}\n\nQuestion: ${question}`;

    try {
      const res = await fetch("/api/ai-chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMsg })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.reply) {
        throw new Error(data.error || `AI request failed (${res.status})`);
      }
      setAiResponse(data.reply);
    } catch (err) {
      setAiResponse(
        "⚠ Ren Zu is unavailable right now. " +
        (err && err.message ? err.message : "Please try again shortly.")
      );
    } finally {
      setAiLoading(false);
    }
  }

                <div ref={aiRef} className="ai-appear" style={{ marginTop: 18, background: D ? "rgba(0,0,0,0.92)" : S ? "rgba(196,155,70,0.30)" : "rgba(253,252,249,0.82)", border: `1px solid ${border}`, borderRadius: 20, padding: "22px 24px", backdropFilter: blur, WebkitBackdropFilter: blur }}>
                  {aiQuestion && (
                    <div style={{ fontSize: 11, color: textDim, marginBottom: 14, fontStyle: "italic", fontFamily: bodyFont, borderBottom: `1px solid ${border}`, paddingBottom: 12, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
                      <span>"{aiQuestion}"</span>
                      <span style={{ fontSize:8, letterSpacing:"0.18em", textTransform:"uppercase", opacity:0.5, whiteSpace:"nowrap", paddingTop:2 }}>Ask Ren Zu</span>
                    </div>
                  )}
                  {aiLoading ? (
                    <div>
                      {[72, 88, 58].map((w, i) => (
                        <div key={i} style={{ height: 11, borderRadius: 6, marginBottom: 10, width: `${w}%`, background: `linear-gradient(90deg, ${border} 25%, ${borderHov} 50%, ${border} 75%)`, backgroundSize: "600px 100%", animation: `shimmer 1.5s ${i*0.18}s infinite` }} />
                      ))}
                    </div>
                  ) : (
                    <Typewriter text={aiResponse} color={text} streaming={aiStreaming} font={bodyFont} />
                  )}
                </div>
              )}
            </div>

            {/* ── SOCIAL LINKS (also shown on reading pages) ── */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, marginTop: 32, paddingBottom: 8 }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                <img src={IMG_LOGO} alt="The Omniarch" style={{ width: 88, height: 88, objectFit: "contain", filter: "drop-shadow(0 4px 18px rgba(212,168,60,0.38))", opacity: D ? 0.85 : 1 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap" }}>
                {[
                  { label: "Discord", href: "https://discord.com/invite/DunazTeMSA", Icon: DiscordIcon },
                  { label: "YouTube", href: "https://youtube.com/@godofpeakfiction", Icon: YouTubeIcon },
                  { label: "TikTok", href: "https://www.tiktok.com/@godofpeakfiction", Icon: TikTokIcon },
                ].map(s => (
                  <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer"
                    style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 18px", fontSize: 11, borderRadius: 999, border: `1px solid ${border}`, color: textMid, fontFamily: headFont, letterSpacing: "0.12em", textTransform: "uppercase", textDecoration: "none", transition: "all 0.17s", background: "transparent" }}
                    onMouseEnter={e => { e.currentTarget.style.color = text; e.currentTarget.style.borderColor = borderHov; }}
                    onMouseLeave={e => { e.currentTarget.style.color = textMid; e.currentTarget.style.borderColor = border; }}
                  ><s.Icon size={14} />{s.label}</a>
                ))}
              </div>
              <div style={{ textAlign: "center", fontSize: 9, color: textDim, letterSpacing: "0.2em", textTransform: "uppercase", fontFamily: headFont }}>
                The Omniarch · God of Peak Fiction
              </div>
            </div>

          </div>
        )}
      </div>

      {/* ── Selection action bar — fixed to bottom, triggered by long press.
          Rendered at the top level (outside the maxWidth content wrapper and
          outside the fadeUp-animated chapter container) so that no ancestor's
          transform/animation can ever turn into a containing block for this
          position:fixed element and trap it off-screen. ── */}
      {selectionMenu && (
        <div id="sel-menu-popup" style={{
          position: "fixed",
          bottom: "max(28px, env(safe-area-inset-bottom, 28px))",
          left: 0,
          right: 0,
          margin: "0 auto",
          width: "fit-content",
          zIndex: 9999,
          display: "flex",
          flexWrap: "wrap",
          justifyContent: "center",
          gap: 2,
          background: D ? "rgba(18,18,22,0.97)" : S ? "rgba(42,21,4,0.96)" : "rgba(20,18,16,0.95)",
          border: `1px solid ${D ? "rgba(255,255,255,0.14)" : S ? "rgba(180,130,40,0.35)" : "rgba(255,255,255,0.14)"}`,
          borderRadius: 16,
          padding: "6px 8px",
          boxShadow: "0 8px 40px rgba(0,0,0,0.55), 0 2px 10px rgba(0,0,0,0.35)",
          backdropFilter: "blur(24px)",
          WebkitBackdropFilter: "blur(24px)",
          animation: "fadeUp 0.18s ease",
        }}>
          {[
            {
              icon: "⏮",
              label: "From Start",
              action: () => { readFromHere(0); }
            },
            {
              icon: "▶",
              label: "Read from Here",
              action: () => readFromHere(selectionMenu.sentenceIdx)
            },
            {
              icon: "◉",
              label: "Read This",
              action: () => readSelection(selectionMenu.text)
            },
            {
              icon: "✦",
              label: "Ask Ren Zu (AI)",
              action: () => {
                const text = selectionMenu.text;
                setSelectionMenu(null); setTappedSentenceIdx(-1);
                askAI(text);
              }
            },
            {
              icon: "📋",
              label: "Copy",
              action: () => {
                navigator.clipboard?.writeText(selectionMenu.text + "\n\n— The Legends of Ren Zu (Reverend Insanity · Gu Zhen Ren)").catch(() => {});
                setSelectionMenu(null); setTappedSentenceIdx(-1);
              }
            },
          ].map(({ icon, label, action }) => (
            <button key={label}
              onPointerDown={e => { e.stopPropagation(); e.preventDefault(); action(); }}
              style={{
                background: "transparent", border: "none", cursor: "pointer",
                color: "rgba(255,255,255,0.90)", fontFamily: headFont,
                padding: "9px 13px", borderRadius: 10,
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                minWidth: 52,
                touchAction: "manipulation",
                transition: "background 0.12s",
                WebkitTapHighlightColor: "transparent",
              }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.10)"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}
            >
              <span style={{ fontSize: 15 }}>{icon}</span>
              <span style={{ fontSize: 8.5, opacity: 0.7, letterSpacing: "0.10em", textTransform: "uppercase" }}>{label}</span>
            </button>
          ))}
        </div>
      )}

      {/* ── Treasure Yellow Heaven — cultivation billing modal ── */}
      {showTreasure && (
        <TreasureYellowHeaven
          open={showTreasure}
          onClose={() => setShowTreasure(false)}
          onUnlock={unlockAudio}
          deviceId={deviceId}
          D={D}
          S={S}
        />
      )}

      {/* ── Profile modal — realm, username, essence balance ── */}
      {showProfile && (
        <ProfileModal
          open={showProfile}
          onClose={() => setShowProfile(false)}
          D={D}
          S={S}
          deviceId={deviceId}
          username={userName}
          email={userEmail}
          tier={tier}
          tierName={getTierName()}
          tierIcon={getTierIcon()}
          essenceStatus={essenceStatus}
          collectedGu={collectedGu}
          onSave={saveProfile}
        />
      )}

      {/* ── Payment fallback recovery modal — shows code after redirect if email delays ── */}
      {paymentReturn.visible && (
        <PaymentRecoveryModal
          data={paymentReturn}
          onClose={closePaymentReturn}
          onRedeem={redeemRecoveredCode}
          onRetry={() => lookupPaymentCode(paymentReturn.txRef, paymentReturn.status || "successful", paymentReturn.transactionId || "", 0)}
          D={D}
          S={S}
        />
      )}

      {/* ── Invisible 5-tap zone — tap top-right corner 5× within 1.8s to open the dev panel ── */}
      <div
        onPointerDown={(e) => {
          e.preventDefault();
          setDevTapCount((n) => {
            const next = n + 1;
            if (devTapTimerRef.current) clearTimeout(devTapTimerRef.current);
            if (next >= 5) {
              setShowDevPanel((p) => !p);
              return 0;
            }
            devTapTimerRef.current = setTimeout(() => setDevTapCount(0), 1800);
            return next;
          });
        }}
        style={{
          position: "fixed", top: 0, right: 0,
          width: 80, height: 80, zIndex: 99998,
          WebkitTapHighlightColor: "transparent",
          cursor: "default",
        }}
        aria-label="Dev panel toggle"
      />

      {/* ── DEV-ONLY: ascension animation preview — auto-shown on localhost, or via 5-tap top-right anywhere ── */}
      {(((typeof window !== "undefined") && (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")) || showDevPanel) && (
        <div style={{
          position: "fixed", bottom: 16, left: 16, zIndex: 99999,
          display: "flex", gap: 8, background: "rgba(0,0,0,0.85)",
          padding: "10px 12px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.18)",
          alignItems: "center",
        }}>
          <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 11, alignSelf: "center", marginRight: 4 }}>
            preview:
          </span>
          {["gu_master", "gu_immortal", "venerable"].map((t) => (
            <button
              key={t}
              onClick={() => previewUnlockSequence(t)}
              style={{
                fontSize: 11, padding: "6px 10px", borderRadius: 6,
                border: "1px solid rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.08)",
                color: "#fff", cursor: "pointer",
              }}
            >
              {t.replace("_", " ")}
            </button>
          ))}
          <button
            onClick={() => setShowDevPanel(false)}
            style={{
              fontSize: 10, padding: "4px 8px", borderRadius: 4, marginLeft: 4,
              border: "1px solid rgba(255,255,255,0.15)", background: "transparent",
              color: "rgba(255,255,255,0.4)", cursor: "pointer",
            }}
            title="Hide dev panel"
          >
            ✕
          </button>
        </div>
      )}

      {/* ── Ren Zu mountain loader (pre-cauldron for high tiers) ── */}
      {showRenZuLoader && <RenZuLoader visible={showRenZuLoader} />}

      {/* ── Refinement Cauldron (tier-aware, with fake-out for high tiers) ── */}
      {refiningTier && <RefinementCauldron tier={refiningTier} />}

      {/* ── Realm ascension animation overlay ── */}
      {ascensionTier && <AscensionOverlay tier={ascensionTier} />}

      {/* ── Gu Award Toast — shows what was just refined ── */}
      {awardedGu && awardedGu.length > 0 && (
        <div style={{
          position: "fixed", top: 96, left: 0, right: 0,
          margin: "0 auto", width: "fit-content", maxWidth: "min(380px, 92vw)",
          zIndex: 10050,
          background: "linear-gradient(180deg, rgba(20,15,30,0.97), rgba(10,8,20,0.97))",
          border: "1px solid rgba(255,220,120,0.55)",
          borderRadius: 16, padding: "14px 20px",
          boxShadow: "0 8px 40px rgba(0,0,0,0.7), 0 0 28px rgba(255,220,120,0.35), inset 0 1px 0 rgba(255,220,150,0.2)",
          display: "flex", flexDirection: "column", gap: 10,
          animation: "fadeUp 0.5s ease both",
        }}>
          <div style={{
            fontFamily: "Metamorphous, Georgia, serif",
            fontSize: 10, color: "rgba(255,220,150,0.85)",
            letterSpacing: "0.25em", textTransform: "uppercase",
            textAlign: "center", paddingBottom: 8,
            borderBottom: "1px solid rgba(255,220,150,0.2)",
          }}>
            ✦ Gu Refined ✦
          </div>
          {awardedGu.map(g => {
            const tierColor = g.tier === "venerable" ? "#ffd36a" :
                              g.tier === "gu_immortal" ? "#62e8ff" : "#d8a34d";
            return (
              <div key={g.id} style={{
                display: "flex", alignItems: "center", gap: 12,
                fontFamily: "Metamorphous, Georgia, serif",
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 10,
                  background: "rgba(0,0,0,0.4)",
                  border: `1px solid ${tierColor}66`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 20, color: tierColor, fontWeight: 700,
                  textShadow: `0 0 12px ${tierColor}, 0 0 24px ${tierColor}88`,
                  boxShadow: `inset 0 0 12px ${tierColor}33`,
                }}>
                  {g.symbol}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontSize: 13, color: "#fff", fontWeight: 600,
                    display: "flex", alignItems: "center", gap: 6,
                  }}>
                    {g.name}
                    {g.isMain && (
                      <span style={{
                        fontSize: 7, color: tierColor,
                        padding: "2px 6px", borderRadius: 4,
                        border: `1px solid ${tierColor}88`,
                        letterSpacing: "0.12em", fontWeight: 700,
                      }}>PATH GU</span>
                    )}
                  </div>
                  <div style={{
                    fontSize: 10, color: "rgba(255,255,255,0.55)",
                    fontStyle: "italic", fontFamily: "'IM Fell English', Georgia, serif",
                    lineHeight: 1.4, marginTop: 2,
                  }}>
                    "{g.lore}"
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RenZuReader));
  </script>
  <script>
    // Register service worker so browsers consider this app installable
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
  <script src="/auth-dropin.js" defer></script>
</body>
</html>
