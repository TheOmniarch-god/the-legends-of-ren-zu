e touched the wound on her\nhand as she recalled what Cognition Gu said \u2014\u201cWhen you pick those rocks, many\nunthinkably bad situations will occur. You have to affirm the belief of 'me' in your\nheart.\u201d\n\u201cSo this is the terrible situation.\u201d Desolate Ancient Moon understood.\nShe chanted in her heart: \u201cMe, me, me, me.\u201d\nAs she chanted, the wound on her hand miraculously healed! Only a light scar\nwas left.\n\nShe tossed the first rock away and picked up the second rock.\nWhen she held this rock in her hand, Desolate Ancient Moon's heart jumped,\nas an intense feeling of fear assaulted her.\nDesolate Ancient Moon was shivering in fear; she almost ran away to escape,\naway from this place.\nBut she held on, and chanted 'me.'\nAfter a long time, she slowly recovered as the fear in her heart was gone by half,\nfinally picking up the third rock.\nThis rock made her dejected. She could not help but think: \u201cI want to find that\none and only Success Gu among these billions of rocks, how difficult is that, how\nlong would it take me?\u201d\nShe could barely move anymore; she felt that the future was shrouded in darkness; it was too difficult to find Success Gu.\nShe almost wanted to give up, but she thought about her father who was trapped\nin Life and Death Door.\n\u201cIf I give up, who will save father?\u201d Desolate Ancient Moon shuddered. \u201cOh\nno, I forgot to chant \u2018me\u2019.\u201d\nDesolate Ancient Moon chanted again, getting rid of the despair in her heart,\nbending down to pick up another rock.\nOnce she held the fourth rock in her hand, Desolate Ancient Moon was shocked\nto find out that her nose had changed; it turned into a pig's nose.\nShe chanted 'me' once again, allowing her nose to recover.\nSpending a lot of time, she exerted all her effort to get rid of the pig nose. But\nher nose was still slightly deformed compared to before.\nLike this, Desolate Ancient Moon continued to pick up rocks, hoping to find\nthat Success Gu.\nBut days passed, and all she found was Failure Gu's children.\nAmong these rocks, some made her injured, some made her dejected, despair,\nor fear, while some made her grow a pig head, rat's tail, etc.\nDespite Desolate Ancient Moon chanting 'me' continuously, some of the scars\nstill remained on her. As they accumulated, these scars turned her into a monster.\nShe grew six heads, three arms, five tails, and looked like a centaur. She had sixteen legs, and some of her legs had soft fur, some had snake-like scales, some had\nsharp claws, some had tough hooves.\nIn the search for success, people often transform and become completely different.\nBut Desolate Ancient Moon also became much stronger because of this.\n\nAfter going through so much, she had become several hundred times as strong\nas before. These rocks could no longer trouble her.\n\u201cSuccess, oh success, where in the world are you?\u201d Her seven mouths opened\ntogether. Some were screaming, some were shouting, some were whispering while\nothers were growling.\nThe more she failed, the more she desired success in her heart.\nAfter her great effort, the number of unpicked rocks became fewer and fewer.\nEventually, when there were only two rocks left, Desolate Ancient Moon was\nstuck between two difficult choices.\nUndeniably, among these two rocks, one was Success Gu, while the other was\nFailure Gu.\nIf she obtains Success Gu, that would be the best. But if she picked Failure\nGu, then Desolate Ancient Moon would become completely lost; she would be in\ndanger of dying.\nEven if Desolate Ancient Moon became a monster, becoming so much stronger.\nOne step to heaven, one step to hell, what should she choose? Desolate Ancient\nMoon could not help but become hesitant.\n\u201cIf I do not dare to take the next step for fear of failure, then I will never succeed!\nI am already so strong, success is a step away from me; even if I take Failure Gu, as\nlong as I chant 'me\u2019, I should be able to endure it, right?\u201d Eventually, she mustered\nher courage and stretched out her palm, picking one of the rocks.\nUnfortunately, she picked Failure Gu.\nAn unforeseen feeling of lost, self-doubt assaulted her.\n\u201c...Me, me, me.\u201d\n\nDesolate Ancient Moon continued to chant 'me\u2019, but her voice became\nsofter, as her seven mouths stopped moving eventually, her expression\nturning into a daze.\nShe had fallen into endless perplexity; she had completely lost herself.\nThe biggest tragedy for a human is to lose your sense of self." },
  { num: "15", title: "Northern Dark Ice Soul", body: "Ren Zu's second daughter, Desolate Ancient Moon, climbed Cheng Bai Mountain and searched for Success Gu to rescue her father from the Door of Life and\nDeath.\nBut at the final juncture, she failed and lost her sense of self, becoming an ugly\nand powerful monster.\nWithout his daughter to rescue him, and his eldest son, Verdant Great Sun, still\naddicted and dejected, Ren Zu was trapped in Luo Po Valley, unable to return to\nlife.\nLuo Po Valley was like a giant maze, its paths twisted and turned. Occasionally,\nboundless Bewilderment Fog would spread and cause the soul to slacken, and occasionally, Luo Po Wind that was as sharp as a knife would blow and cut down souls.\nRen Zu had a spiritual body now and was unable to find the way out of the\nBewilderment Fog. His soul was cut down by Luo Po Wind, becoming weaker and\nweaker, and the situation turned even more dangerous.\nThe soul fragments cut down by Luo Po Wind started to converge gradually\nand turned into a youth.\nLike this, Ren Zu's third son was born.\nHe was Northern Dark Ice Soul.\n\u201cMy son, thank you for your company. I do not have much time left,\u201d having\nyou to accompany me in my final days, father did not have to feel lonely.\u201d Ren Zu\nsighed with deep emotions.\nNorthern Dark Ice Soul had a cold appearance but was warm-hearted, and\nalthough he did not speak much, he was very filial to Ren Zu. And as he looked\nat Ren Zu growing weaker and weaker every day, his mood also became heavier.\nHe decided to rescue Ren Zu.\nRen Zu sensed his determination and felt both happiness and heartache: \u201cDon't\nbe worried, my son. I know of your filial heart, I now understand that life and death\ncannot be forced. Humans will die in the end; this is our fate.\u201d\nNorthern Dark Ice Soul said in a sobbing tone: \u201cFather, I know your words are\nright. I also know my efforts might be in vain. But looking at you growing weaker\nlike this, if I do not try, my heart will feel even more pain. Let me do something\nfor you.\u201d\n\nRen Zu sighed and could only let him go.\nNorthern Dark Ice Soul wandered in the vast Luo Po Valley; he was born here, as\nsuch, Luo Po Wind could not cut down his soul, and the Bewilderment Fog could\nnot obstruct his vision.\nHe searched bitterly but could not find the exit.\nRight as he was becoming more desperate, he came across a Gu Worm.\n\u201cWell, well, to think I would be discovered by you.\u201d This Gu was like a ladybug\nwith a chubby spherical body, but it was extremely agile and was flashing around\nNorthern Dark Ice Soul's body.\nNorthern Dark Ice Soul's eyes brightened as he asked in curiosity: \u201cWhat Gu\nare you?\u201d\n\u201cI am known as Unexpected.\u201d This Gu Worm replied.\nNorthern Dark Ice Soul's gaze dimmed down: \u201cSo you are Unexpected Gu; it is\na pity you are not Success Gu.\u201d\nUnexpected Gu sneered: \u201cYoung man, do not look down on me. I have a lovehate relation with Success Gu. The strength of unexpectedness is very powerful.\nDo you know what your encounter with me here represents?\u201d\n\u201cWhat?\u201d\nUnexpected Gu shook its chubby body and said proudly: \u201cWhat kind of place\nis this? This is Luo Po Valley, a death realm. You being here means you are already\ndead. But by encountering me, you have come across an unexpected event in 'death'\n\u2013 that is \u2018life.\u2019 Grab me, I will take you out to the human world, and you can be\nresurrected again.\u201d\n\u201cReally?\u201d Northern Dark Ice Soul was exulted. \u201cCan I bring my father along?\u201d\nUnexpected Gu shook its head: \u201cIt is you who encountered me, not your father,\nso I can only take you.\u201d\nNorthern Dark Ice Soul was extremely disappointed, refusing: \u201cSince I cannot\ntake my father with me, then I will not go. I will accompany my father till his final\nmoment.\u201d\nUnexpected Gu laughed loudly and spoke in a domineering tone: \u201cUnexpectedness in life is beyond your control. Young man, you must come with me!\u201d\nThe moment it finished speaking, Unexpected Gu forcibly took Northern Dark\nIce Soul and instantly left Life and Death Door, arriving in the human world.\nNorthern Dark Ice Soul obtained a flesh body and was feeling extremely bewildered facing this vast world alone.\nUnexpected Gu disappeared. He suddenly remembered Ren Zu once saying he\nhad an elder sister who was called Desolate Ancient Moon.\n\nAt this moment, Cognition Gu took the initiative to find him: \u201cYoung man,\ndo not be suspicious; cognition has always been the friend of humans. I am here\nto help you.\u201d\nCognition Gu told Northern Dark Ice Soul about Cheng Bai Mountain and\nalso the events detailing Desolate Ancient Moon.\nNorthern Dark Ice Soul decided to first see his elder sister.\nWhen he saw Desolate Ancient Moon, his tears fell in sadness.\nNorthern Dark Ice Soul tried to converse with Desolate Ancient Moon, but Desolate Ancient Moon who had turned into a monster kept on repeating questions.\n\u201cWhere is this?\u201d\nNorthern Dark Ice Soul thought for a while and answered: \u201cThis is the human\nworld; living beings can move about here. Above us is the heavens, and below our\nfeet is earth.\u201d\n\u201cWho am I?\u201d Desolate Ancient Moon asked again.\n\u201cYou are a human, Ren Zu's second child; your name is Desolate Ancient Moon.\nYou are my elder sister.\u201d Northern Dark Ice Soul replied.\n\u201cElder sister, wake up quickly. Our father is trapped in Luo Po Valley, dying; we\nneed to resurrect him soon.\u201d\n\u201cRen Zu? Desolate Ancient Moon? Resurrect?\u201d The monster shook its head,\nextremely puzzled, \u201cWhy should I resurrect him? Could it be that humans should\nnot die? What disadvantage is there in death? Why do humans live? Why do I live?\u201d\nThis time, Northern Dark Ice Soul was not able to answer.\n\u201cWhy do people live?\u201d\nAs Northern Dark Ice Soul pondered over this question, Bewilderment Gu quietly approached him, making him lose his sense of the surroundings.\nSubsequently, Love Gu and Disguise Gu also approached him.\nCognition Gu felt a big headache when it saw them. These several Gu were\nfamous for their mischief and would often move together; even Cognition Gu did\nnot want to provoke them.\n\u201cLove, have you not harmed enough people? Why are you not letting them go?\u201d\nCognition Gu sighed.\n\u201cDon't try to speak reason with me; I am completely unreasonable.\u201d Love Gu\nsaid in an unruly tone, \u201cGet lost, cognition; I do not like you.\u201d\nCognition Gu could only leave helplessly.\n\u201cAnother human came again? Haha!\u201d Love Gu was extremely happy when it saw\nNorthern Dark Ice Soul because it had another target to play with.\nLove Gu and Disguise Gu were sworn brothers, and on the spot, it used Dis43\n\nguise Gu's power to disguise as Cognition Gu.\n\u201cYoung man, your elder sister has lost herself. If you want to save her, you need\nto find Meaning Gu.\u201d\nNorthern Dark Ice Soul regained his senses and asked Love Gu without doubting: \u201cI have seen Unexpected Gu; please tell me where this Meaning Gu is? How\nshould I look for it?\u201d\nLove Gu deceived him in a serious tone: \u201cOh human, you should know; there\nis a meaning to why you are all living in this world. As long as you find Meaning\nGu, your elder sister can awaken. Follow the direction I point towards and keep\nmoving forward; you will eventually find Meaning Gu.\u201d\nNorthern Dark Ice Soul expressed his gratitude before immediately setting off.\nLove Gu, Bewilderment Gu, and Disguise Gu guffawed as they looked at his\nreceding figure.\n\u201cIn this world, how could there be a Meaning Gu?\u201d\nThere was simply no such Gu; Northern Dark Ice Soul would, as such, not find\nit no matter how much he searched for it.\n\u201cFool, who told you all to anger me? I will let you guys know how terrifying\nthe punishment of love can be! From now on, let's follow him and toy with him\nin turns.\u201d\nLove Gu's proposal was approved by the other two Gu.\nThere upon, the three Gu played tricks on Northern Dark Ice Soul in turns; he\nsuffered so much that words could not describe it. But to find this non-existent\nMeaning Gu, he kept on persevering.\nSuch spirit moved Cognition Gu. And when Love Gu was not present, Cognition Gu approached Northern Dark Ice Soul to help him.\n\u201cCognition, what are you doing? We are having a great time.\u201d Bewilderment Gu\nand Disguise Gu were extremely displeased with Cognition.\nCognition Gu laughed: \u201cI am afraid of love, but I am not afraid of you two.\nYoung man, use my strength to come to your senses.\u201d\nNorthern Dark Ice Soul used Cognition Gu's power to realize the truth; he was\nno longer bewildered, and he had seen through the disguise.\nBewilderment Gu and Disguise Gu could only leave in defeat.\nNorthern Dark Ice Soul expressed gratitude to Cognition Gu: \u201cThank you,\nCognition Gu. Because of you, I have thought of a way to save elder sister.\u201d\n\u201cEh? What way is that?\u201d\n\u201cIn this world, there is indeed no Meaning Gu. But why can't I create a Meaning Gu?\u201d\n\nNorthern Dark Ice Soul replied confidently.\n\u201cHuman life might have no meaning, but they could give a meaning to it.\u201d\nNorthern Dark Ice Soul came back to Desolate Ancient Moon's side and personally created a Meaning Gu and pressed it into Desolate Ancient Moon's head.\n\u201cThe meaning in my life is to search for Success Gu and resurrect father! I understand now; I get it!\u201d Desolate Ancient Moon's eyes brightened." },
  { num: "16", title: "Understanding one\u2019s purpose", body: "Northern Dark Ice Soul awakened his elder sister Desolate Ancient Moon, and\nthe two again asked for advice from Cognition Gu on how to save their father.\nCognition Gu said: \u201cHumans, Cheng Bai Mountain has disappeared, who\nknows when it will form again. I am also not clear on other ways to bring your\nfather back to life. But no need to be dejected; you can try asking Wisdom Gu. I\nam its mother; wisdom is the crystallization of cognition.\u201d\nThe student surpasses the master; the things Cognition Gu did not know,\nWisdom Gu might not necessarily be unknowing of.\nUnder Cognition Gu's directions, Northern Dark Ice Soul and Desolate Ancient\nMoon found Wisdom Gu.\nWisdom Gu had somewhat of a connection with Ren Zu; back then Ren Zu\nhad used Rules Gu and Regulations Gu to capture it. But it was able to escape in\nthe end.\nAt first, Wisdom Gu was not willing to help Northern Dark Ice Soul and Desolate Ancient Moon.\nBut seeing that they were introduced by its mother Cognition Gu, it reluctantly said: \u201cOh humans, I can show you the right path. But I need remuneration; one\nof you needs to hand over your middle age to me.\u201d\n\u201cI will give my middle age to you.\u201d Desolate Ancient Moon immediately replied\nwith no hesitation.\n\nShe was awakened by her little brother Northern Dark Ice Soul and had been\nbestowed with the meaning of her life, which was to bring her father, Ren Zu, back\nto life. Thus, she replied immediately without the intention of passing it to others.\nNorthern Dark Ice Soul was not able to argue with his sister and could only let\nher offer her middle age.\nThis meant, once Desolate Ancient Moon's youth had passed, she would directly skip middle age to reach old age.\nBut to save her father, she did not have many misgivings.\nWisdom Gu obtained Desolate Ancient Moon's middle age and gave her directions: \u201cIn the center of the Golden Desert in the west, there is a still Blue Sea with\nno ripples, as flat as a mirror. That is the source of all living beings; all life in the\nworld originates from there. And in the depths of the Blue Sea lie many Life Gu\nshining upon all living beings. You need to infiltrate the sea, catch a Human Shaped\nLife Gu, and bring it to shore. This Human Shaped Life Gu can bestow your father\na new life. But remember, you cannot spend over fifteen minutes in the sea; otherwise, you will be assimilated by the sea.\u201d\nWisdom Gu added another sentence in the end: \u201cIt is extremely difficult to find\nHuman Shaped Life Gu. Only a person who has truly comprehended the truth of\nlife can do it. If you are not able to do it, don't blame my solution for not being\neasy to use.\u201d\nDesolate Ancient Moon wanted to ask something, but Wisdom Gu quickly flew\naway and did not give the siblings any chance to make inquiries.\nDesolate Ancient Moon and Northern Dark Ice Soul traveled an arduous journey through the Golden Desert and arrived at the center of the desert where they\nsaw the Blue Sea.\nThe Blue Sea was so beautiful that nothing more beautiful than it could be\nimagined.\nJust like Wisdom Gu said, even strong winds could not cause the slightest of a\nripple on the Blue Sea.\nWith the soft golden sand surrounding it, it looked like a deep blue gemstone\nembedded on this golden cloth.\nThe siblings infiltrated into the depths of the sea, and sure enough, found large\nnumbers of Life Gu packed together in the sea depths.\nThese Life Gu were like blue gems. But they were of different sizes and shapes.\nSome looked like a colt; some like a tiger or leopard; some like an eagle or dove,\nwhile some like a snake or flood dragon.\nThe siblings were dazzled from the sight. They saw all kinds of Life Gu from\n\nflowers, birds, fishes, insects, beasts, Snowmen, Hairy Men, and all other shapes,\nexcept the Human Shaped Life Gu.\nHelplessly, the siblings could only get out of the sea and back to the shore.\nThe moment they had left the Blue Sea, a Deer Shaped Life Gu, Northern Dark\nIce Soul had been holding, let out a soft light before jumping on the sand and turning into a fawn.\nThis was the birth of a life.\nThe siblings looked at this sight in wonder, with their eyes wide open.\nOnly when the fawn had hopped far away, the elder sister Desolate Ancient\nMoon suddenly comprehended: \u201cNo wonder Wisdom Gu flew away immediately\nafter speaking and did not let us question it. I have understood the truth of life.\u201d\n\u201cThe truth of life, what exactly is it?\u201d Northern Dark Ice Soul quickly asked.\nDesolate Ancient Moon pointed at this Blue Sea in front of them and asked in\nreturn: \u201cTell me, if we were to really find a Life Gu, a human shaped blue gem, and\nwe bring it back, what will it transform into?\u201d\nNorthern Dark Ice Soul thought for a moment and replied: \u201cIt should be like\nthat fawn and turn into a real active life form, right?\u201d\nHe suddenly looked distracted.\nDesolate Ancient Moon looked at him with a smile: \u201cIt seems you have also\nunderstood. We are these life forms. We were formed from Life Gu! We, ourselves,\nare human-shaped blue gems.\u201d\nNorthern Dark Ice Soul completely understood; where did humans come from?\nWisdom Gu had already made it clear before: This Blue Sea is the source of all\nliving beings; all lives in the world originate from here.\nHumans, naturally also originated from here.\nTheir father Ren Zu was once a blue gem in the depths of this sea. By some\nopportunity and coincidence, it was able to come out from the sea and form a\nzestful life form that roamed the world, surviving with difficulty and reaching\nthis stage.\nBut humans were the spirit of all living beings, so how many human shaped\ngems could there be in such a large sea?\nIt was definitely extremely few, and it was very possible Ren Zu was the only one.\nSearching for a small blue gem in such a vast sea, how big of a project was this?\nThis was innumerable times more difficult than Desolate Ancient Moon looking for the only Success Gu in Cheng Bai Mountain.\n\u201cI know a method which can get us a Human Shaped Life Gu quickly.\u201d Desolate Ancient Moon suddenly said.\n\n\u201cWhat method?\u201d Northern Dark Ice Soul had a bad feeling.\nDesolate Ancient Moon smiled: \u201cThat is... I will go into the bottom of the sea\nand assimilate with this Blue Sea, returning back to a Life Gu.\u201d\nAlthough Desolate Ancient Moon had transformed into a monster, she was\nintrinsically a human.\nThe essence of her life had not changed.\nSince she was a human, once she was assimilated, she would form a humanshaped blue gem like Life Gu.\nThis speculation was not wrong.\nNo wonder Wisdom Gu said: But remember, you cannot spend over fifteen minutes in the sea, otherwise you will be assimilated by the sea.\nWisdom Gu's words did not have any superfluous words.\nWisdom Gu had also said: If you are not able to do it, don't blame my solution\nfor not being easy to use.\nOne could analyze from this sentence \u2014 it was extremely likely there were no\nhuman-shaped blue gems in the Blue Sea. If the siblings were not willing to sacrifice themselves, they would not be able to obtain Human Shaped Life Gu. As such,\ndon't blame me, the Wisdom Gu if you are not able to do it.\n\u201cNo, you can't sacrifice yourself like this, elder sister.\u201d Northern Dark Ice Soul\nimmediately dissuaded.\nAlthough he wanted to bring his father back to life, he did not want to sacrifice his own sister.\n\u201cI need to do it; the meaning of my life is to bring father back to life.\u201d Desolate\nAncient Moon replied tranquilly.\nNorthern Dark Ice Soul suddenly could not say anything.\nIt was him who gave this meaning to Desolate Ancient Moon's life, and Desolate Ancient Moon was living for this. In other words, if her father could not be\nbrought back to life, there would be no meaning in her life. Then what would be\nthe use in continuing to live?\nAs long as she sacrificed herself, she could bring her father back to life; this was\nthe greatest meaning of Desolate Ancient Moon's life.\n\u201cHumans originally were gems of the world. It is only that whether the gems\nare bright or not requires us to polish them. Every effort we make, every choice we\ntake, are all polishing each of our gems. And humans can only obtain life by sacrificing life.\u201d\nDesolate Ancient Moon leisurely spoke before sinking into the Blue Sea.\nNorthern Dark Ice Soul tried his best to stop her, but he was not able to. Des48\n\nolate Ancient Moon had become a monster with incomparable strength, and he\nwas not her match.\nAfter fifteen minutes of time, Desolate Ancient Moon was assimilated by the\nBlue Sea and turned into a human-shaped blue gem.\nBut this blue gem was not of a healthy human shape but a badly damaged, less\nthan half a proper human shape.\nThis was because Desolate Ancient Moon had given her 'middle age\u2019 to Wisdom\nGu.\nHumans, in the process of understanding what life was, would often have\nalready used up half of their lives.\nNorthern Dark Ice Soul held this blue gem with tears in his eyes and left the\nGolden Desert.\nHe did not have any of the happiness of success, but instead sank down into\nextreme remorse.\nFrom a certain perspective, it was him who had killed his elder sister." },
  { num: "17", title: "Taking the first step", body: "Luo Po Valley was a very wide and complex labyrinth; Ren Zu searched for\nNorthern Dark Ice Soul, who was missing, but he got lost in the labyrinth himself.\nEven after several days, he did not find a way out.\nHe was extremely tired, sprawled on the ground, his back leaning against the\nwalls of the labyrinth. A feeling of boundless loneliness quickly engulfed him.\nThis was because he had given his original heart to hope; right now, he only had\na Heart of Loneliness left. The feeling of loneliness was unbearable. Ren Zu was\nafraid of being lonely; he had once dug out both of his eyes and turned them into\na son and daughter to accompany him. But right now, he could only endure the\ntorture of loneliness.\nA midst the loneliness, Ren Zu felt intense desolation, loss, and pain. Time\n\nseemed to have stopped; he was all alone in this world, and there was nobody he\ncould rely on, no fire that he could gain warmth from.\nRen Zu felt suffocation, but as time passed, he got used to the feeling of loneliness; he even started to savor it. He started to feel that loneliness was not that scary.\nIn his loneliness, he felt serenity, peace, and quiet.\nHe talked to himself: \u201cOh human, what is the purpose of your existence? Struggling here in this world, rushing about everywhere.\u201d\nNext, he heard a voice from beside him: \u201cOh human, you are the spirit of all\nbeings. You are lonely; thus, you wanted to be comforted, to be understood, to be\nrecognized. Right now, the thing you want to do most is to find the way out of\nthis damned place.\u201d\nRen Zu was shocked: \u201cWho, who is talking to me?\u201d\nThat voice laughed as it said: \u201cI am a Gu, called 'self.' If you look inside yourself, you will find me.\u201d\nRen Zu quickly inspected his Heart of Loneliness, and as expected, in the deepest part of his heart, he saw a Gu Worm. This Gu looked very real, almost like himself, but it was many times smaller than him, like the size of an ant.\nRen Zu was curious: \u201cEh, you are a Gu Worm, why are you inside my body?\u201d\nSelf Gu said: \u201cEver since you gained life, I had been inside your body; you just\ndid not discover me. It is not easy to find me; you will need to inspect your inner\nHeart of Loneliness.\u201d\n\u201cIs that so?\u201d Ren Zu had little interest, as his mind was entirely concerned with\nNorthern Dark Ice Soul.\nSelf Gu saw Ren Zu's lack of concern and laughed: \u201cOh Ren Zu, you should be\nhappy. You should know, finding yourself and understanding yourself, that is the\nmost important thing in life. You yourself are the most reliable thing in the world.\nLet me help you leave this place.\u201d\n\u201cYou can help me leave this place? No way, can you bring me out of Luo Po\nValley, and travel in the Reverse Flow River?\u201d Ren Zu was shocked and excited.\nSelf Gu laughed heartily: \u201cOh Ren Zu, why must you walk on this road? The\nDoor of Life and Death's entrance and exit are the traces left behind by Fate Gu\nwhen it visited Fairness Gu. When you walk on this road, you will be under the\nmanipulation and arrangement of fate. If you want to revive, to leave this place,\nyou should walk on a brand new road.\u201d\nRen Zu was perplexed: \u201cIsn't there only one road? Wisdom Gu had already told\nme that, where can there be a second road?\u201d\nSelf Gu said: \u201cOh Ren Zu, as long as you want to walk, there will be a road for\n\nyou to step on.\u201d\nRen Zu was even more confused now: \u201cThen how should I walk?\u201d\nSelf Gu said: \u201cDidn't I say it already, first, you have to 'think' about leaving.\u201d\n\u201cThink?\u201d Ren Zu tried using his brain, thinking of how to move on. He thought\nfor half a day, his head was bursting, when finally, a Gu jumped out of his mind.\nThis Gu was an old friend of Ren Zu; it was Cognition Gu.\n\u201cWhere there is cognition, there is me.\u201d Cognition Gu said: \u201cOh human, you\nseem to have gotten into trouble again; let me help you think.\u201d Saying so, Cognition Gu gave off a bright light, enlightening Ren Zu.\nCognition Gu had an ability, that was to enlighten all beings. Any lifeforms\nenlightened by Cognition Gu would gain wings.\nBack then, Verdant Great Sun obtained the wings of \u2018self,\u2019 flying into the sky.\nWhen the light dispersed, Ren Zu obtained a pair of wings. This pair of wings\nwas located at his heels, and they were very delicate.\nCognition noted: \u201cMm, this pair of wings is called independence, Ren Zu, it\nwill help you walk on a new road. You have to be careful; a new road is hard to walk\non. Other Gu are unreliable; you can only rely on your Self Gu.\u201d\nSaying so, Cognition Gu vanished.\nRen Zu was still very much confused: \u201cHow should I walk?\u201d\n\u201cWalk ahead and carve the path of your Road of Life. This is a road that is\nunique to yourself! Only you can walk on it!\u201d Self Gu said excitedly.\nRen Zu took the first step forward.\nBam!\nThe next moment, his vision changed.\nRen Zu started walking on the Road of Life, his vision changed; it was pure\ndarkness.\nHe took the first step.\nPlop.\nAt the next moment, he stepped into the mud.\nHe raised his foot, wiping it with his hand; it was full of mushy mud and\nextremely smelly.\nHe was hesitant to move forward.\nAt this moment, Self Gu said: \u201cOh human, do not hesitate. If you want to walk\non your own road, you will need to rely on your own legs. When your leg steps on\nthe road, do not be afraid of dirtiness.\u201d" },
  { num: "18", title: "Walking Meat Tree", body: "Ren Zu's third son, Northern Dark Ice Soul, was revived by Unexpected Gu\nand wandered outside. After encountering his sister, Desolate Ancient Moon, he\ngave her a new meaning in life.\nNext, under the guidance of Wisdom Gu, the brother and sister came to the Blue\nSea to search for the life gem that could revive their father, Ren Zu. In the end, Desolate Ancient Moon sensed the mysteries behind life and sacrificed herself, being\nturned into a damaged life gem.\nNorthern Dark Ice Soul carried the life gem as he attempted to return to his\nfather to revive Ren Zu. But it was extremely difficult for him to enter the Door\nof Life and Death.\nThe Door of Life and Death had two routes: the Road of Life and the Road of\nDeath.\nNo matter which path it was, there would be a lot of Suffering Gu. To overcome the interference of the Suffering Gu and enter deep into the Door of Life and\nDeath, he needed the help of Courage Gu.\nHowever, Courage Gu had already been taken by Ren Zu and was currently\nwith him. Northern Dark Ice Soul did not have courage and could not enter the\nDoor of Life and Death. He had no methods left and could only wander around,\nsearching for a method to resolve this.\nHe walked past tall mountains, traveled through streams, ran for his life under\nthe assault of wild beasts, and had gone hungry during the intense cold. He had\nsuffered a lot. Northern Dark Ice Soul was filled with guilt and anxiety.\nHe was guilty because he was the one who gave Desolate Ancient Moon her\nmeaning in life, but that caused her to sacrifice herself and become the life gem.\nNorthern Dark Ice Soul was the murderer who indirectly caused his sister's\ndeath.\nHe was anxious because even though he had the life gem, he was unable to return\nto his father's side. He was afraid that if a long time passed, his father's soul might\ncollapse in Luo Po Valley, causing Desolate Ancient Moon's sacrifice to be in vain.\nHe walked and walked until the purple sky above him faded and became black.\nOriginally, the Immemorial Nine Heavens \u2014 white, red, orange, yellow, green,\nazure, blue, purple, black \u2014 would take turns to loom over the five regions at set\n\nintervals.\nThe sky of the Immemorial Antiquity Era was connected to the ground. Heaven\nand earth were connected and whole; people could walk towards the sky from the\nground or walk towards the ground from the sky.\nNorthern Dark Ice Soul was walking aimlessly, unknowingly leaving the ground,\nand walking towards an area deep within Black Heaven. It was complete darkness\ninside Black Heaven, but it was not desolate; there were large numbers of life forms\nthere.\nNorthern Dark Ice Soul was inside the darkness and could not find a way back.\nHe was flustered, scared, and lost. He tripped many times and fell. Suddenly, he\nsaw a lump of fire ahead of him. This was the only source of light in the entirety\nof Black Heaven.\nNorthern Dark Ice Soul was overjoyed. He quickly walked towards the fire.\nWhen he got close to the lump of fire, he realized it was a Gu.\nNorthern Dark Ice Soul was very curious. He asked, \u201cWhat Gu are you? You\ncan actually give out light in Black Heaven. Help me, I want to leave Black Heaven,\nheading back to the ground. I have very important things to do.\u201d\nThe Gu's voice was very weak. It said to Northern Dark Ice Soul, \u201cMy name is\nFire. Who are you?\u201d\nNorthern Dark Ice Soul said, \u201cI am a human. My name is Northern Dark Ice\nSoul. Can you help me? With your light, I will be able to see the way and return\nto the ground.\u201d\nThe Gu sighed, \u201cSo you are a human. I've heard of a famous human before. He\nis called Verdant Great Sun. Because Verdant Great Sun had Reputation Gu, his\nname was spread throughout the entire world. There was almost nobody that did\nnot know him.\u201d\nNorthern Dark Ice Soul was overjoyed. \u201cThat's right, Verdant Great Sun is my\nbig brother.\u201d\nFire Gu said, \u201cI can help you. But before I help you, you have to help me. I am\ntoo hungry; I am going to die of starvation. Go find me some food first.\u201d\nNorthern Dark Ice Soul asked, \u201cOh, Fire Gu, what do you eat? This place is completely dark. How can I find what you need to eat?\u201d\nFire Gu said, \u201cI am the least picky Gu Worm in the entire world. I can eat almost\nanything. I will eat whatever you feed me.\u201d\nNorthern Dark Ice Soul searched around, finding some tree branches and\nthrowing them towards Fire Gu. After Fire Gu ate, it started to shine more brightly. It was giving off a warmer light and also grew from the size of a fist to around\n\nthe size of a basin.\nIt was very happy. \u201cCan you bring me more food?\u201d\nNorthern Dark Ice Soul nodded and looked around, finding a pile of rocks and\nthrowing them at Fire Gu. After eating for some time, Fire Gu sighed, \u201cSigh, I\nwas way too hungry. My teeth are not working well now. The things I could chew\nbefore, I can't chew them now. Bring me some stuff that is easy to digest.\u201d\nNorthern Dark Ice Soul thought about it. \u201cHow about this, Fire Gu? Follow\nme and light the way. Along the way, whatever you feel like eating, I will feed to\nyou. Is that alright?\u201d\nFire Gu agreed and condensed into a small lump, letting Northern Dark Ice Soul\nhold it. Like this, Northern Dark Ice Soul left on his return journey. Along the way,\nhe fed many things to Fire Gu.\nAfter a while, Fire Gu grew larger. On this day, Northern Dark Ice Soul was\nresting.\nFire Gu was eating branches in front of him while swaying with the wind.\nSuddenly, countless footsteps could be heard. Northern Dark Ice Soul looked\nand saw a huge group of trees shining under the light of the fire. They were running towards him in huge numbers. Not just trees, there were also countless wild\nbeasts and insect groups.\nNorthern Dark Ice Soul was extremely scared. He quickly picked up Fire Gu\nand ran.\nBehind him, the trees, wild beasts, and insect groups were chasing. Wherever\nNorthern Dark Ice Soul went, they followed.\nThe pursuers shouted, \u201cWhoever is in front, stop running. We do not want to\nharm you; we just want to escape into the light. Dream Realms are about to reach\nus; please help us and let us live under the light of the fire.\u201d\nNorthern Dark Ice Soul was breathing roughly. He could not run any further.\nSeeing that he was about to be caught, Fire Gu said, \u201cOh human, don't be afraid.\nThese pursuers are my food. Let me help you. Just toss me there.\u201d\nNorthern Dark Ice Soul was forced by the circumstances. He could only listen\nto Fire Gu and toss it towards them. What Fire Gu first encountered were a huge\ngroup of trees. These trees were Walking Meat Trees. The branches were made of\nmeat; they resembled the tentacles of octopuses. Fire Gu burned all of these trees,\nturning the trunks into ashes and branches into cooked meat. The smell of fragrant\nmeat attracted Northern Dark Ice Soul, and he picked up one to eat, exclaiming\nthat it was delicious." },
  { num: "19", title: "Living in a dream", body: "Fire Gu lit up many of the Walking Meat Trees, and the fire spread out to ignite\nmany of the wild beasts' bodies.\nAt once, life forms were crying out as the light of the flames burst out brightly.\n\u201cSo many delicious things, so many delicious things!\u201d Fire Gu shouted in excitement. It was no longer weak like before; it was tall and imposing. There was even\na hint of ruthlessness and madness in its tone.\nNorthern Dark Ice Soul was shocked: \u201cFire, oh fire, how did you become so\nhuge?\u201d\n\u201cI said, I am the least picky when it comes to food. I can eat almost anything.\nFire can draw out more fire; a spark can create a forest fire.\u201d Fire Gu shouted proudly as it answered.\nSuddenly, the flame rose up like a wall, moving towards Northern Dark Ice Soul.\nNorthern Dark Ice Soul quickly took a step back.\nFire Gu laughed loudly: \u201cOh human, do not be scared! You saved me; you are\nmy benefactor, you are my friend. They are afraid of me, but they need me to deal\nwith those Dream Realms, thus they imprisoned me and starved me. Only you\nhelped me, thus you are my true friend. From now on, if you have any difficulties,\nyou can count on me.\u201d\nNorthern Dark Ice Soul's heart was eased; he said happily: \u201cThat would be\ngreat, my friend.\u201d\n\u201cFriend!\u201d Fire Gu laughed loudly. It turned into a form of a human as it opened\nits arms, wanting to give Northern Dark Ice Soul a hug.\nNorthern Dark Ice Soul jumped back in fear: \u201cOh fire, excessive fervor is the fire\nof self-immolation. Let's keep a distance between us.\u201d\nFire Gu had no choice but to stop its actions. It spun around Northern Dark Ice\nSoul as he said: \u201cOh human, you are so weak, you are not fun.\u201d\nNorthern Dark Ice Soul was surrounded in flames; he quickly waved his hand:\n\u201cDon't get too close, don't get too close. It is so hot, way too hot, leave a path open\nfor me to walk out.\u201d\nFire Gu had to open a path for Northern Dark Ice Soul to walk out of. After\nhe walked for several hundred steps, he looked back at the blazing sea of fire with\na sigh of relief.\n\nBut at this time, a wild beast came out from the shadows behind him, swallowing Northern Dark Ice Soul in one mouthful.\n\u201cThat is a Dream Realm! There are so many Dream Realms; they are catching\nup!\u201d\nMany life forms shouted as they escaped.\n\u201cQuickly release my friend!\u201d Fire Gu shouted in anger, pouncing towards the\nbeast group of Dream Realms.\nThe Dream Realm beast group shrunk when shone by the light of the fire; they\nrapidly melted like a candle. They growled and scattered all over the place.\nFire Gu continued to eat along the way; it spread towards the Dream Realm that\nconsumed Northern Dark Ice Soul.\nThe Dream Realms were escaping, but Fire Gu was chasing behind them.\nAmong the escaping Dream Realms, the larger their bodies, the stronger they\nwere, and the faster they ran away. Soon, they pulled some distance from Fire Gu.\nAs it turned out, the Dream Realms used the emotions and desires of their prey\nto strengthen themselves.\nNorthern Dark Ice Soul, who was swallowed by a Dream Realm, had a huge\ndesire to survive. At the same time, his greatest goal was to revive his father.\nIn addition, he was filled with anxiety and was afraid he would not make it. He\nwas also filled with guilt and regret because Desolate Ancient Moon died due to\nhim giving her a meaning in life.\nOne could say that Northern Dark Ice Soul was the best prey for the Dream\nRealms.\nThe Dream Realm who swallowed him grew rapidly. Fire Gu growled loudly in\nanger, but it was getting closer to the Dream Realm.\nNorthern Dark Ice Soul was deep inside the Dream Realm; he had fallen asleep.\nIn his dream, he saw Desolate Ancient Moon reviving and smiling to him, calling\nhim a good brother and saying she forgave him, and that she knew he did not do\nit intentionally.\nHe saw that he was at the Door of Life and Death, successfully saving his father,\nRen Zu. Ren Zu praised him: \u201cYou are indeed my good son; if not for you, father\nwould not have revived.\u201d\nNorthern Dark Ice Soul's face was filled with a blissful smile.\nAnd like that, many days passed.\nThe sea of fire was still burning intensely; it spread all over Black Heaven as it\nfinally blocked all of the Dream Realms which were escaping.\nUnder the burning of the flames, the Dream Realm quickly melted as Northern\n\nDark Ice Soul fell onto the ground, waking up from his dream.\nHe suddenly understood that everything in his dream was fake; his happiness\nwas not real. What he faced was a burning hot Fire Gu. But his face was filled with\ntears; he felt an extreme cold that was piercing into his bones.\nHe cried out loud, questioning Fire Gu: \u201cWhy, why did you wake me up? I still\nwant to dream; I want to be eaten by the Dream Realm.\u201d\nFire Gu reminded him helplessly: \u201cOh human, you must know, dreams are often\nthe opposite of reality; they are fake.\u201d\n\u201cI don't want to listen; I don't care.\u201d Northern Dark Ice Soul cried out as he covered his ears and shook his head.\nFire Gu was anxious: \u201cI am your friend; I do not want\u2014\u201d\nNorthern Dark Ice Soul interrupted it before it finished: \u201cSince you are my\nfriend, you should not restrict me or obstruct me.\u201d\n\u201cSigh...\u201d Fire Gu let out a long sigh; it fell into silence, giving Northern Dark Ice\nSoul a path leading out without a better choice.\nNorthern Dark Ice Soul quickly ran out, wanting to find another Dream Realm\nwithin the darkness to have him eaten once again." },
  { num: "20", title: "Origin of dreams", body: "At the end of The Legends of Ren Zu, it said \u2014 Ren Zu's ten children died one\nafter another. Even Ren Zu himself was going to die of old age; he was at the end\nof his life. Before dying, Ren Zu retrieved the corpses of his ten children and sacrificed himself, sending them all into Derivation Gu's stomach, eaten by it.\nLarge amounts of Dream Realms also followed the smell of the delicious food,\ngoing into Derivation Gu's mouth along with them.\nDerivation Gu's stomach burst open as countless lights of life shone on the\nlands, creating the first batch of mortals.\nBecause the dream realms was involved in the derivation, the first batch of mor57\n\ntals would experience dreams when they slept at night. Humans often sink deep\ninto dreams, like Northern Dark Ice Soul, and are unable to free themselves from it." },
  { num: "21", title: "Stepping into Ordinary Abyss", body: "Ren Zu started walking on the Road of Life. The surroundings were pure darkness, and under his feet was dirty mud.\nRen Zu asked Self Gu, \u201cWhere is this?\u201d\nSelf Gu replied, \u201cThis is the ordinary marsh in the lowest level of Ordinary\nAbyss.\u201d\nRen Zu knew of Ordinary Abyss; his eldest son Verdant Great Sun had once\nbeen trapped inside.\nRen Zu could not help but become excited: \u201cSince this is the bottom of Ordinary Abyss, does that mean I have already left the Door of Life and Death and\nreturned to the living world? Does that mean I am now reborn?\u201d\n\u201cIn a way, that is true,\u201d Self Gu said.\n\u201cBut how is this possible? I have not passed Luo Po Valley and have not charged\nthrough the Reverse Flow River,\u201d Ren Zu said in an incredulous tone.\nSelf Gu said, \u201cOh human, you should know that you are talking about the path\nFate Gu traveled. And this path you have walked on is a completely new path, a path\ncreated by you. Where this path goes is all decided by your own intentions. Like\nI said before, as long as you want to walk, there will be a road for you to step on.\u201d\nRen Zu suddenly realized: \u201cSo it was like this.\u201d\nHe then felt doubtful: \u201cThen how did I walk to this place?\u201d\nSelf Gu: \u201cHumans are born ordinary. Although they are the spirit of all living\nbeings, they do not have the claws of a tiger nor the ability to absorb nutrients from\nthe earth like plants, and also cannot transform like clouds and rain. You came to\nthe ordinary marsh; what's strange about it? It is not only you. Look at the mud\nunder your feet carefully; you will see traces of many other footprints.\u201d\nRen Zu lowered his head close to the ground before he was able to see clear58\n\nly. Like Self Gu said, the ordinary marsh was filled with all kinds of marks. Claw\nprints of wild beasts, root imprints of vegetation, traces of water flowing, and also\ntraces of stones rolling past.\n\u201cHow can there be so many marks?\u201d Ren Zu asked curiously.\nSelf Gu replied, \u201cThis is Ordinary Abyss. All living beings will enter here due to\nvarious reasons. All living beings are ordinary. But the absolute majority of them\nwill be trapped in Ordinary Abyss for all their lives. Only a small portion can leave\nOrdinary Abyss through their own efforts.\u201d\n\u201cI do not want to be trapped here for my entire life. There is nothing here; it is\ncompletely dark, and the air stinks. I want to leave this place,\u201d Ren Zu frowned.\nSelf Gu laughed loudly: \u201cIf you think that being ordinary is an abyss, then it is\nan abyss. But if you think that being ordinary is heaven, then it shall be heaven.\nSince you do not want to stay here, then leave, use your two legs to walk out of the\nordinary marsh step by step and become extraordinary.\u201d\nRen Zu took the first step.\nSuddenly, his body bent, his front leg was deeply embedded into the marsh.\nIt was not easy to walk in the marsh; one step was deep, another was shallow.\nThe path which looked almost uniform had some parts that were rather solid, while\nsome were very loose.\nRen Zu walked several steps when his eyes suddenly brightened as he thought\nof a trick.\nHe purposely chose to walk on the spots which had the claw marks, since these\nspots could hold the marks; its soil texture was also much more solid.\nThus, Ren Zu was able to walk very smoothly, almost like he was running when\ncompared to his previous speed.\nHe said with a burst of emotion: \u201cSo it turns out that in an ordinary marsh,\nwalking in the footsteps of predecessors is much faster than finding the way on\nyour own.\u201d" },
  { num: "22", title: "Becoming Extraordinary", body: "He walked around in the bottom of the abyss, moving forward aimlessly, after\na long time, even though he wanted to get out of Ordinary Abyss, he could not\nfind the exit.\nIn his anguish, Cognition Gu gave him pointers: \u201cHuman, oh human, you\nwalked in the footsteps of other existences, although this road is simple and safe, if\nyou want to become extraordinary, and walk out of Ordinary Abyss, there is little\nhope if you follow other people\u2019s trails. Since you walked on your own road of life,\nall the difficulties need to be challenged by you personally, you need to innovate\nand carve out your own footprints.\u201d\nAfter Ren Zu received this advice, he came to a realization, he was overjoyed as\nhe followed Cognition Gu\u2019s instructions.\nHe walked out of the footsteps that already existed, he started to step on the\nground that was not too firm.\nThe ground of Ordinary Abyss was not easy to walk on.\nSome places were swampy, it was easy to get stuck in the mud, and the stench was\nfoul. Some places were full of thorns, sharp pointy tips were everywhere, Ren Zu\nwas full of injuries. In some parts of the ground, there were also blade Gu. When\nRen Zu stepped on the ground, his soles were injured by the sharp blades, his injuries became larger as blood flowed, when he walked, the pain could be felt striking\ndeep within himself.\nThe injuries on his feet caused huge pain, Ren Zu decided to walk softly.\nBut as he walked, Ren Zu lost his way in Ordinary Abyss, many times, he would\nend up on the same route, and waste extra effort traversing the same path.\nRen Zu gradually found out this problem, he was perplexed.\nHow could he not lose his way in the abyss?\nCognition Gu told him: \u201cRen Zu, if you do not want to lose your way, that is\nentirely up to you. You were afraid of pain, thus you walked softly, the footprints\nyou created were too shallow. When ordinary winds blow in this Ordinary Abyss,\nmortal dust will be blown out, and when the dust settles, your footprints will be\ncovered up. If you do not want to lose your way, you have to leave behind deep footprints, do you understand what I am saying?\u201d\n\nRen Zu nodded, he understood.\nThus, he started to walk using heavy steps, each time, he stepped hard onto the\nground, creating a deep footprint.\nThis way, every step he walked would have a deep and clear marking left by\nhim. As long as Ren Zu saw these markings, he would know that these routes were\nalready explored, and that there was no exit out of Ordinary Abyss there.\nBut good things did not last, after a while, even the deepest footprints would\nbe covered up by the dust.\nRen Zu was extremely troubled, he asked Cognition Gu.\nCognition Gu gave him another suggestion: \u201cOh human, even though you left\ndeep footprints, you purposely avoided those thorns and blades. Every time you\nsaw them, you would take a detour, this will not do. You cannot ask to be extraordinary while leading a comfortable life.\u201d\nRen Zu got the hint and gritted his teeth, he purposely walked on the paths\nfilled with thorns and blades.\nEvery time he took a step, he would leave a deep footprint behind, no matter\nhow painful it was, no matter how deep the scar was.\nHis sweat and blood seeped into the ordinary soil as he stepped heavily into it.\nWhen he left his foot and moved forward, on his footprint, there would be a\nsmall stem of grass.\nThe name of this grass was \u2014 Accomplishment.\nIn each of his footprints, there would be a small stem of grass.\nThe stems of grass did not fall when the wind blew, they could not be buried\nunder dust, they grow stubbornly and could be preserved for much longer than\nthe footprints.\n\n\u201cThis way, I would not need to be afraid of losing my way.\u201d Ren Zu was overjoyed, he gritted his teeth and endured the pain, he tenaciously walked on a road\nfilled with thorns and blades, he was not afraid of bleed or perspiring.\nHe walked further and further, he no longer lost his way, he no longer walked\nin circles, he went into uncharted territories.\nHe used his blood and sweat to nourish the grass under him, they started growing with more vitality and became taller.\nGradually, it was no longer grass that grew from his footprints, they had turned\ninto Accomplishment trees.\nAs time passed, the small trees grew into larger trees, the leaves were lush and\ngreen, they were even bearing fruits.\nRen Zu was tired from walking, he leaned on a tree for rest, he ate the sweet and\njuicy fruits to recover his stamina.\nAs time passed, he had almost walked in every corner of Ordinary Abyss, he created a huge forest spanning everywhere he had traveled.\nRen Zu looked at the forest behind him and felt bliss and joy, but even when\nthe forest covered the entirety of Ordinary Abyss, he did not find the way out of it.\nHe felt anxious and disappointed.\nHe plucked one fruit and put it in his mouth, the fruit no longer tasted sweet,\ninstead, it was bitter and hard to swallow.\nRen Zu felt strange, he tried to find the reason and realized: Unknowingly, there\nhad been a second heart growing in his body.\nThis was the Heart of Discontent.\nWith this, anything that he ate would not taste sweet.\nRen Zu ate the bitter fruit as he looked at the boundless forest, he no longer\nfelt joy or bliss.\nAt this time, his original heart, the Heart of Loneliness, spoke in Self Gu's voice:\n\u201cOh, human, I have thought about a way to leave the abyss. You can plant a tall and\ngrand Accomplishment tree. As long as this tree is taller than Ordinary Abyss, you\nwill be able to leave this place by climbing onto this tree.\u201d\nRen Zu thought about it and his eyes shined: \u201cThat's right, that is a good idea.\u201d\nBut he was troubled again: \u201cBut how can I plant a tree that is so grand, taller\nthan Ordinary Abyss?\u201d\nSelf Gu said: \u201cYou used the blood from your feet to plant this forest, these are all\nordinary trees. If you use the blood from your heart, you should be able to plant a\ngreat Accomplishment tree. Buried under the ground of Ordinary Abyss are many\nblades, why don't you use these blades to stab into your heart? The heart blood that\n\nflows out can be used to water the trees.\u201d\nRen Zu tried the method that Self Gu said.\nThe blade stabbed into his heart, causing immense pain. This pain was hundreds\nand thousands of times greater than the ones in his body.\nEventually, the trees that were watered grew tall and large, much larger than\nthe original trees.\nRen Zu felt pain but also joy. He continued to stab more blades into his heart,\ncausing more heart blood to flow out. The more blades he stabbed, the more heart\nblood flowed out, and the larger the trees he planted.\nBut even the tallest Accomplishment tree was only half the height of Ordinary\nAbyss.\nRen Zu continued to persevere, as Hope Gu accompanied him.\nWhen the crown of the tree he planted reached the same height as Ordinary\nAbyss, the trunk of the tree cracked open, and inside, a girl came out.\n\u201cFather, father!\u201d The girl went into Ren Zu's embrace; she was very adorable.\nThis was Ren Zu's fourth child, called Boundless Forest Samsara.\nRen Zu was also overjoyed; he played around with his daughter. When Boundless Forest Samsara was hungry, he would get her fruits to eat.\n\u201cSo sweet, so sweet.\u201d Boundless Forest Samsara loved to eat fruits; she became\nhealthy and well-fed.\nShe played in the forest every day, feeling immense joy.\nRen Zu still wanted to walk out of the Ordinary Abyss. Boundless Forest\nSamsara urged him many times: \u201cFather, why must you exhaust yourself? Isn't\nstaying here great? There are trees to shelter us, fruits to feed us; we can play here\nforever. Life will be peaceful until we die of old age.\u201d\nRen Zu shook his head; his attitude was firm. He planted an even greater tree,\nand the branches of the trees left Ordinary Abyss completely. Boundless Forest\nSamsara cried; she held onto Ren Zu's hands as she pleaded: \u201cFather, don't abandon me. I cannot climb trees; if you go, I will be left here alone. I do not know how\nto plant trees; there are limited fruits. One day, I will die of hunger.\u201d\nRen Zu said: \u201cWhy would I abandon you? You are my daughter; I will carry you\nand leave this place.\u201d\nThus, the father and daughter climbed the tree.\nThe higher they went, the more exhausted Ren Zu felt. Boundless Forest\nSamsara was a heavy burden; even without her, climbing the tree alone was very\ndangerous, not to mention carrying a person who could not climb the tree at all.\nThe bigger problem was the tree started wavering and making cracking noises.\n\nCognition Gu told Ren Zu: \u201cOh no, Ren Zu, you are carrying your daughter;\nit is impossible to get out of Ordinary Abyss. This is your Accomplishment tree;\nit cannot help others become extraordinary, even your daughter is no exception.\u201d\nRen Zu shook his head: \u201cI do not want to give up.\u201d\nHope Gu also urged him: \u201cPut her down; otherwise, you cannot leave this place.\nEven though you have the Heart of Loneliness and Heart of Discontent, after\nplanting so many trees, your heart blood is already dry. This is your last hope! Look,\nthe tree is about to collapse.\u201d\nRen Zu waved his hand: \u201cI still want to try.\u201d\nSelf Gu saw that Ren Zu was stubborn from his actions and seeing that the other\nGu Worms failed to convince him, it flew out.\n\u201cAh, this is killing me!\u201d Self Gu did not discuss with Ren Zu; it bit on Boundless Forest Samsara's hand.\nBoundless Forest Samsara shouted in pain; she was furious and wanted to kill\nSelf Gu.\nBut this way, she let go of her hands, with the shaking tree, she fell off Ren Zu's\nback, crashing and tumbling. After breaking her fall from many branches, she\nlanded on the ground, in great pain, as she started crying.\n\u201cDaughter!\u201d Ren Zu shouted, wanting to go down.\n\u201cIt's too late; the tree is going to fall!\u201d Self Gu pushed Ren Zu; he took a huge\nstep forward subconsciously, leaving Ordinary Abyss.\nThe tree fell.\nRen Zu was at the edge of the cliff; he lost the way back. He shouted helplessly:\n\u201cDaughter, I will return to save you.\u201d\nBoundless Forest Samsara cried, saying with much sadness and helplessness:\n\u201cFather, how could you be so cruel to leave me behind to live here alone? I am so\nscared.\u201d\nRen Zu heard her cries and felt extremely anguished. He checked around Ordinary Abyss but could not find a way in.\n\u201cIt is no use,\u201d Self Gu said. \u201cYour Accomplishment tree, even if it has fallen, is\nproof of your grandeur. A grand person is extraordinary; how can a person who is\nnot ordinary enter Ordinary Abyss?\u201d" },
  { num: "23", title: "Learning through failure", body: "Ren Zu wanted to save Boundless Forest Samsara, but there was nothing he\ncould do. He had become extraordinary, no longer able to enter Ordinary Abyss.\nRen Zu saw that pacing around this place was not going to help. He decided to\nset out again to find a way to rescue his eldest child, Verdant Great Sun, and his\nfourth child, Boundless Forest Samsara. He started a new journey, beginning his\nRoad of Life.\nOn this day, he came across a Hairy Man.\nThe Hairy Man stopped him and was clearly happy: \u201cRen Zu, I had a tough\ntime looking for you.\u201d\nRen Zu felt strange: \u201cI don't recognize you, why are you searching for me?\u201d\nThe Hairy Man explained: \u201cIt is like this, Ren Zu. I am the leader of all the Hairy\nMen in the world. No Hairy Man can match my Gu Refinement attainment. But\nI have recently encountered a problem when refining Gu. I want to refine Success\nGu, but I am unable to confirm if it is success or failure.\u201d\nRen Zu had wanted to continue traveling, but he had a thought well up in his\nmind. If the Hairy Man Leader could truly refine Success Gu, and he borrowed\nthis Gu, couldn't he rescue his eldest child or his fourth child?\nTherefore, Ren Zu stopped and talked with the Hairy Man: \u201cBut what do you\nneed from me?\u201d\nThe Hairy Man cautiously took out a Gu. This Gu resembled an ordinary rock\nand was covered with a thick layer of hair. The Hairy Man spoke: \u201cI do not dare to\nbreak it. If it is Success Gu, that is fine. But if it is Failure Gu, the moment I break\nit, I will completely lose my sense of self. But Ren Zu, you are different. You are\nwalking on a path that solely belongs to you; this means you have Self Gu. Since\nyou have Self Gu, even if you break the Failure Gu, you will not lose yourself. So I\nwant to request you to appraise it.\u201d\nRen Zu was happy: \u201cSo it is like that. I can help you, but if it is Success Gu, please\ngive it to me. I have an urgent need for it.\u201d\nThe Hairy Man said: \u201cAlright! That is no problem.\u201d\nRen Zu touched the Gu Worm in front of him. He made a wish upon this Gu:\n\u201cPlease return my fourth child, Boundless Forest Samsara, to my side.\u201d\n\nAt the next moment, the Gu Worm crumbled.\n\u201cFailure.\u201d The Hairy Man was dejected: \u201cIt seems I refined a Failure Gu.\u201d\nCourage Gu on Ren Zu flew out: \u201cRen Zu, you are a failure. I am leaving you.\u201d\nCourage Gu left Ren Zu and flew away.\nThe Hairy Man, however, was invigorated: \u201cIt doesn't matter. I can improve the\nGu Recipe. Ren Zu, wait a moment, I will refine it again.\u201d\nRen Zu wanted to chase after Courage Gu and take it back, but he had an even\ngreater desire for Success Gu to rescue his children.\nHe thought for a moment and decided to wait for the Hairy Man Leader to\nrefine the Gu.\nThe Hairy Man refined the second Gu and gave it to Ren Zu for inspection.\nRen Zu touched the Gu and made a wish; the Gu Worm crumbled again.\n\u201cAnother Failure Gu.\u201d The Hairy Man sighed in dejection.\nFaith Gu on Ren Zu flew out: \u201cRen Zu, you are a failure, you are not worthy\nof me.\u201d\nFaith Gu also left Ren Zu.\nRen Zu stamped his foot and wanted to chase after it, but the Hairy Man tugged\nhim: \u201cDon't be in a hurry. I have thought it through; this time I can definitely\nrefine Success Gu.\u201d\nFaith Gu had already flown far away. Ren Zu realized he could not catch up to it\nand said with a sigh: \u201cHairy Man, refine it quickly, this is the last time I am trusting you.\u201d\nThe Hairy Man's third Gu Worm was still the Failure Gu.\nStrength Gu also flew out: \u201cRen Zu, you are a failure, you are unworthy of possessing me.\u201d\nStrength Gu flew away, and Ren Zu felt bitter as he knew chasing after it would\nnot give any result. So he could only gaze as Strength Gu flew far away.\nHowever, right at this time, Self Gu in his heart suddenly flew out and bit\nStrength Gu.\nStrength Gu shrieked and flew even faster as a piece of it was bitten away. It soon\ndisappeared like a streak of smoke.\nRen Zu and the Hairy Man watched with stupefied expressions.\nSelf Gu leisurely flew back and said proudly to Ren Zu: \u201cAny failure has its value.\nRen Zu, I went through repeated failures and absorbed them to become stronger.\nJust now, I took a bite of Strength Gu; from now on, you will have your strength! I\ncan still become stronger; I can devour any Gu Worms to possess all their strength.\u201d\nRen Zu was shocked.\n\nThe Hairy Man Leader slapped his thigh, shouting: \u201cI know how to refine Success Gu; it is through failures. The more failures there are, the closer I will be to\nsuccess! I understand, I understand now.\u201d\nHe shouted happily as he rushed away, leaving Ren Zu behind.\nInfallible blessed land was the possession of the Hairy Man leader. Hairy Foot\nMountain was the place where the Hairy Man leader had once resided.\nAfter his death, the Hairy Man leader left behind an inheritance.\nIt was to gather other people\u2019s failures and refine them into mortal failure Gu.\nAs the mortal failue Gu increased in numbers, they would then condense into success dao marks." },
  { num: "24", title: "Freedom in death", body: "Ren Zu was extremely happy when he saw Feathermen because they had wings\non their back. Since the Feathermen could understand Ren Zu's words, both sides\ncould communicate.\nRen Zu requested the Feathermen, \u201cFeathermen, please help me. My daughter\nis in Ordinary Abyss and cannot come out. Please fly down and rescue my daughter, let us father and daughter reunite.\u201d\nThe Feathermen laughed loudly, \u201cHuman, how can you order us? Us Feathermen are the most free living beings in the world; no one can order us or bind us.\nYou want us to listen to your request and follow your wish, that is impossible.\u201d\nRen Zu kept on persuading and even pleaded with them, but the Feathermen\nsimply kept on flying in the air, enjoying the pleasure of freedom. Ren Zu's mouth\nhad already dried, but the Feathermen only treated him as a clown, ridiculing Ren\nZu as if they were looking at a joke.\n\u201cOh look, such a pitiful human.\u201d\n\u201cSo, what if he is the life form with the most intelligence in the world?\u201d\n\u201cHe doesn't have wings and can only walk on the ground; he is so pitiful. Fortunately, I am not a human, but a Featherman. See how vigorously I can fly.\u201d\n\nIn Ren Zu's Heart of Loneliness, Self Gu started getting angrier as it heard these\nwords. Finally, it could not hold the anger back and jumped out.\n\u201cAll of you, come down,\u201d Self Gu displayed its might, capturing all the Feathermen in the sky at once.\nRen Zu could not help but become greatly startled at this: \u201cSelf Gu, when did\nyou become so strong?\u201d\nSelf Gu said proudly, \u201cIt is only natural. I took a bite out of Strength Gu, now\nthat I have my own strength, I possess immense might. Moreover, there is no need\nto pay any price to use this strength. Human, you need to know what is most reliable is your own strength. And without strength, freedom is just an illusion.\u201d\nThe Feathermen were captured and could no longer fly to the sky, pressed onto\nthe ground without being able to move. They began to throw curses at Ren Zu\nand Self Gu in anger.\nRen Zu heaved a sigh, \u201cFeathermen, I did not mean to offend you. Please forgive my rudeness. I only want to ask you to save my daughter. When I reunite with\nher, I will definitely reward you.\u201d\n\u201cImpossible! We Feathermen are the most free.\u201d\n\u201cEven if our bodies lose freedom, our hearts are still free.\u201d\n\u201cRight, right.\u201d\n\u201cCruel human, you can't impose your will on any Featherman.\u201d\nThe Feathermen kept on shouting without any intention to compromise.\nRen Zu persuaded them for three days and three nights, but it was in vain. Helpless, he could only let go of these Feathermen.\nSelf Gu spoke bitterly, \u201cHuman, how could you release them so easily? Don't\nyou want to rescue your fourth child?\u201d\nRen Zu, however, replied confidently, \u201cI have already understood that these\nFeathermen cannot be forced. After these days of contact with the Feathermen,\nI have found these Feathermen might be free, but they don't have dens to shelter\nthemselves from wind and rain, and they also don't have enough food to fill their\nstomachs. To make them help, I have to make them do it willingly.\u201d\nThereupon, Ren Zu built a house near the Feathermen. Every day, he relied on\nSelf Gu to gather a lot of wild fruits and hunt many beasts.\nThe Feathermen soon discovered the safety and warmth of the house. Especially\nduring the days of storms, the Feathermen could only hide in groves of trees, shivering and starving, while Ren Zu stayed within his house, enjoying the warmth of\na fireplace and sumptuous food.\nOn one cold night, some Feathermen quietly moved under the roof of Ren Zu's\n\nhouse, to evade the wind and snow, while also greedily absorbing the warmth leaking out from the crack in the door.\nRen Zu wore the mask of Attitude Gu and opened the door, using an extremely\nwarm attitude to invite these Feathermen into the house and to enjoy the warmth\nand food with him.\nAs this repeated several times, more and more Feathermen came into Ren Zu's\nhouse.\nRen Zu was very hospitable and would entertain the Feathermen every day,\neven giving the area near the fireplace to the Feathermen. No matter how much\nthe Feathermen ate, he let them eat without restraint.\nThe Feathermen gradually became accustomed to living this way until one day,\nRen Zu saw the timing was ripe and took off Attitude Gu, revealing his true, cold\nexpression.\nHe shut the door of the house and stored all the food as well, no longer supplying them to the Feathermen for free.\nThe Feathermen were caught off-guard and were frantic. They were already used\nto the safety and warmth of the house, used to plentiful food; they rarely flew now\nand hunted even less. Their stockpile of food was extremely small. Many Feathermen were fat to the extent they could not fly.\nThe Feathermen had no way to deal with Ren Zu's behaviour. They could not\nbeat Ren Zu, who possessed Self Gu.\nSoon, all the Feathermen reached a situation where they would die from hunger\nor the cold.\nSeveral days later, many Feathermen died.\nRen Zu waited and waited until he became extremely anxious, as the Feathermen showed no signs of coming to terms with him.\nIn the end, when most of the Feathermen died, Ren Zu could not help but\nmention the old matter again: \u201cFeathermen, as long as you move your wings to fly\nto Ordinary Abyss and rescue my daughter, I will give you enough food and also\nwarm houses.\u201d\nHowever, the remaining Feathermen still shook their heads.\nEventually, they all died.\nFrom these Feathermen's corpses, many small creatures flew out. They looked\nlike tiny specks of light, shining with all kinds of colors. Ren Zu tried to grab them\nbut was not able to.\n\u201cIt is no use,\u201d Cognition Gu informed him at this moment. \u201cWild Freedom Gu\ncannot be caught. These Feathermen chased after freedom since their birth, but it\n\nis a pity that only after their death could they find freedom.\u201d" },
  { num: "25", title: "Fear is scarier than death", body: "Ren Zu fell into deep perplexity.\nHe could not find a better way to save his children.\nThe same situation applied to his eldest son, Verdant Great Sun, and also his\ndaughter, Boundless Forest Samsara.\nAt this time, Self Gu spoke in Ren Zu\u2019s heart: \u201cOh human, you want to save\nyour son, Verdant Great Sun, I have a method.\u201d\nRen Zu thought that he had to save at least one of them; he quickly asked: \u201cOh?\nWhat method?\u201d\nSelf Gu laughed: \u201cAll living beings in this world will die; this is because Fate Gu\nentered the Door of Life and Death and left a trace behind when searching for Fairness Gu. Oh human, you can enter the Door of Life and Death and walk on the\nRoad of Life and Road of Death; as long as you do not walk on the traces of fate,\nyou will step on a road that belongs to you solely. When you walk into the Door\nof Life and Death and leave again, you will form a brand new road; that would be\npartway to success. Next, as long as you bring Verdant Great Sun onto the path that\nyou walked on and leave the Door of Life and Death, you will be able to return to\nthe human world where the sun shines. Your son, Verdant Great Sun, will be able\nto escape death and revive.\u201d\nRen Zu heard the method of Self Gu and was very hesitant, but there was no\nbetter solution available.\nThus, he decided to let Boundless Forest Samsara stay inside Ordinary Abyss\nfor a while longer, while he used the method taught by Self Gu to save his eldest\nson, Verdant Great Sun.\nRen Zu set off towards the Door of Life and Death; as he walked, one day, he\nmet with a Beastman.\n\nThis Beastman was very muscular; his muscles were like rocks, the fangs in his\nmouth were sharper than blades. He took huge steps, sprinting in the wilderness\nas he shouted: \u201cDon\u2019t get any closer, don\u2019t come here! I am afraid.\u201d\nRen Zu was very curious; he asked: \u201cOh Beastman, what are you afraid of?\u201d\nThe Beastman said: \u201cI am afraid of my own shadow; it keeps following me, I\ncannot get rid of it. I am so afraid that I can only run around in all directions; I am\ntired, hungry, and thirsty, I am going to die.\u201d\nRen Zu felt that this was funny: \u201cOh Beastman, you have such a powerful body,\nyet you are afraid of a harmless shadow, do you have a cowardly heart? What is\nthere to be afraid of?\u201d\nAt this time, a Gu Worm came out of the Beastman\u2019s heart; it laughed at Ren\nZu: \u201cOh human, do not speak so shamelessly. You do not feel afraid because you\nhave not encountered me, Fear Gu. Hehehehehe.\u201d\n\u201cFear Gu?\u201d Ren Zu took a step back; his expression changed.\nOnce Fear Gu appeared, fear started to well up in Ren Zu\u2019s heart.\nHe was afraid.\nFear Gu laughed even more arrogantly now; it said to the Beastman: \u201cI will let\nyou off now, little Beastman, you pitiful worm.\u201d\nThe Beastman was free now; it fell to the ground, weeping in extreme joy.\nFear Gu turned around, facing Ren Zu: \u201cOh human, you dared to look down\non me, Fear Gu; now I will torture you with endless fear.\u201d\nSaying this, Fear Gu flew into Ren Zu\u2019s heart with a whooshing sound.\nRen Zu felt immense fear.\nHe was afraid of this, and afraid of that.\nFear Gu made him scared of the wind; every time the wind blew, Ren Zu\nscreamed in horror.\nFear Gu made him afraid of sunlight; Ren Zu could only travel at night and\noften lost his way. During the daytime, he would enter caves or hide inside thick\nbushes.\nFear Gu also made Ren Zu afraid of tree leaves; thus Ren Zu ran away from the\nforests; every tree he saw made him shriek.\nFear Gu made Ren Zu afraid of snakes; in the end, Ren Zu even stopped using\nthe grass ropes that he made himself.\nAfter that, Fear Gu made Ren Zu scared of rain.\nWhenever it rained, Ren Zu would shrivel up and look at the sky that was raining continuously, feeling extreme fear.\nRen Zu wanted to go to the Door of Life and Death, but after being struck by\n\nFear Gu, he could not move much; he could not make any progress.\nWhen Fear Gu understood Ren Zu\u2019s motive, it made Ren Zu scared of death.\nRen Zu no longer dared to walk towards the Door of Life and Death because\nonce he entered the Door of Life and Death, he would be walking from life towards\ndeath.\nRen Zu was afraid that he would die; he could only stay in place.\nSelf Gu sighed: \u201cOh human, actually death is not scary; the real scary thing is\nthe fear in your heart.\u201d\n\u201cThat is right!\u201d Fear Gu heard this and said proudly: \u201cThe only thing worth\nbeing afraid of is fear.\u201d" },
  { num: "26", title: "Betrayal and Loyalty to oneself", body: "Ren Zu was tormented by his fear, in deep agony; he consulted Self Gu.\nSelf Gu answered: \u201cThen let me eat it.\u201d\nRen Zu waved his hand: \u201cNo, no. I want nothing more than to avoid fear. If you\neat it, this fear will stay with me for life. This is too risky.\u201d\nRen Zu asked Cognition Gu.\nCognition Gu said: \u201cOh, human, you want to conquer fear; you need to have\ncourage.\u201d\nRen Zu was troubled: \u201cI used to have Courage Gu as my companion; it is the\nfriend of Faith Gu. But because I encountered the Hairy Man leader, due to Failure Gu, it left me.\u201d\nCognition Gu said: \u201cI'll teach you a method, hide Fear Gu deep within your\nheart. Move forward after that, and Courage Gu will come to you. Courageous\npeople are not fearless; they are just hiding fear deep within their hearts.\u201d\nRen Zu was more troubled now: \u201cOh Gu, what are you thinking? Precisely\nbecause of fear, I cannot advance, thus I need courage. But you are telling me that\nto obtain courage, I need to move forward first.\u201d\nWhile they were talking, a Gu Worm flew over.\n\u201cIs it Courage Gu?\u201d Ren Zu was overjoyed before feeling disappointment.\n\nBecause this Immortal Gu was not Courage Gu; it was Love Gu.\nSometimes, love comes to you on its own.\nLove Gu said: \u201cOh human, I can smell hope and fear from you, as love, they are\nmy food.\u201d\nRen Zu was overjoyed: \u201cYou can take fear away, but hope is mine; I cannot give\nit to you.\u201d\nLove Gu refused: \u201cOnly hope and fear can nourish me together; that is how I\nsurvive. Oh human, then I can only stay by your side.\u201d\nRen Zu did not have any good feelings towards Love Gu; he was not very willing, but Love Gu said, \u201cDon\u2019t chase me away; with me around, you can summon\nCourage Gu.\u201d\nIndeed, after Ren Zu called out, Courage Gu flew to his side a while later. \u201cAh,\nthis is the aura of love. Oh, and fear too.\u201d Courage Gu landed in Ren Zu\u2019s heart\nwith much satisfaction.\nIt was actually good friends with Fear Gu; the two were playing as they flew\naround Ren Zu\u2019s heart.\nFear and courage are often within one\u2019s grasp.\nRen Zu had courage; his fear dissipated by a huge amount; he could move on\nagain.\n\u201cOh Ren Zu, I want to thank you; you are the reason why I broke free from fear.\u201d\nBefore Ren Zu left, the Beastman came to him.\n\u201cI have two Gu here, one is loyalty, one is betrayal. Choose one; this will be my\ntoken of gratitude towards you.\u201d The Beastman said, taking out two Gu Worms,\nholding one in each hand.\nRen Zu did not know which to choose.\nLove Gu said: \u201cChoose loyalty; you already have fear.\u201d\nCognition Gu said instead: \u201cGo choose betrayal; you already have Courage.\u201d\nRen Zu was troubled; he asked the Beastman: \u201cCan I take a look at them first?\u201d\nThe Beastman said: \u201cOf course.\u201d\nRen Zu thus obtained both Loyalty Gu and Betrayal Gu, but to think that after\nhe took them, Loyalty Gu turned into Betrayal Gu, and Betrayal Gu turned into\nLoyalty Gu.\nRen Zu was puzzled.\nThe Beastman explained: \u201cLoyalty to others is betrayal to oneself; betraying\nothers is loyalty to yourself.\u201d\nSelf Gu spoke at this time: \u201cOh human, choose betrayal. Since you are walking on your own road, you will need to betray others, and even betray yourself.\u201d\n\nRen Zu made up his mind; he chose Betrayal Gu.\nThe Beastman kept Loyalty Gu; before leaving, he told Ren Zu: \u201cOh Ren Zu,\nyou have betrayal now; you cannot go to a place called \u2018Care\u2019. At that place, betrayal will harm you, but if you do not \u2018care,\u2019 then betrayal cannot harm you at all.\u201d\nRen Zu nodded: \u201cThank you, Beastman; I will remember your advice.\u201d" },
  { num: "27", title: "Love must be selfless", body: "Ren Zu obtained love, courage, and betrayal; he was no longer unable to progress due to fear. He continued to move forward.\nOn this day, he walked on his road, hearing a voice behind: \u201cOh Ren Zu, I finally found you. Slow down, wait for me.\u201d Ren Zu stopped moving, turning around.\nHe saw a Snowman running up to him.\n\u201cWhat is it, Snowman?\u201d Ren Zu asked curiously.\nThe Snowman said: \u201cOh Ren Zu, I finally found you. I am the strongest Snowman in my tribe. Snowmen are said to be afraid of fire, and I want to prove that it\nis untrue. I travelled the world, and I have already conquered the Bright Light Glorious Ring Fire in the sky, the Azure Divine Stone Furnace Fire in the earth, and\nthe Raging Wave Rising Dragon Fire in the sea. But I heard that there is a fourth\ntype of fire in this world, called the Fire of Love. Once it burns, it can turn all life\nforms in this world into cinders. I do not believe it, and I heard that you have just\nobtained Love Gu, thus I wanted to try it.\u201d\n\u201cFire of Love?\u201d Ren Zu was surprised, hearing it for the first time. Thus, he\ncalled out Love Gu, asking: \u201cOh Gu, oh Gu, can you emit the Fire of Love?\u201d\nLove Gu replied: \u201cI can, and I cannot.\u201d\nRen Zu and the Snowman were curious, and they asked: \u201cWhat do you mean\nby can and cannot?\u201d\nLove Gu explained: \u201cI can because I am necessary to emit the Fire of Love. But\nI cannot because I alone am not sufficient; two hearts are needed.\u201d\n\u201cTwo hearts?\u201d The Snowman was worried, and she took out her heart from her\nchest. This heart was huge and tough, emitting strong pressure.\n\nThe Snowman said: \u201cThis is my Heart of Domination, and it is a pity that I\nonly have one heart.\u201d\nRen Zu said: \u201cDon\u2019t worry, I have a heart too.\u201d\nRen Zu originally had one heart, but he gave it to Hope Gu. He next obtained\na Heart of Loneliness, and
