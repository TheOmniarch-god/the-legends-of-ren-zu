  <script>
  window.__CHAPTERS__ = [
  { num: "1", title: "Strength, Wisdom and Hope", body: "One of the oldest legends talks about the Hope Gu. In the legend, when the\nworld was just formed, it was a land of savage wilderness. Among the wild beasts\nthat walked the earth, the first man appeared. He was known as Ren Zu, eating\nraw meat, and drinking blood, living a difficult life.\nIn particular, there was a group of wild beasts called Predicament. These wild\nbeasts loved the taste of Ren Zu and longed to eat him. Ren Zu did not have a\nbody as strong as mountain rock, nor did he have the sharp teeth and claws of a\nwild beast.\nHow could he fight with the Predicaments? His source of food was unstable,\nand he had to hide all day. He was at the bottom of nature\u2019s food chain and could\nbarely survive.\nAt this moment, three Gu came up to him and said, \u201cAs long as you use your life\nto provide for us, we will help you through this difficulty.\u201d Ren Zu had nowhere\nto go, so he could only agree to these three Gu.\nHe first gave his youth away to the biggest Gu among the three. That Gu then\ngranted him strength.\nWith strength, Ren Zu\u2019s life began to change. He started to have a stable source\nof food and was able to protect himself. He fought bravely and ruthlessly, defeating many Predicaments. But soon he suffered and finally realized that strength was\nnot everything. It needed to be healed and cultivated, not spent freely at his will.\nNot to mention when facing the entire group of Predicaments, his strength alone\nwas too small.\nRen Zu reflected on this lesson bitterly and decided to give his prime middle\nyears to the most beautiful Gu among the three. And thus, the second Gu gave\nhim wisdom.\nWith wisdom, Ren Zu was able to learn how to think and reflect. He began to\naccumulate experience and found out that many times when he used wisdom, it\nwas more effective than using strength. By relying on wisdom and strength, he was\nable to conquer all the goals that he formerly could not and killed many Predicaments. He ate the meat of Predicaments and drank the blood of Predicaments,\nsurviving with tenacity.\nBut good things would not last, as Ren Zu became old and would only grow\n\nolder and older. This is because he gave away his youth and middle years to keep\nthe Strength Gu and Wisdom Gu. When a man is old, his muscles deteriorate, and\nhis brain slows down.\n\u201cHuman, what else can you give us? You don\u2019t have anything else left to provide\nto us,\u201d the Strength Gu and Wisdom Gu said as they realized this. They left him.\nWithout wisdom and strength, Ren Zu was once surrounded by Predicaments.\nHe was old and could not run; his teeth had fallen out and could not even chew\nwild fruits and plants.\nAs he fell weakly onto the ground surrounded by Predicaments, his heart was\nfilled with desperation. It was at this time the third Gu said to him, \u201cHuman, take\nme up. I will help you escape Predicament.\u201d\nRen Zu tearfully replied, \u201cGu, I don\u2019t have anything else left. See, the Strength\nGu and Wisdom Gu have abandoned me. I only have my old age left! While it is not\nas worth my youth and middle age, but if I give you my old age, my life will immediately end. Even though I am surrounded by Predicaments right now, I wish to\nlive a little longer, even if just a second more. So you should leave. I have nothing\nelse to provide to you.\u201d\nBut the Gu said, \u201cAmong the three I have the smallest needs. Human, if you just\ngive me your heart, it will be enough.\u201d\n\u201cThen I will give you my heart,\u201d Ren Zu said. \u201cBut Gu, what can you give me\nin return? In this situation, even if the Strength Gu and Wisdom Gu returned to\nmy side, it would change nothing.\u201d\nWhen compared to the Strength Gu, this Gu looked frail and was just a tiny ball\nof light. When compared to the Wisdom Gu, this one was only able to give out a\ndim white light, not beautiful in any way.\nBut when Ren Zu gave it his heart, this Gu suddenly gave out endless light. In\nthis light, the Predicaments screamed in horror, \u201cThis is the Hope Gu, withdraw!\nWe Predicaments are most afraid of hope!\u201d\n\nThe Predicaments retreated suddenly. Ren Zu was speechless, and\nfrom that day onwards whenever he faced Predicament, he would\ngive his heart to hope." },
  { num: "2", title: "Rules & Regulations", body: "The story mentioned that Ren Zu was able to escape his predicament because\nof hope. But eventually, he grew old and without Strength Gu and Wisdom Gu,\nhe could no longer continue to hunt. Even his teeth fell off, making him unable to\nchew many wild fruits and vegetables.\nRen Zu felt death slowly approaching.\nAt this time, the Hope Gu said to him, \u201cHuman, you must not die. If you die,\nyour heart will be lost, and I will lose my only place of residence.\u201d\nRen Zu was helpless. \u201cWho wishes to die? But if the heavens and earth want me\ndead I have no choice.\u201d\nThe Hope Gu said, \u201cThere's always hope in everything. As long as you can catch\na Longevity Gu, you will be able to increase your lifespan.\u201d\nRen Zu had heard of the existence of the Longevity Gu long ago, but he waved\nhis hand helplessly. \u201cWhen the Longevity Gu stays still, nobody can detect it, and\nwhen it flies, it is faster than light. How can I possibly catch it? It\u2019s too hard!\u201d\nThe Hope Gu then told Ren Zu a secret, \u201cHuman, don't give up hope no matter\nwhat. Let me tell you, on the northwest corner of this continent, there is a huge\nmountain. On the mountain, there is a cave, and in that cave, there is a pair of\nround and square Gu Worms. As long as you can subdue them, there is no Gu in\nthis world that you cannot catch, including the Longevity Gu!\u201d\nRen Zu had no choice; this was his last remaining hope.\nHe braved all difficulties and finally found the mountain. He then risked his life\nand ventured through countless dangers to ascend the mountain. On the mountain top, near the cave entrance, he used his last remaining strength to slowly make\nhis way in.\nThe inside of the cave was completely dark, and one would not be able to see even\ntheir own fingers. Ren Zu walked in the darkness. Sometimes, he would bump into\nthings not knowing what they were. This caused him to get injured and wounded\nall over. At times, he felt that this dark cave was huge beyond words, as if this was\na world of its own. He felt as if he was the only person in the area.\nHe spent a lot of time, but he could not walk out of the darkness. Not to mention subduing the two Gu Worms.\nJust when he was at a loss about what to do, two voices spoke to him from the\n\ndarkness.\nOne voice said, \u201cHuman, you're here to catch us? Go back, for even if you had\nthe Strength Gu, it would be impossible.\u201d\nThe other said, \u201cHuman, go back, we will not take your life. Even if you had the\nWisdom Gu to help you, you may not be able to find us.\u201d\nRen Zu laid exhausted on the ground, panting. \u201cThe Strength Gu and Wisdom\nGu had left me long ago, and I do not have much lifespan left, so I\u2019m at my wits\nend. But as long as there's hope in my heart, I will not give up!\u201d\nHearing Ren Zu's words, the two voices went silent.\nAfter a while, one of the Gu said, \u201cI understand, human, you have already given\nyour heart to the Hope Gu. You will not give up no matter what.\u201d\nThe other continued, \u201cIn that case, we shall give you a chance. As long as you\ncan say our name, we will allow you to use us.\u201d\nRen Zu was stunned. To find their names among all the words in the world, it\nwas akin to finding a needle in a haystack. Furthermore, he did not even know how\nmany words were in their names.\nRen Zu quickly asked the Hope Gu, but it did not know either.\nRen Zu had no alternatives and had no choice but to randomly guess their\nnames.\nHe said many names and wasted a lot of time, but the darkness did not respond\nto him so evidently, he was wrong.\nEventually, Ren Zu's breath got weaker as he turned from an old man into a\ndying man. It was like the scene of the evening's setting sun. The sun that would\nslowly descend had already been lowered halfway across the horizon, becoming a\nsunset.\nThe food he had brought was gradually reduced, his brain becoming slower, and\nhe barely had any energy to speak anymore.\nThe voice in the darkness urged, \u201cHuman, you are almost dead, so we will let\nyou go. Using your remaining time, you can climb out of the cave and take a final\nlook at the world. But you have offended us, and as punishment, the Hope Gu shall\nstay here as our companion.\u201d\nRen Zu clenched his heart and rejected, \u201cEven if I die, I will not give up hope.\u201d\nThe Hope Gu was very touched and answered Ren Zu's call enthusiastically,\nemitting a bright light. At Ren Zu's chest area, a light began to shine. But this light\nwas too weak; it could not illuminate the darkness. In fact, it could not even cover\nRen Zu's entire body but only engulfed his chest area.\nYet Ren Zu could feel a renewed surge of energy gushing into his body from\n\nthe Hope Gu.\nHe continued to speak, shouting out names. But he was already muddled. A\nlot of names had already been said, but he could not remember that and repeated\nthem, wasting a lot of effort in the process.\nAs time continued to flow, Ren Zu's lifespan was almost over.\nFinally, when he was on his final day, he said out the word \u2018Regulation.\u2019\nA sigh came from the darkness as a voice spoke, \u201cHuman, I admire your perseverance. You have said my name, so from today on wards, I will obey your commands. But only with my brother can I aid you in capturing all the Gu in the world.\nOtherwise, with my ability alone, it is impossible. Thus, you should give up. You're\nalmost dead; you might as well use this chance to take a final look at the world.\u201d\nRen Zu was determined and shook his head; he made use of all his time to continue saying out names as he tried to guess the other Gu worm's name.\nSeconds and minutes went by, and soon he only had one hour left.\nBut at this time, he unknowingly said the word \u2018Rule.\u2019\nImmediately, the darkness dissipated.\nThe two Gu's appeared before him. As the Hope Gu had said, one was cubic,\ncalled \u2018Regulations.\u2019 The other was spherical, called \u2018Rules.\u2019\nTogether, they made up \u2018Rules and Regulations.\u201d\nThe two Gu said together, \u201cNo matter who it is, as long as they know our names,\nwe will listen to them. Human, since you know our names already, we will be at\nyour service. But you must remember, it is important to not let others know of our\nnames. The more people that know our names, the more people we have to obey\nthem. Now that you are the first to subdue us, tell us your request.\u201d\nRen Zu was overjoyed. \u201cThen I order you both, go and catch me a Longevity\nGu.\u201d\nThe Rules Gu and Regulations Gu worked together and captured an eightyyear Longevity Gu.\nRen Zu was already a hundred years old, but after consuming this Gu, the wrinkles on his face vanished, and his frail limbs became muscular again. A vibrant aura\nof youth oozed from him.\nWith a belly flop, he jumped up onto his feet.\nHe ecstatically looked at his body, knowing that he had regained the body of a\ntwenty-year-old." },
  { num: "3", title: "Wisdom against restrictions", body: "Ever since Ren Zu was able to get their names and subdued the Rules Gu and\nRegulation Gu, his first order was for them to capture a Longevity Gu.\nRules Gu and Regulation Gu, one round and the other square, worked together and could capture all the Gu in the world; a Longevity Gu was nothing difficult.\nRen Zu used the Longevity Gu and got back his youth, becoming 20 years old\nagain.\nBut now the Rules Gu said, \u201cHuman, although you subdued us, every time you\ncommand us, it will add a rule and regulation.\u201d\nRegulation Gu continued, \u201cWe can catch the Longevity Gu for you; this is the\nfirst order. Our new rule and regulation are, we will not repeatedly catch the same\nGu for you.\u201d\nThat means, if Ren Zu wanted to catch a Longevity Gu again, the two Rules Gu\nand Regulation Gu would not help.\nRen Zu nodded, having no choice but to accept.\nHe gave his second command, \u201cThen, other than the Longevity Gu, please capture all the other ten thousand Gu in the world for me.\u201d\nRules Gu and Regulation Gu got this command, and Rules Gu turned into a\ngiant circle, encompassing the universe. Regulation Gu turned into a giant square,\ncovering the large world.\nOne square and one round formed a giant net together, enveloping the entire\nworld.\nWhen they shrunk again and returned to Ren Zu, all the Gu in the world, other\nthan Longevity Gu, were captured.\nRen Zu was overjoyed; with this, all the Gu belonged to him. From now on, he\nwas the ruler of the world.\nBut once he opened the net, with a swoosh, a large number of worms flew outside, and the Gu that Rules Gu and Regulation Gu worked hard to catch all escaped\nfervently.\nWhen Ren Zu closed the net, only five Gu were left.\n\u201cWhy is this?\u201d Ren Zu was astonished.\nRules Gu and Regulation Gu answered him, \u201cHuman, the world has over ten\nthousand Gu with all sorts of abilities. You have no strength or knowledge; how\n\ncan you subdue them? We can only capture Gu for you; to subdue them, you have\nto rely on yourself to get them to work for you.\u201d\nNext, they added, \u201cThis is your second order, so we'll add a second rule and regulation --- From now on, we can only catch one Gu for you at a time.\u201d\nRen Zu could only nod, and carefully opened the net, only showing a small gap.\nThe remaining five Gu contained the Strength Gu and Wisdom Gu. Seeing this,\nRen Zu was overjoyed.\nHe said to Strength Gu, \u201cStrength Gu, you left me back then; do you have any\nregrets? If you succumb to me now, I will return you your freedom.\u201d\nStrength Gu said, \u201cHuman, you are wrong. I didn\u2019t leave not because I couldn't,\nbut because I wanted to stay. You want to subdue me, but that\u2019s impossible. I only\nsuccumb to those stronger than me, but you are out of the question. However, we\ncan deal again; give me your youth, and I will temporarily obey you.\u201d\nRen Zu was reluctant upon hearing this; he had just gotten back his youth. Was\nhe about to lose it again?\nBut he desired strength; he knew that with strength, he would get stronger, and\nlife would get easier. Moreover, with strength, he could subdue more Gu. Thus,\nRen Zu accepted and formed a second deal with it. Ren Zu became middle-aged at\nonce, and the Strength Gu flew out of the web and landed on Ren Zu\u2019s shoulder.\nRen Zu had strength and was full of confidence.\nHe said to Wisdom Gu: \u201cWisdom Gu, you left me back then; do you have any\nregrets? If you succumb to me now, I will return you your freedom.\u201d\nWisdom Gu said, \u201cHuman, you are wrong. I did not leave because I couldn't,\nbut because I wanted to stay. You want to subdue me, but that\u2019s impossible. I only\nsuccumb to those smarter than me, yet you are not smarter than me. But we can\ndeal again; give me your middle age, and I will temporarily obey you.\u201d\nRen Zu, upon hearing this, refused to do the same deal again. He treasured his\nlife more, and he also knew that once he sold his middle age, he would be left with\nold age. Before long, the Strength Gu and Wisdom Gu would leave him again, just\nlike last time.\nRen Zu refused to deal but did not want to let go of the Wisdom Gu.\nWisdom Gu was anxious, reluctantly giving in, \u201cAlright, Human, you win. I lost\nto you this time. As long as you tell me what method you used to capture me, I will\nadmit defeat and not take anything from you, being at your disposal.\u201d\nUpon hearing this, Ren Zu was overjoyed, and before the Rules Gu and Regulation Gu could stop him, he said, \u201cI used the Rules Gu and Regulation Gu to\ncapture you.\u201d\n\nWisdom Gu laughed upon hearing, \u201cI remembered it; so these Gu are called\nRules Gu and Regulation Gu. Haha, now that I know your names, you can no\nlonger capture me.\u201d\nSaying so, it turned into a flash of light and flew away, vanishing into thin air.\nRules Gu and Regulation Gu began to complain, \u201cHuman, we told you long\nago that our name should be known by you alone and not others. Otherwise, we\nwould be used by others. Look what happened; now that Wisdom Gu knows our\nnames, it spells trouble.\u201d\nOnly then did Ren Zu realize that he was tricked by Wisdom Gu.\nHe was anguished, for he knew he lost the only chance he had of capturing the\nWisdom Gu using Rules Gu and Regulation Gu.\nRen Zu had the Rules Gu and Regulation Gu and could capture all the ten thousand Gu in the world, obtaining Strength Gu but losing Wisdom Gu.\nAt that point, his net still contained three Gu. He opened and saw that they were\nthe Attitude Gu, Belief Gu, and Suspicion Gu, respectively.\nRen Zu was unwilling to let them go; thus, the three Gu could only bet with\nhim.\nOnce Ren Zu opens the net, they would run out in three different directions,\nand whoever is captured by Ren Zu would be subdued. Guess who did Ren Zu\ncapture in the end? It\u2019s the Attitude Gu." },
  { num: "4 & 5", title: "Attitude", body: "Ren Zu used the Rules Gu and Regulation Gu, obtaining Strength Gu but\nlosing Wisdom Gu, leaving behind three Gu worms. One was Suspicion Gu, one\nwas Belief Gu, and another was Attitude Gu.\nRen Zu grabbed the Attitude Gu.\nAttitude Gu followed the betting rules, submitting to Ren Zu, saying, \u201cHuman,\nyou caught me. I can only curse my bad luck. From now on, I will be at your com10\n\nmand. Wear me, and you will be able to use my ability.\u201d\nAttitude Gu\u2019s appearance was like a mask. Ren Zu put it on his face, but in the\nend, he could not wear it. Even if he used a rope to tie it, it would still fall off.\n\u201cWhat's going on?\u201d Ren Zu was troubled.\nAttitude Gu laughed, \u201cI know, human, you have no heart. Attitude is the mask\nof the heart, so without a heart, how can you wear me?\u201d\nRen Zu realized at once that he had already given his heart to hope. He was\nheartless. Someone who is heartless cannot wear the attitude mask. In other words,\nto someone with a heart/an intention, their attitude is a mask.\nAttitude Gu was like a mask, and without a heart, Ren Zu couldn't wear it.\nBecause before this, Ren Zu had given his heart to the Hope Gu, and from then\non, he never feared difficulty.\nBut if Ren Zu wanted to use the Attitude Gu, he needed to have a heart.\nRen Zu was troubled, so he asked Attitude Gu. He said, \u201cOh Gu, sometimes\nattitude says it all. Now that I have encountered a problem, you know it, thus I\u2019m\nhere to seek advice.\u201d\nAttitude Gu said, \u201cThis is not hard, Ren Zu. You lack a heart, so you just have\nto find a new one.\u201d\nRen Zu was confused, asking again, \u201cThen how can I find a new heart?\u201d\nAttitude Gu sighed, \u201cHeart is nowhere and everywhere. Finding a heart is both\neasy and difficult. With your situation, you can obtain a heart now.\u201d\nRen Zu was overjoyed, \u201cQuick, tell me, how?\u201d\nAttitude Gu warned him, \u201cThis heart is called loneliness. Human, are you sure\nyou want it? Once you obtain it, you will face endless pain, loneliness, and even\nfear!\u201d\nRen Zu did not listen to his warning; he continued asking. Attitude Gu could\nnot defy Ren Zu\u2019s orders, so he said, \u201cYou only have to stare at the sky on a starry\nnight and say nothing. Once you reach daylight, you will obtain the Heart of Loneliness.\u201d\nThat night, it was a star-filled sky.\nAccording to Attitude Gu\u2019s instructions, Ren Zu sat alone at the mountain\npeak, staring at the night sky.\nBefore this, his life was very difficult, constantly struggling for survival; he had\nno time to admire this beautiful yet mysterious sky.\nBut now, as he stared at the starry sky, his thoughts began floating. Constantly\nthinking about himself, such a meager and weak being like himself, living a life of\n\nconstant fear and insecurity.\nSigh, although I have Hope Gu, Strength Gu, Rules Gu and Regulation Gu, and\nAttitude Gu, to survive in this land, it is still difficult as ever. Even if I die tomorrow, it is not shocking. If I die, will the world remember me? Will anyone rejoice\nover my existence and grieve over my death?\u201d\nThinking of this, Ren Zu shook his head.\nIn this world, he was the only human; how can there be others?\u2014 Even with Gu\naccompanying him, he still felt a strong sense of loneliness.\nHeart of Loneliness!\nAt this moment, when Ren Zu felt lonely, his body suddenly had a brand-new\nheart.\nThe sun rose from the horizon and shone on his face. But Ren Zu felt no happiness; instead, he felt endless pain, despair, confusion, and even fear.\nHe could not endure this loneliness and fear, for all he felt was the advent of\ndarkness and apocalypse!\nThus, he painfully cried, stretching out his fingers and digging out his eyes.\nHis left eye fell onto the ground and transformed into a young man. He had\ngolden hair and a strong body. Once he appeared, he kneeled at Ren Zu\u2019s feet,\nsaying, \u201cOh Ren Zu, my father, I am your eldest son, Verdant Great Sun.\u201d\nAt the same time, his right eye turned into a young girl, and she held Ren Zu\u2019s\nhand, saying, \u201cOh Ren Zu, my father, I am your second daughter, Desolate Ancient\nMoon.\u201d\nRen Zu laughed loudly, tears flowing out of his empty sockets. He said \u2018good\u2019\nthree times and continued, \u201cI have children now; I can finally endure the pain of\nthe Heart of Loneliness. From now on, there will be people celebrating my existence and grieving for my death, even if I die now, you will remember me.\n\u201cFinally,\u201d he sighed, \u201cI lost both my eyes and can no longer see the light. From\nnow on, you two shall observe this world for me.\nBefore Ren Zu died, he gave birth to ten children. The eldest son Verdant Great\nSun, the second daughter Desolate Ancient Moon. Among the ten, there was one\nnamed Northern Dark Ice Soul. Ren Zu\u2019s legends, whether real or false, alluded\nto many secrets in Gu Master\u2019s cultivation. Ren Zu\u2019s ten kids individually represented ten types of ultimate aptitudes.\nIn Ren Zu\u2019s story, his ten kids didn\u2019t have a long life. In reality, it is difficult\nfor the Gu Masters who hold ten extreme physiques to grow and mature; almost\nall die an untimely death. Of course, if they can really grow to become a Rank six,\n\nthey will be able to sweep through same-stage opponents and even perform miracles such as fighting a higher rank!" },
  { num: "6", title: "Light of Faith", body: "Ren Zu couldn't endure the Heart of Loneliness, so he dug out both eyes, turning them into a son and daughter. This alleviated his sense of loneliness.\nBut good things do not last, for his children started to crave the scenery of the\noutside world, forgetting all about their father Ren Zu and always going out to play\nuntil they forgot the time, and even forgot to take care of Ren Zu.\nRen Zu could not see anything; it was total darkness.\nBut at times, he could see a little bit of light.\nTo this, he felt perturbed and asked the Attitude Gu. Attitude Gu told him,\n\u201cOh, this is the eternal light given out by the Faith Gu.\u201d\nRen Zu\u2019s ten children, eldest son Verdant Great Sun, second daughter Desolate\nAncient Moon... the ten children\u2019s aptitude defied heaven, thus heaven was wary\nand did not give them a long lifespan. In the Gu world, the ten children also represented the top ten most extreme aptitudes!\nThat is \u2014 the ten extreme physiques!" },
  { num: "7", title: "The Origin of Wine", body: "In this world, humans weren't the only ones who knew how to brew wines.\nThe earliest records of wine came from The Legends of Ren Zu.\nRen Zu's two eyes turned into his eldest son Verdant Great Sun and daughter\nDesolate Ancient Moon.\nVerdant Great Sun was always with Desolate Ancient Moon, and this close association created feelings towards his own sister. However, Desolate Ancient Moon\nrefused his wooing.\nVerdant Great Sun was annoyed because of this and knew he needed some help,\nthus he asked the Wisdom Gu.\nAt first, the Wisdom Gu ignored him and avoided him as much as it could. But\nVerdant Great Sun kept on persevering, and the Wisdom Gu couldn't endure this\nannoyance anymore, so it told him a way \u2014 \u201cIn the east dwells a group of Honey\nPeach Monkeys. Drink the wine brewed by them and come find me.\u201d\nThus, Verdant Great Sun went to the east and drank the wine.\nThe wine brewed by the Honey Peach Monkeys was fruit wine. And ever since\nVerdant Great Sun drank the wine and returned, his face had a rosy flush. He\nsmacked his lips as he recalled the taste: \u201cSo, wine is sweet.\u201d\nThe Wisdom Gu smiled and said: \u201cIn the west lies a group of Psychic Monkeys.\nGo taste the wine brewed by them.\u201d\nThe wine brewed by Psychic Monkeys was bitter wine. Verdant Great Sun went\nto the west and drank the wine; since then, his tongue had a yellowish-brown hue\nto it.\nHe recalled the taste with a bitter expression. \u201cSo, wine can also be bitter.\u201d\nWisdom Gu said to him again: \u201cWine is both bitter and sweet, love is the same,\nand human lives are even more so. At the north dwells a group of Vajra Monkeys.\nThey also brew wine, go taste it.\u201d\nThe Vajra Monkeys brewed strong wine.\nVerdant Great Sun enjoyed this wine very much and drank till he was dead\ndrunk.\nHe felt this wine was really to his taste and wanted to drink even more after getting drunk. He drank from the bowl at first before trying to drink it directly from\nthe wine jar.\n\nFinally, he started throwing up. The wine started showing its effects, making\nhim feel an unbearable pain.\nHe felt the insides of his body were on fire, as if lava was flowing through them.\n\u201cIt's too hot!\u201d He screamed. All the fire flowed in reverse towards his head, and\nhis hair started burning. From then on, his hair burned endlessly like fire.\nWhen Verdant Great Sun woke up, he saw the Wisdom Gu looking at him.\n\u201cWhat did you think of the strong wine?\u201d The Wisdom Gu asked.\nVerdant Great Sun heaved a sigh \u201cI understand now, no matter how good the\nwine is, you will vomit it out if you drink too much; everything should be taken\nwith moderation.\u201d\nThe Wisdom Gu laughed out loudly: \u201cIn the north dwells a group of Skywater\nMonkeys. Their wine is also quite good; go taste it.\u201d\nSkywater Monkeys' wine was clear wine and was completely opposite of the\nstrong wine.\nVerdant Great Sun lightly tasted the wine, and the moment he did so, he completely forgot all his worries and felt like he was floating in the air, with a hazy and\nintoxicated look in his eyes.\nThe Wisdom Gu again asked him about his experience. He lightly waved his\nhands: \u201cHaving known the joys of wine, I will not pass it on to those who are\nsober.\u201d\nThe Wisdom Gu chuckled and left quietly.\nThus, humans weren't the first species to brew wine; rather, it was the monkeys\nwho were ahead of the humans.\nOrdinary monkey groups all knew how to brew wine.\nThe wines were different from one monkey group to another, with all kinds of\ntaste.\nHowever, humans collectively called the wine brewed by the monkey\u2019s Monkey\nWine." },
  { num: "8", title: "Reputation Gu", body: "One time, Verdant Great Sun got very drunk. When he woke up, his head hurt,\nand he forgot all that happened when he was drunk. He did not know why he was\ntrapped on a lone hill, one which was surrounded by a bottomless abyss. The abyss\nwas filled with spiral winds, pale green in colour; this was the usual wind. The\nwinds blew dust into the air; those were the dark yellow mortal dust.\nVerdant Great Sun's heart sank because he recognized that this was the Ordinary\nAbyss. No living being had ever managed to fly past it. He was trapped on this lone\nhill, unable to get out; he would die of starvation eventually.\nThankfully, there was a forest on the lone hill. Verdant Great Sun was hungry\nand came into this forest to find fruits to eat. But this forest was very strange; the\nblack soil was like a swamp, smelling extremely pungent. The trees had no leaves,\nand the branches looked like strange claws. But when the wind blew, there was the\nsound of leaves moving in the wind.\nVerdant Great Sun could not find food and fell into despair, knowing he was\ngoing to die soon.\nA few days later, he was so hungry he could not move, leaning on the tree trunk\nas he laid on the ground.\nHe eventually fell unconscious.\nIn his slumber, he could hear many voices talking.\n\u201cHey look, this person finally passed out.\u201d\n\u201cMm, as I expected, he's finished.\u201d\n\u201cActually, it is possible to leave the Ordinary Abyss; you just need the Reputation Gu.\u201d\nReputation Gu is at the center of the forest, hidden under a rock. \u201cToo bad he\ndoesn't know, hahaha.\u201d\n\u201cSshhh, speak softer; it will be bad if he hears us.\u201d\n\u201cIt's okay, it's okay, he has fainted already. Before long, the black soil will bury\nhim and turn him into nutrients for us trees.\u201d\nHearing this, Verdant Great Sun jolted awake.\nIt turns out this forest isWhisper Forest; what he had thought was leaves brushing in the wind turned out to be the whispers of the trees.\nAfter hearing the information, Verdant Great Sun walked to the center of the\n\nforest, lifted the rock, and obtained the Reputation Gu.\nReputation Gu was like a chrysanthemum; its petals were golden yellow, emitting a fragrance.\nReputation Gu said to Verdant Great Sun: \u201cYoung man, thank you for lifting\nthe rock and saving me. To repay you, I have decided to help you get across this\nOrdinary Abyss.\u201d\nReputation Gu told Verdant Great Sun the method to use it.\nVerdant Great Sun was overjoyed, arriving at the Ordinary Abyss, and placed\nthe Reputation Gu in his mouth, shouting as loud as he could.\nThe strange thing was, no matter how loud he shouted, there was no sound, but\nthe vibrations in the air caused the Ordinary Abyss to shake. As the commotion got\nbigger, it was like an earthquake. The air was even filled with a brilliant fragrance.\nVerdant Great Sun did not feel anything weird, as he had known from the Reputation Gu: Reputation itself has no voice, but it can spread wide and create tremors.\nAs he shouted, a golden bridge appeared in mid-air, but the bridge's length was\nlimited, there was still a long distance to the other side.\nVerdant Great Sun was too hungry, too tired; after trying several times, the effect\ncontinued to diminish, and his chance for salvation seemed dim.\nReputation Gu sighed: \u201cSigh, you have not eaten anything in a while, even\nthough you have a breath left in your stomach, it is too little. From your diaphragm,\nit has to go through your stomach, chest, throat, and finally your mouth; the journey is too long. We have to reduce it. Here, place me between your two butt cheeks.\u201d\nVerdant Great Sun did as instructed.\nReputation Gu landed near his private part and turned into a chrysanthemum\ncave.\n\u201cOkay, you can start shouting again,\u201d Reputation Gu said.\nVerdant Great Sun forced that last breath of his, out of this hole, out of his body.\n\u2014 Prrrrrrrrt.\nIn his daze, Verdant Great Sun heard a loud sound. The air was filled with an\nunimaginable stench, but that golden bridge became majestic and large, stretching over a thousand miles, reaching the other side.\nA shitty reputation compared to good reputation is always easier to obtain and\nmaintain.\nVerdant Great Sun quickly crossed the bridge, leaving the Ordinary Abyss and\nreaching the other side, saving his own life." },
  { num: "9", title: "Vanity", body: "The earliest record of Hairy Men was in The Legends of Ren Zu.\nIt was said that Ren Zu dug out his two eyes which turned into a son and a\ndaughter; the son was Verdant Great Sun, and the daughter was Desolate Ancient\nMoon.\nVerdant Great Sun liked to drink wine a lot. One time he caused an incident\nwhile being drunk and was trapped at the depths of the Ordinary Abyss. In the\nend, he profited from the disaster and obtained Reputation Gu, which looked like\na chrysanthemum and was able to escape alive.\nBecause of Reputation Gu, Verdant Great Sun's reputation gradually became\nbigger.\nSoon, news that Verdant Great Sun was a huge drunkard spread all over the\nworld.\nOne day, a group of Tiger-Striped Honey Bees brought their beehive and found\nVerdant Great Sun.\n\u201cVerdant Great Sun, we heard you really liked drinking wine and you have been\nsaying the wine made by the four heaven and earth monkeys is the most delicious\nin the world. But how could the wine they brewed compare to our honey wine?\nToday, we have specially brought our honey for you to have a taste.\u201d\nEach of these Honey bees was the size of a leopard with patterns on their body\nresembling tiger stripes, golden with black stripes on top. They were speaking\npolitely but their tone contained a threatening and forceful intent. Verdant Great\nSun complained in his heart; this was truly misfortune befalling on someone who\nmerely stayed home. Tiger-Striped Honey Bees were very powerful; he was not a\nmatch against one of them, let alone a whole group.\nVerdant Great Sun could only reluctantly taste the honey wine inside the beehive.\nHe had only taken a sip when his eyes brightened.\nHoney wine was sweet but not overly sweet; the wine fragrance was mellow and\nvery delicious, absolutely a treasure of the world.\n\u201cDelicious, delicious, really delicious. This honey wine makes one feel like the\nmost fortunate person in the world!\u201d Verdant Great Sun drank a mouthful of wine,\npraising it to the high heavens.\n\nTiger-Striped Honey Bees laughed, feeling incredibly happy.\nThe leader asked Verdant Great Sun: \u201cThen tell us which tastes more delicious,\nour honey wine or the wines of the four heaven and earth monkeys.\u201d\nVerdant Great Sun was already drunk and forgot about the terror of the TigerStriped Honey Bees, speaking frankly: \u201cThey all have their own merits; it is very\ndifficult to compare them.\u201d\nTiger-Striped Honey Bees were furious: \u201cHe said our wine is actually at the\nsame level as those mere monkeys? This Verdant Great Sun is too hateful; we need\nto teach him a lesson.\u201d\nThey were just about to attack when suddenly Verdant Great Sun disappeared.\nThis intoxication of Verdant Great Sun lasted for seven days and seven nights.\nIn his haziness, he heard a voice calling out for him from the darkness: \u201cVerdant\nGreat Sun, wake up quick. If you don't wake up, you will be eaten.\u201d\nVerdant Great Sun was startled awake.\nHe discovered he was bound up and was being carried by a group of savage\npeople.\nThis group of savage people had hair all over their body, and their two eyes were\ndark blue. There was already a bonfire burning, and above the bonfire was a cauldron.\nThe savage people quietly sat down, speaking pleasant-sounding words. \u201cWe\nare refining Eternal Gu and were just lacking a human to be the catalyst. Now\nheaven has sent us Verdant Great Sun; it is truly worthy of celebration. Human is\nthe spirit of all living beings; Ren Zu is the spirit ancestor. Verdant Great Sun was\nborn from his left eye and has ample spiritual energy. The way I see it, the refinement will succeed this time. Throw him into the cauldron quick; we will obtain\nEternal Gu and live for eternity.\u201d\nVerdant Great Sun turned pale from fright at these words, immediately shouting out and struggling with all his strength.\nHowever, these savage people remained unmoved.\nAt this very moment, Verdant Great Sun again heard the voice from before in\nhis mind.\n\u201cSigh, it is no use. These savages are the Hairy Men, loved by the world. They\nhave an innate talent in refining Gu Worms.\u201d\nVerdant Great Sun instantly forgot his predicament and curiously asked in his\nmind: \u201cWho are you?\u201d\nThat voice laughed: \u201cI am Divine Travel Gu; as long as any person drinks four\ndifferent top-tier wines in the world, they will give birth to me in their hearts. I can\n\nlet you teleport to any place you wish.\u201d\nVerdant Great Sun was exulted: \u201cThen, please quickly bring me out of here.\u201d\nDivine Travel Gu sighed: \u201cIt is no use. You can only use me when you are drunk.\nYour mind is sober now, and so you can't use me.\u201d\nVerdant Great Sun suddenly realized: \u201cSo that is why I was trapped on the isolated island and almost starved to death that time. Fortunately, I obtained Reputation Gu and could leave the Ordinary Abyss. So it was you who harmed me.\u201d\nDivine Travel Gu replied: \u201cSigh, human, I did not have any intent to harm you;\nit was all because you used my strength after you became drunk. You don't need to\nblame me. Last time you were almost captured by the Tiger-Striped Honey Bees,\nbut you were able to escape thanks to me. One harm and one rescue; we can call\nit even.\u201d\nVerdant Great Sun also thought of the Tiger-Striped Honey Bees and no longer\nblamed Divine Travel Gu.\nHe was thrown into the cauldron by the Hairy Men.\nThe huge fire was burning hotter under the cauldron, and the liquid temperature inside also soared.\n\u201cAdd Agates and Red Pepper!\u201d\nA Hairy Man threw precious agates and red pepper into the cauldron.\nThe liquid inside the cauldron immediately changed to red and dyed Verdant\nGreat Sun's body red.\n\u201cAdd Blue Smoke Fox Child!\u201d\nA Hairy Man grabbed a small fox and threw it into the cauldron.\nThe small fox's whole body was hairy and looked extremely cute with its eyes like\nblack diamonds. But the moment it touched the liquid, it turned into blue smoke\nand blended into the water.\nThe liquid in the cauldron slowly boiled, and Verdant Great Sun also felt more\ndespair, feeling it would be difficult to escape the disaster this time.\nHairy Men continued to add in many supplementary materials and Gu Worms.\n\u201cAdd Vanity Gu!\u201d\nA Hairy Man threw a Gu into the cauldron.\nThis Gu was strange and looked like a huge blue crab. But different from real\ncrabs, its crab shell was hollow.\nThe moment it saw Verdant Great Sun, the huge crab-like Vanity Gu was very\nexcited: \u201cYou, you are Verdant Great Sun? I have heard about you but had never\nexpected I would meet you here; it is really my good fortune. I am so happy, too\nexcited.\u201d\n\nVerdant Great Sun gave a bitter smile: \u201cHow can it be good fortune when we\nare about to die?\u201d\n\u201cI don't care about death. I only wanted to ask, how did you become so famous?\nI really admire you! I have the utmost admiration for people like you.\u201d Vanity Gu\nasked with urgency.\n\u201c I am not in the mood to talk about this now; I need to escape.\u201d Verdant Great\nSun struggled in the cauldron and tried to climb up but was quickly pressed down\ninto the cauldron by a watching Hairy Man.\n\u201cQuick, tell me, tell me quick!\u201d Vanity Gu was not tactful and wholeheartedly\nwanted to ask for guidance.\nVerdant Great Sun furiously rebuked: \u201cCan't you see the situation we are in\nnow?\u201d\nVanity Gu opened its eyes wide and stared at Verdant Great Sun before it beamed\nwith pleasure: \u201cI understand, I understand now. If I want to be popular, I need to\nendure the heat. Thank you for the guidance, thank you. Verdant Great Sun, as\nthanks, I will do a favour for you.\u201d\nSaying so, the Vanity Gu exploded.\nThis explosion was not intense and was very light, only giving off a soft \u201cbang\u201d\nsound. The Vanity Gu turned into a formless poisonous wind and attacked the\nhearts of all the Hairy Men.\nThe crystal clear dark blue eyes of the Hairy Men turned red.\nVerdant Great Sun was dazed for a good while, before coming back to his senses.\nHe could not help sighing at Vanity Gu's sacrifice and immediately shouted:\n\u201cAlthough you Hairy Men can refine Gu, but it is nothing. Even if you all live for\neternity, so what? You are so ugly with hair all over your body; you are simply an\nabomination.\u201d\nThe Hairy Men were stupefied. If it was before, they would not care about Verdant Great Sun.\nBut now, the poison of vanity had spread in the depths of their hearts, shrouding their intelligence.\nHearing Verdant Great Sun's shouts, the Hairy Men started refuting loudly:\n\u201cNonsense, nonsense! We Hairy Men are the most perfect; there can be nothing\nmore beautiful than hair all over the body.\u201d\nVerdant Great Sun was suddenly hit by an inspiration: \u201cNo matter how beautiful your hair is, could it be as beautiful as my hair?\u201d\nBecause he had drunk Vajra Monkey's strong wine, his hair had become blazing fire.\n\nThe Hairy Men were baffled at his words.\nThe beautiful fire was flickering and changing all the time. Even they could not\nhelp but admit the movement of Verdant Great Sun's hair was beautiful.\nVerdant Great Sun continued to stimulate them: \u201cEven if you obtain eternity,\nyou won't be as beautiful as me! Look at my hair; it is as colourful and charismatic as fire!\u201d\nThe Hairy Men were spurred on by Verdant Great Sun, and finally someone\ncould not endure it: \u201cYou have such amazing hair, I will have it too. Look at mine.\u201d\nHe then used a fire torch to ignite his whole body.\nThe hair on his body burned, and he became a fiery man.\n\u201cHahaha, you only have beautiful hair, but my whole body is beautiful now.\u201d\nThis Hairy Man shouted.\nSoon, the other Hairy Men also rushed to do the same.\nAll of them became fiery men, the fire burned them, and the intense pain caused\nthem to howl in pain.\nBut when they realized this, it was too late for them to extinguish the fire, and\nbombastically displayed their beauty.\nDivine Travel Gu was overjoyed and praised Verdant Great Sun endlessly:\n\u201cHuman, you are really clever, actually thinking of this method.\u201d\nVerdant Great Sun escaped out of the cauldron and succeeded in surviving. He\nreplied in his mind with a cold smile: \u201cIt is not me who is clever. It is the vanity\nin people that has turned them stupid. They often silently endure pain for false\nbeauty, giving up the goals they should truly pursue.\u201d" },
  { num: "10 & 11", title: "Not knowing one\u2019s limits", body: "In The Legends of Ren Zu, Divine Travel Gu\u2019s earliest appearance was beside\nVerdant Great Sun. Verdant Great Sun drank four different top-tier wines in the\nworld; the dense liquor aura in his body congealed into Divine Travel Gu.\n\nDivine Travel Gu had the power to send the Gu Master to any place in the world.\nBut its activation required the Gu Master to be in a drunken state, and its destination also could not be controlled. Verdant Great Sun was transported to many\ndangerous places and suffered a lot due to Divine Travel Gu, his life on the line\nseveral times.\nIn this world, there is a thing that is more precious than life. That is glory. Eons\nago, Ren Zu's eldest son, Verdant Great Sun, gave up his life while chasing for glory.\nThe sunlight of the Immemorial Antiquity Era shone on all living beings. Cicadas made noises, giving off the clamour of life. Dense green trees formed a large\narea of shade as they swayed with the wind.\nA large vat of delicious wine was in front of Verdant Great Sun, but he frowned,\nhaving no desire to drink.\n\u201cDivine Travel Gu, oh Divine Travel Gu, you have harmed me so deeply. Right\nnow, I do not even dare to drink wine. I am afraid of getting drunk and end up\ntransported to a dangerous land by you,\u201d Verdant Great Sun sighed in anguish.\nThe previous two times, he was sent into the Ordinary Abyss by Divine Travel\nGu, as well as the cauldron of the Hairy Men. Thankfully, he was lucky and made\nit out of both incidents alive.\nDivine Travel Gu said, \u201cPrince of Humans, I was not intentionally harming you.\nIn fact, every time you got drunk, you were the one who used my power. I am innocent. In fact, I even saved your life once, didn't I?\u201d\nDivine Travel Gu had, in fact, saved Verdant Great Sun's life from the TigerStriped Honey Bees before.\nVerdant Great Sun's expression was dejected, \u201cSigh... don't mention the past.\nNow because of you, I do not dare to drink wine. My life has become meaningless\nand boring.\u201d\nHearing this, Divine Travel Gu felt ashamed, \u201cIn that case, let me teach you a\nmethod. Go up into the sky, and in the Azure Heaven among the nine heavens,\nthere is a bamboo forest. Inside the bamboo forest, pluck a Jade Bamboo that is\nsky blue in colour. Next, go to Blue Heaven, and during the nighttime, collect the\nEight-Sided Diamonds Inside the Star Fragments. Next, when it is dawn, fly into\nthe sky and use the light of glory of the rising sun to turn me into Fixed Immortal Travel Gu. Once I become that Gu, I will no longer send you to random places\nwhen you are drunk.\u201d\nAbove Blessed Lands were Grotto-Heavens.\n\nThe most famous Grotto-Heaven was recorded within The Legends of Ren Zu;\nit was the famous Immemorial Nine Heavens.\nVerdant Great Sun refined the Fixed Immortal Travel Gu and flew up to the nine\nheavens. In Azure Heaven, he obtained a segment of the jade green Jade Bamboo.\nIn Blue Heaven, he collected the Eight-Sided Diamonds Inside the Star Fragments.\nThe Immemorial Nine Heavens consisted of White Heaven, Red Heaven,\nOrange Heaven, Yellow Heaven, Green Heaven, Azure Heaven, Blue Heaven,\nPurple Heaven, and Black Heaven.\nBut later, when Ren Zu\u2019s children caused havoc in heaven and earth, red, orange,\nyellow, green, azure, blue, and purple, the seven heavens were destroyed consecutively, and all that remained were White and Black Heavens, with the two alternating between day and night.\nVerdant Great Sun heard this and he was overjoyed. But he thought about it and\nfelt that hope was slim, \u201cOh Gu, I have stepped on the earth since I was born, I am\nnot as light as clouds, nor do I have wings like birds. How can I fly into the Azure\nHeaven and pluck the Jade Bamboo? How can I collect the Eight-Sided Diamonds\nin The Star Fragments? Not to mention flying towards the rising sun.\u201d\nDivine Travel Gu said, \u201cThat is right, humans cannot fly. But it is not a problem. We can ask Wisdom Gu. It has the greatest wisdom in this world, there has\nto be a way.\u201d\nVerdant Great Sun and Wisdom Gu were old acquaintances; the reason Verdant\nGreat Sun started drinking was because of Wisdom Gu's teachings.\nBut Wisdom Gu taught him to drink merely because it did not want to be disturbed. Sensing that Verdant Great Sun was going to find it again, Wisdom Gu\nquickly went into hiding.\nVerdant Great Sun did not find Wisdom Gu and felt dejected. But Divine Travel\nGu said again, \u201cIf we can't find Wisdom Gu, we can find Cognition Gu; it is the\nmother of Wisdom Gu.\u201d\nVerdant Great Sun quickly found Cognition Gu and requested the methods\nof flying.\nCognition Gu answered, \u201cYou found the right person because cognition is the\nwings of freedom. But everyone's thoughts are different; what wings you have\ndepends on yourself.\u201d\nSaying so, Cognition Gu turned into a warm light and shone on Verdant Great\nSun.\n\nIn the light, a pair of white pure-feathered wings appeared behind Verdant Great\nSun's back.\nThis pair of wings was very beautiful, white and pure like snow, without a trace\nof impurity; it was like the wings of a white crane.\nCognition Gu took a look and said, \u201cMm, this pair of wings is called \u2018self,\u2019 everyone has their own 'self-cognition', this pair of wings has a high degree of flexibility\nand freedom. But you must be careful, do not overly bask in sunlight; otherwise,\nyour sense of \u2018self,\u2019 will either expand or shrink. Young man, you must remember\nmy words. The higher you fly, the harder you fall.\u201d Cognition Gu thought and said\nthe last sentence with deep meaning.\nObtaining the cognition wings named 'self,' Verdant Great Sun was very happy\nand flew into the sky. He flew and flew, going higher and higher. Humans were\nnot born to fly, like birds soaring in the sky. This brought Verdant Great Sun great\ncuriosity. He played around freely in the sky, extremely happy. At the same time,\nhe remembered Cognition Gu's warning and did not overly expose himself to sunlight. When it was sunny, he would hide in the clouds.\nLike this, Verdant Great Sun flew higher and higher, finally reaching the limits\nof heaven, the end of Azure Heaven. There, Jade Bamboos grew in the air, having\nlustrous green leaves.\nThese Jade Bamboos were rooted in the void, and their tips also extended into\nthe unknown void. Looking from outside, one could only see their thin long stem.\nVerdant Great Sun retrieved one segment of the bamboo casually.\nThis dark green bamboo stem was like jade, palm-sized, and hollow in the\nmiddle, giving off a cold feeling. Verdant Great Sun obtained the Jade Bamboo\nand was very happy; he continued flying upwards.\nThe sky of the Immemorial Antiquity Era had nine levels: White Heaven, Red\nHeaven, Orange Heaven, Yellow Heaven, Green Heaven, Azure Heaven, Blue\nHeaven, Purple Heaven, and Black Heaven. Verdant Great Sun plucked the Jade\nBamboo in Azure Heaven; a few days later, he flew to the higher Blue Heaven.\nIt was nighttime, and stars were shining in the sky. The stars flew around happily, raining down stardust. These stardust gathered into a sea, a beautiful river of\nlight made of silver stars, flowing across the entire Blue Heaven.\nVerdant Great Sun willed his wings and plunged into the star river to swim. He\nsearched painstakingly in the endless stardust; he did not want those seven-sided\nor sixteen-sided fragments, he only wanted the Eight-Sided ones. These Star Fragments were like diamonds, crystal clear and flawless. He searched for a long time\nbefore finding one.\n\nOn the second day, Verdant Great Sun flew towards the rising sun at the break\nof dawn. The sunrise was like a large red lantern, emitting a warm light. This sunlight was not ordinary; it was the light of glory; it could shine on all living beings\nand penetrate the River of Time.\nVerdant Great Sun's left hand was holding onto the Jade Bamboo, his right hand\nwas holding the Eight-Sided Diamond, as he flew towards the sun and summoned\nDivine Travel Gu.\nBasking under the light of glory, Divine Travel Gu swallowed the Star Fragment\nand entered the Jade Bamboo.\n\u201cOh Verdant Great Sun, I need time to metamorphosize and become Fixed\nImmortal Travel Gu. During this period, you have to fly towards the sun, and do\nnot leave the light of glory. But you have to be more careful, Cognition Gu had\nsaid, pay attention to the \u2018self wings\u2019 on your back. Once my transformation ends,\nyou should fly towards the cloud cover immediately. Do remember, remember.\u201d\nDivine Travel Gu reminded.\nVerdant Great Sun laughed heartily, \u201cOh Gu, rest assured. I have even survived\nthe Ordinary Abyss and lived after the Hairy Men, I have the Reputation Gu, and\nhave transcended vanity, the light of glory can do nothing to me.\u201d\n\u201cThen I can stop worrying.\u201d Divine Travel Gu's voice weakened as the sunlight\nturned into threads, forming a cocoon, and wrapping Divine Travel Gu and the\nJade Bamboo.\nVerdant Great Sun moved his pure white wings, flying towards the sun. During\nthis process, the light cocoon became thicker and heavier.\nA moment later, the cocoon was burst open, and a butterfly glowing in green\nlight flew out, \u201cI succeeded, from today onwards, I am not Divine Travel Gu, but\nFixed Immortal Travel Gu. Hahaha!\u201d\nFixed Immortal Travel Gu flew around Verdant Great Sun, happily dancing, but\nsuddenly shouted, \u201cAh, oh no! Verdant Great Sun, look at your wings!\u201d\nUnder the light of the sun, Verdant Great Sun's wings had expanded to three\ntimes of its original size.\n\u201cDo not fluster, I noticed it long ago, but so what? The larger my wings, the\nstronger they are, and the higher and faster I can fly.\u201d Verdant Great Sun laughed\nloudly.\n\u201cQuickly hide in the clouds, stop flying.\u201d Fixed Immortal Travel Gu said worriedly.\n\u201cDon't worry, don't worry.\u201d Verdant Great Sun was not worried at all.\nThe \u2018self wings\u2019 on his back grew larger and larger, becoming even larger than\n\nhis body. Verdant Great Sun's speed also became faster and faster.\n\u201cFixed Immortal Travel Gu, what do you think is above the nine heavens?\u201d He\nshot up towards greater altitudes.\n\u201cStop flying, stop flying. If you fall down, I cannot save you.\u201d Fixed Immortal\nTravel Gu was very worried.\n\u201cWhat's the problem, how could I fall down? Look at my wings, how strong are\nthey, how powerful are they!\u201d Verdant Great Sun was just rebuking, when suddenly, his wings expanded to their limits, and exploded.\nLosing his wings, Verdant Great Sun fell towards the ground immediately. Eventually, he landed on the ground, as an unrecognizable grotesque corpse. Ren Zu\u2019s\neldest son met his end.\nDivine Travel Gu was very mysterious and also legendary. Its earliest appearance\nwas in The Legends of Ren Zu. The Legends of Ren Zu was the first classic of Gu.\nIt appeared to be a story when one first read it but actually held profound messages, recording the secrets of the ancient times and all kinds of Gu. Some Gu were\ndirectly described like Wisdom Gu, Strength Gu and so on. And some Gu were\nhidden; their descriptions were very vague, requiring the readers to dig through it\nand study carefully.\nDivine Travel Gu might be one of the four great movement Gu and is very powerful at that, but its flaw is extremely big; who would dare to use it? Even Verdant\nGreat Sun had no choice but to refine Divine Travel Gu into Fixed Immortal Travel\nGu in the end.\nDivine Travel Gu might be at the noble rank six, but its every use carried extremely high risk and had low worth in using. Thus, Verdant Great Sun refined it into\nFixed Immortal Travel Gu.\nHow can flying-type Gu be easy to control? By nature, humans walk on the\nground. If they want to fly and soar freely, they need a lot of painstaking practice!\nAnd to battle while flying? It needs even more bitter training! Even Verdant Great\nSun, son of the great Ren Zu, died while flying.\nHumans were creatures that walked on the ground and did not have wings.\nEven Ren Zu did not have the ability to fly. Being able to fly by itself was a miracle in defiance of heaven." },
  { num: "12", title: "Road of Life and Death", body: "Verdant Great Sun flew towards the sky and ended up plunging to his death.\nRen Zu, as his father, was extremely upset after receiving the news, finding\nWisdom Gu for an explanation.\nIt was Wisdom Gu who taught Verdant Great Sun to drink, causing the series\nof events thereafter.\nWisdom Gu quickly said: \u201cRen Zu, oh Ren Zu, don't find trouble with me.\nAlthough your son died, it is not impossible to revive him. As long as you enter\nthe Door of Life and Death and lead him towards the Road of Life, walking under\nthe sunlight, he would be revived.\u201d\nRen Zu was shocked, before becoming overjoyed, and then extremely furious.\nHe grabbed Wisdom Gu and questioned: \u201cWisdom Gu, oh Wisdom Gu, do\nyou still think I am that ignorant boy from before? The Door of Life and Death is\na dangerous place, once I enter, I will never be able to leave, after harming my son,\nyou want to kill me too?\u201d\nWisdom Gu quickly said: \u201cOther living beings do not know the secret of the\nDoor of Life and Death, thus they cannot leave. But I can teach you all of these\nsecrets. You are a living person, to enter the Door of Life and Death, you have\nto enter from the Road of Death. This road is extraordinary; it was the road left\nbehind by Fate Gu when it left Fairness Gu. The road left behind was called the\npath of destiny. There are many Suffering Gu inside the Road of Life; you have to\nenter from the Road of Death, and you need to own Courage Gu. That way, you\nwill not fear the torture of suffering. When you enter the Door of Life and Death,\nand see Fairness Gu, you are already dead. But at the same time, you will see your\neldest son, Verdant Great Sun's soul. You will bring him away and go out from\nanother road, the Road of Life. Road of Life was the path trodden on by Fate Gu\nwhen it visited Fairness Gu; it is also called the path of destiny. But during this\npath, you will meet three obstacles. One is Dang Hun Mountain, another is called\nLuo Po Valley, and lastly the Reverse Flow River. To climb past Dang Hun Mountain, you have to smash the Gut stones on it and obtain Guts Gu's help. To get past\nLuo Po Valley, you need to find Faith Gu to help. To get through the Reverse Flow\nRiver, you have to move forward continuously, not stopping for even a second\n\nduring the process.\u201d\nDang Hun Mountain, known as Crystal Mountain in The Legends of Ren Zu.\nAs long as any living creatures enter the range of Dang Hun Mountain, their soul\nwould receive a shock. The closer they get to the peak, the stronger the force of the\nshock would be. Many living beings don\u2019t have strong souls, and their soul would\noften scatter when they reach halfway up the mountain.\nRen Zu heard Wisdom Gu's words and let it go.\nHe quickly found Faith Gu.\nEver since he became blind, Faith Gu's light was the only light he could see.\n\u201cOh Ren Zu, I can feel your determination in getting back your eldest son. I am\nwilling to help you, but I urge you not to give up on this goal. Because when you\ngive up, I will leave you for good,\u201d Faith Gu said with concern.\nRen Zu found Courage Gu next.\nCourage Gu and Hope Gu were good companions.\nRen Zu had Hope Gu, and thus saw Courage Gu occasionally; he had a decent\nrelationship with it.\nAfter getting Courage Gu's help, Ren Zu came to the Door of Life and Death,\nentering the Road of Death.\nThe Road of Death was pure darkness, the large number of Suffering Gu were\nlike yellow fireflies, swarming towards Ren Zu. At this time, Courage Gu shone\nbrightly, chasing away the Suffering Gu for Ren Zu.\nCourage was needed to face death.\nRen Zu succeeded in going down; his body turned whiter as it turned hollow,\ngradually turning into a ghost. He could \u201csee\u201d again.\nWhen he got to the end of the road, a midst the calm darkness, he saw Fairness\nGu.\nHe was extremely shocked by Fairness Gu's huge body, exclaiming: \u201cYou are\nFairness Gu? Why is your body so huge? A mountain is a speck of dust compared\nto you. The sea is like a droplet compared to you.\u201d\nFairness Gu's voice was grand: \u201cLife and death are the greatest fairness in this\nworld; when I am inside the Door of Life and Death, my body will become enormous. Oh Ren Zu, you are here for your son right. Feel free to go; he is right there.\u201d\nRen Zu was overjoyed upon seeing his son and ran towards him.\nVerdant Great Sun had turned into a white ghost and was lying beside a lake,\nscooping out the water with a bowl and drinking it.\n\nThe water was like wine with its fragrance pervading the area.\nVerdant Great Sun drank it with utmost satisfaction.\n\u201cMy son don't drink anymore. Come, let's go back,\u201d Ren Zu walked towards\nVerdant Great Sun and shouted.\n\u201cEsteemed father, how did you come here? This is great; let's drink together,\u201d\nVerdant Great Sun opened his hazy eyes and looked at Ren Zu.\nRen Zu seized the wine bowl from him and said with exasperation: \u201cDon't drink\nanymore; you only know how to drink wine! Everyone knows there is a bewitching lake in the land of the dead, and its water is the Bewitching Soup. When ghosts\ndrink it, they become muddle-headed and lose the desire to leave.\u201d\nVerdant Great Sun, however, refuted: \u201cFather, you are wrong. This is not the\nBewitching Soup; it is the Soul Calming Wine. It can calm down your soul and\nremove all the impurities; your soul will no longer be restless, and you will experience utmost tranquility in your heart. This is one of the best quality wines in this\nworld.\u201d\n\u201cI don't care what wine it is; you have to follow me back,\u201d Ren Zu pulled Verdant Great Sun's hand, but found Verdant Great Sun was as heavy as a mountain\nand could not be budged.\nVerdant Great Sun shook his head: \u201cSome people, upon death, will be as heavy as\na mountain. Some people, upon death, will be light as a feather. Father, I had Reputation Gu in my life and died after bathing in the light of glory. When I arrived\nhere, my body had become heavier than a mountain; I cannot even walk a single\nstep and can only lie down here.\u201d\n\u201cWhat!\u201d Ren Zu immediately felt gloomy and anxiously shouted, \u201cI told you\nbefore, a tall tree attracts the wind; reputation is not always a good thing. Throw\naway the Reputation Gu.\u201d\nVerdant Great Sun shook his head and sighed: \u201cWe were not born with fame and\nfortune; we also cannot take them with us after death. After I died, Reputation Gu\nleft me. It is Fixed Immortal Travel Gu that has accompanied me.\u201d\nFixed Immortal Travel Gu could bring Verdant Great Sun's soul out of the Door\nof Life and Death or even bring him to any place in the outside world.\nHowever, Verdant Great Sun could only truly resurrect after walking through\nthe Road of Life.\n\u201cWhat do we do now...\u201d Ren Zu realized he had been played by Wisdom Gu.\nAlthough he had arrived at the deepest part of the Door of Life and Death \u2014\na death domain that had endless darkness, and has also found Verdant Great Sun,\nhe discovered he could not bring back his son.\n\nAt this moment, Fairness Gu spoke: \u201cOh Ren Zu, do you still not understand?\nThere are only two paths in Door of Life and Death, both appeared because of Fate\nGu. Life and death are determined by fate! All living beings live and thus die; this\nis the cycle that allows the universe to continue existing. Your eldest son Verdant\nGreat Sun died; this is fate and you should accept it. Moreover, he is living a good\nlife here, Obsession Death Domain is the world's most tranquil place. He is drinking the world's supreme quality wine and is free from all the worries of the outside\nworld; do you know how blissful this is?\u201d\nIf the soul was weak, it could be easily resolved by using guts Gu to strengthen\nhis soul. There were many guts Gu on Dang Hun mountain, these were all items\nof the highest quality for strengthening the soul.\nBut the irritation of the soul required pacifying the soul. The best way to\npacify the soul was to use the Bewitching Lake\u2019s water, found in Obsession Death\nDomain. It was praised by Verdant Great Sun as an excellent wine.\nRen Zu stood there and looked at his flesh and blood for a while before heaving a deep sigh.\nHe knew he could not bring back his son's soul, at least it was like that for now.\nHe bid farewell to the Fairness Gu and also his son and left the Obsession Death\nDomain.\nHe stepped on another path this time; it was the Road of Life which went from\ndarkness to light. However, Ren Zu soon realized walking this path was countless\ntimes more difficult than when he walked in through theRoad of Death.\nThere were many more Suffering Gu on the Road of Life than the Road of\nDeath. When Ren Zu had walked through the Road of Death, his journey became\nsmoother along the way and the Suffering Gu lesser the further he walked. But as he\nwalked through the Road of Life, there was not only more Suffering Gu, but every\nstep he took would cause much more Suffering Gu to fly over and obstruct him.\nCourage Gu could not resist them any longer: \u201cRen Zu, there are too many Suffering Gu, and they will continue to increase. There is peace in death, but life has\nendless suffering. Go to Dang Hun Mountain quickly and break some Gut stones.\nIf you want to survive, just relying on courage won't be enough; you need guts too.\u201d\nRen Zu hurried forward to Dang Hun Mountain and picked the guts Gu while\nenduring the tremors in his soul.\nWith guts Gu's help, his soul strengthened greatly, and although he still suffered\nthe tremors, it was not of much worry.\n\nHe passed through Dang Hun Mountain and arrived at Luo Po Valley.\nLuo Po Valley was a maze with winding and twisted paths. Occasionally, there\nwere large areas of Bewilderment Fog which could cause the soul to loosen, and\noccasionally, Luo Po Wind would blow through and cut apart the soul.\nRen Zu had fallen into the lowest part of my life and could not distinguish the\ndirections. Because his soul was strengthened by Guts Gu, it was loosening in the\nBewilderment Fog at a slower speed. The loosened soul was cut apart by the Luo\nPo Wind.\nRen Zu almost completely lost his way, but fortunately at this time, Faith Gu\nflew out and shone upon his path.\nThe best way to strengthen the soul is Dang Hun mountain\u2019s guts Gu, the best\nway to refine the soul is Luo Po valley\u2019s bewilderment fog and Luo Po wind, as for\npacifying the soul, it would be the pacifying soul soup in Bewitching Lake. But if\nit was used excessively, it would get rid of even the essence of their soul.\nRen Zu was able to walk out of the Luo Po Valley with only the essence of his\nsoul remaining.\nHe let out a huge breath of relief and could feel he was close to success.\nHe walked to the Reverse Flow River; this was the final barrier in the Road of\nLife.\nIt was extremely difficult to move against the stream.\nEndless suffering pushed upon him, causing him to make very slow progress.\nHowever, he forcibly persevered and walked towards the light.\n\u201cAlmost there.\u201d He looked at the success that was just ahead of him; only one\nfinal step remained.\nHe let out a breath of turbid air and relaxed, forgetting the warning of the\nWisdom Gu; he stopped.\nThis brief pause caused Ren Zu to be washed away by the river.\nLife was not easy; it was like a boat moving against the flow of the river. If you\ndo not continue moving forward, you will be pushed back.\nRen Zu was washed away by the river into the depths of Luo Po Valley, he was\nso tired he could not budge a bit and was trapped in the Luo Po Valley." },
  { num: "13", title: "Love is cruel", body: "Ren Zu could not save his eldest son Verdant Great Sun, and at the final juncture of resurrection, he made a great mistake and was swept away by the Reverse\nFlow River back into Luo Po Valley.\nHis eldest daughter, Desolate Ancient Moon, heard of this and wanted to go\nrescue her father.\nHowever, one must have the help of Courage Gu and Faith Gu to enter the Life\nand Death Door.\nBut these Gu were with her father Ren Zu.\nDesolate Ancient Moon was unable to enter the Life and Death Door. She\nwanted to rescue Ren Zu but had no ways, so she asked for guidance from Cognition Gu.\nCognition Gu gave her two methods.\nThe first method was to enter Space Cave, then open the space door to directly\nmove to Ren Zu's side. She could then use the Space Cave to escape Life and Death\nDoor. However, this method could only rescue Ren Zu's soul and could not resurrect him.\nSpace Cave was first depicted in The Legends of Ren Zu; it was a forbidden\nground on the same level as the River of Time. In the River of Time, there were\nlarge numbers of time path Gu Worms. Inside the Space Cave, there were countless space path Gu Worms.\nIt connected the five regions, hidden in a place no one knew. Pushing open a\ndoor from inside the Space Cave, one can reach any place in the world. The door\nthat connected the Space Cave was also known as the space door. Space door was\nomnipresent; it could be in a narrow crack or in the wide and boundless sky. Where\nthere is space, there is a door into Space Cave.\nBut from the past until now, very few people could find the Space Cave, not to\nmention going inside. In the entire human history, only one person had managed\nto enter and exit it.\nThere were many secluded domains of heaven and earth recorded in The Legends of Ren Zu. For time path, there was the River of Time, for space path, there\nwas Space Cave, also know as space door. For qi path, there was Xi Land and Hu\n\nLand. For rule path, there was Reverse Flow River, Cheng Bai Mountain, and Miniscule Mountain. For information path, there was Qian Kun Crystal Wall, Whisper Forest\u2026 and for soul path, there was Dang Hun Mountain and Luo Po Valley\u2026\nThere were also some secluded domains of heaven and earth that comprised several paths, for example City Well, the Blue Sea of Life, and Ordinary Abyss.\nGu were the essence of heaven and earth, fragments of the Great Dao, even\nthough secluded domains of heaven and earth had scattered dao marks, the total\nnumber usually surpassed rank nine Immortal Gu.\nThe second method was to climb to the peak of Cheng Bai Mountain and find\nthe one and only Success Gu. As long as she made a wish to Success Gu, she could\nrescue Ren Zu and allow him to successfully resurrect.\nDesolate Ancient Moon already knew of Space Cave's existence, but she had no\nidea how to find the Space Cave. Moreover, to let her father truly resurrect, she had\nto go to Cheng Bai Mountain.\nCheng Bai Mountain was not tall and was like a mound. It was peculiar as it was\nmade from millions and millions of pebbles.\nThese 'pebbles' were actually Failure Gu. And there was only one Success Gu,\nat the peak of Cheng Bai Mountain.\nDesolate Ancient Moon walked to the foot of the mountain and began to ascend\nthe mountain.\nHer movement woke up Love Gu, who was sleeping nearby.\nLove Gu was very angry at having its sleep disturbed and wanted to take revenge\nagainst Desolate Ancient Moon. It used its unique power to awaken a piece of\nstone.\nThe stone gained life because of Love Gu and became a Rockman.\nThe Rockman was tall and mighty, his body filled with gold, silver, copper, and\niron, looking very dazzling and gorgeous.\nAfter the Rockman was born, the first thing he saw was Desolate Ancient Moon.\nHer shocking beauty immediately conquered his heart.\nHe started following behind Desolate Ancient Moon, and as he looked at her\nfair back view, his heart was filled with love.\nFinally, he could not endure it anymore and ran past Desolate Ancient Moon\nand blocked her, shouting loudly: \u201cBeautiful lady, your appearance is so dazzling,\nyour body is so elegant and your temperament is so noble. The very first moment\nI saw you, I was subdued by you. You are my love; please accept my love for you.\u201d\nThe Rockman's physique was huge, completely blocking Desolate Ancient\n\nMoon's path.\nDesolate Ancient Moon slightly furrowed her brows and sized up the Rockman\nbefore speaking coldly: \u201cLove, what is that thing? You want me to accept your love,\nbut where is it?\u201d\nThe Rockman immediately took off the iron pieces from his body and offered\nthem to Desolate Ancient Moon: \u201cBeautiful lady, this is my firmness. I give it all\nto you; this is my love.\u201d\nDesolate Ancient Moon disappointingly shook her head; she had no interest in\nthese iron pieces.\nThe Rockman was dazed before taking out the copper pieces from his body and\npiling them above the iron pieces: \u201cBeautiful lady, this is my obstinance. I give it\nall to you because this is my love.\u201d\nDesolate Ancient Moon impatiently said: \u201cPlease move away; I have no interest\nin love. I need to rescue my father.\u201d\nThe Rockman panicked seeing that the goddess of his heart was unmoved. He\nkneeled down and made up his mind, taking out all the silver pieces in his body\nand piling them above the copper pieces: \u201cBeautiful lady, this is my dignity. I give\nit all to you; this will prove my love for you.\u201d\nDesolate Ancient Moon's furrowed brows deepened: \u201cListen, I don't have time\nto waste with you.\u201d\nThe Rockman became more anxious and took out all the gold pieces in his body\nand put them above the silver pieces: \u201cBeautiful lady, this is my self-confidence. I\ngive it all to you; they represent my love for you.\u201d\nDesolate Ancient Moon heaved a deep sigh: \u201cRockman, to express your love for\nme, you gave up your firmness, put down your obstinance, lost your dignity and\neven gave up your self-confidence. However, what I see is a very ugly Rockman. Get\nup; I cannot accept your love; I have more important things to do.\u201d\nAfter losing his gold, silver, copper, and iron decorations, the Rockman looked\nvery small and weak, even appearing comical. It lost all the beauty and might it\nhad before.\nThe Rockman wept and begged Desolate Ancient Moon: \u201cThen, how can I\nobtain your love?\u201d\nDesolate Ancient Moon was anxious, but the Rockman kept on kneeling on the\nground. She thought of an idea and changed her expression to show a smile: \u201cRockman, since you love me, take out your real heart for me to see.\u201d\nThe Rockman opened his chest without any hesitation and offered his scarlet\nheart to Desolate Ancient Moon.\n\nDesolate Ancient Moon took the heart and immediately kept it.\nThe Rockman then said: \u201cNow, I can obtain your love, right?\u201d\nDesolate Ancient Moon shook her head: \u201cEven if you offer your heart, it cannot\nexchange for my love.\u201d\nThe Rockman was panicking seeing Desolate Ancient Moon had stored his\nheart away. He said: \u201cHeartless woman, your cold-heartedness has made me despair.\nSince I can't obtain your love, then please give back my heart. Without my heart,\nI will die.\u201d\nBut Desolate Ancient Moon did not return the heart and watched as he slowly\ndied.\n\u201cWhy? I love you so much, why are you killing me!\u201d The Rockman shouted\nbefore his death.\nDesolate Ancient Moon looked at him with pity, but her voice was tranquil:\n\u201cRockman, I did not want to kill you. But you blocked my path to success.\u201d" },
  { num: "14", title: "Troubles of love", body: "After Ren Zu fell into Luo Po Valley and had no way to get out.\nDesolate Ancient Moon, in order to save her father, climbed up Cheng Bai\nMountain and tried to get to the top, in order to get that one and only Success Gu.\nAs long as she made a wish to Success Gu, Desolate Ancient Moon would be\nable to save Ren Zu.\nBut when Desolate Ancient Moon got to the foot of the mountain, she was\nobstructed by the Rockman.\nIt turns out that when Ren Zu's second daughter arrived at Cheng Bai Mountain, she ruined Love Gu's wonderful dream.\nOut of anger, Love Gu awakened the Rockman to obstruct Desolate Ancient\nMoon.\nAfter Desolate Ancient Moon killed the Rockman and got to the mountain\nwaist, Love Gu had yet to leave. It appeared before Desolate Ancient Moon and\nsaid: \u201cOh human, you interrupted my sweet dream, yet you still desire to take away\nSuccess Gu. Now I will topple the entire Cheng Bai Mountain; you can have fun\nfinding that one and only Success Gu out of billions of rocks. Hahaha.\u201d\nSaying so, Love Gu crashed towards Cheng Bai Mountain.\nCheng Bai Mountain was not an ordinary mountain; it was a mound entirely\nmade up of stacked rocks.\nAfter Love Gu crashed into it, the entire mountain crumbled.\nLove Gu left smugly, leaving behind Desolate Ancient Moon who looked at this\nhuge pile of rocks in a daze.\nHow was she going to find that one and only Success Gu among this chaotic\npile of rocks?\nDesolate Ancient Moon was troubled, without a choice, she had to return to\nCognition Gu to seek advice.\nAfter Cognition Gu heard Desolate Ancient Moon's description, it sighed:\n\u201cLove Gu had always been demanding and unreasonable, even if it was me, or my\nchild Wisdom Gu, we would not want to confront it. Right now, Cheng Bai Mountain had collapsed; you can only look at these rocks one by one, to find the real Success Gu from among them. There are no other ways.\u201d\nCognition Gu said again: \u201cBut you have to be careful; there are two Gu on\n\nCheng Bai Mountain. One is Success Gu, at the peak of the mountain. The other\nis Failure Gu, at the bottom of the mountain. Failure is the mother of success, but\nit also has many other children. Those rocks are Success Gu's siblings. When you\npick those rocks, many unthinkably bad situations will occur. I will tell you a secret\nhere, as long as you continue to affirm the belief of 'me' in your heart, these disastrous situations will gradually disappear.\u201d\nDesolate Ancient Moon heard this and her heart sank; she asked again: \u201cThen\nhow do I differentiate the rocks in my hand? What do Success Gu and Failure Gu\nlook like?\u201d\nCognition Gu sighed: \u201cThey look almost the same, but it is easy to differentiate\nthem. Just hold them in your hands; you will learn about their identities. In your\nsearch for Success Gu, that Failure Gu will be your biggest threat. You cannot hold\non to the Failure Gu; otherwise, you will be completely lost, and your life would\nbe in danger.\u201d\nDesolate Ancient Moon heard this and nodded, expressing her gratitude.\nCognition instructed her again before leaving: \u201cDo not say that I taught you\nthat. If Love Gu comes to find me, I'd be in trouble. In the face of fanatic and joyful\nlove, wisdom and cognition can only run away.\u201d\n\u201cDon't worry, I won't expose you.\u201d Desolate Ancient Moon agreed, returning\nto Cheng Bai Mountain.\nSeeing the huge pile of rocks, her heart was gloomy.\nSuccess was not easily obtainable; to obtain success, she would need to bend\ndown and search while taking great risks.\nDesolate Ancient Moon breathed in deeply, picking up the first rock.\nThis rock was ordinary, but when Desolate Ancient Moon held it in her hand,\nit shook slightly.\nA light wound appeared on Desolate Ancient Moon's hand.\nThis was not Success Gu, but one of success' siblings, one of the children of\nFailure Gu.\nDesolate Ancient Moon's heart was shocked; sh
